body:
  text: 卷四婦人科婦女之病大要不離乎中情鬱結其人本坤陰吝嗇之體心地淺窄識見拘迂一有逆意即牢結胸中又不能散悶於外則鬱久而成病矣主治之法審無外感內傷別症惟有養血疏肝用四物湯逍遙散之類加減便合室女天癸未至作小兒論若天癸已至與婦人病同治矣婦人所異者惟經水乳汁及胎前產後之屬不得不另詳方論其餘各病與男子多同有病當照方醫治肝氣列方逍遙散兼補治肝經血虛木鬱上逆而頭痛或連眉稜骨眼眶痛者肝血虛見光則痛亦服此方若目干則是水不養目宜服六味丸白朮淨當歸柴胡白芍酒炒茯苓各一錢薄荷四分炙草七分如有熱加丹皮一錢黑山梔八分凡陰腫陰挺陰癢諸症此方均宜柴胡疏肝散和治肝氣不和左脅痛陳皮柴胡各一錢五分川芎枳殼麵煨去瓤香附醋炒赤芍各一錢炙草五分如七情鬱結服逍遙散推氣散微熱治肝移邪於肺而右脅痛枳殼麵煨去瓤鬱金各一錢肉桂去皮另燉三分桔梗陳皮各八分炙草五分生薑二片紅棗二枚奔豚湯溫治肝氣旁散下注而小腹痛川楝子一錢橘核杵茯苓各一錢五分荔枝核燒焦杵小茴香各一錢吳萸泡五分木香七分如寒加肉桂三分製附子五分沉香降氣散和治氣逆胃脘痛元胡索酒炒一錢沉香三分砂仁五分香附鹽水炒五錢川楝子焙一錢炙草五分共研末每服二錢淡薑湯下附師尼寡婦室女方生地黃丸寒治師尼寡婦室女乍寒乍熱而患瘡瘍及項間結核肝脈弦長而出魚際外無寒邪內多鬱火者宜之生地酒炒赤芍各一兩秦艽黃芩柴胡各五錢蜜和丸綠豆大每服三五十丸烏梅湯下月經經者常也月行有常度經水有常期其愆乎常者是病也方書以先期而至者為熱後期而至者為寒此不過論其大概而要必細辨其血色若濃而多者血之盛也淡而少者血之衰也紫而兼紅成片成條而色明者此乃新血妄行多由熱結也紫而兼黑或散或薄而色暗者此以真氣內損必屬寒凝也由此而甚則或如屋漏水或如腐敗之宿血是皆紫黑之變象肝脾大損陽氣大陷當速用甘溫之藥以救脾土則元氣漸復無有不愈若以紫黑概作熱治其害有不可勝言者將行而腹痛拒按者氣滯血凝也既行而腹痛喜按者氣虛血少也經前發熱者多血熱經後發熱者多血虛腹脹者多氣滯腹痛者多血滯或一月二三至或半月或旬日而至此乃血氣敗亂之微當觀形察色辨其寒熱而治之不得以經早概論調經之要貴在補脾胃以資血之源養腎氣以安血之室至於逆行上溢而吐衄錯行下流而暴崩皆屬血熱妄行而亦有絡脈損傷瘀積肝旺所致不可以不辨經行之際凡服藥並飲食大忌寒涼切宜問其平日是陽臟陰臟並看其形色如何小便或清或赤大便或實或稀現下能食不能食虛實寒熱既明則醫治自不難矣月經列方加減四物湯寒兼補治經先期而至屬血熱者生地二錢白芍酒炒當歸各一錢五分黃芩柴胡各一錢甘草五分如腹痛加酒炒香附一錢五分加味異功散補治經後期而至氣血虛而食少者黨參去蘆米炒白朮淨各二錢當歸三錢陳皮一錢茯苓川芎各一錢五分炙草一錢加生薑二片大棗二枚加味逍遙散涼兼補治經水不調因鬱而致者當歸白芍酒炒白朮淨茯神柴胡各一錢梔子炒杵丹皮各七分甘草五分加生薑二片煎決津煎熱補兼行治血虛經滯不能流暢而痛極者當歸四錢牛膝鹽水炒澤瀉鹽水炒各一錢五分肉桂去皮另燉六分烏藥一錢熟地二錢如噁心嘔吐加焦乾姜六分氣滯脹痛者加香附一錢五分氣滯血澀者加紅花一錢小腹不暖而痛極者加泡吳萸六分牛膝湯熱行散治月水不利臍腹作痛或小腹引腰氣攻胸脅當歸酒炒牛膝鹽水炒白芍酒炒元胡索炒丹皮各一錢肉桂去皮另燉四分桃仁去皮尖杵七粒木香末五分沖藥服水煎加酒一杯香附四物湯補兼行治經脈氣血凝滯而痛脹者熟地四錢川芎香附酒炒元胡索各一錢五分白芍酒炒一錢五分當歸三錢木香一錢紅花四物湯補兼行治經脈氣血凝滯而痛脹者熟地炒仁末拌三錢當歸酒炒二錢白朮淨丹參酒炒白芍酒炒香附酒炒各一錢五分紅花六分川芎五分逍遙飲補治思郁過度致傷心脾衝任之源血氣日枯經脈漸不調者當歸二錢白芍酒炒棗仁即炒杵茯神各一錢五分熟地三錢遠志去心四分陳皮七分炙草一錢如氣虛加米炒黨參二錢益母八珍湯補治經來或前或後不調者黨參去蘆米炒二錢白朮淨當歸各二錢白茯苓白芍酒炒各一錢五分熟地三錢川芎一錢益母草一錢五分炙草一錢生薑二片大棗二枚膠艾湯補治勞傷血氣衝任虛損月水過多淋漓不止者熟地三錢當歸白芍酒炒艾葉各一錢五分阿膠炒珠一錢炙草一錢加味六君湯補治經水黃色者黨參去蘆米炒一錢五分茯苓二錢陳皮一錢生薏米當歸半夏制白朮淨各一錢五分炙甘草五分加煨姜二片煎經一月二三至或半月或旬日而至者均宜服補中益氣湯看寒熱加藥並加蓮蓬殼燒成炭一錢五分十全大補湯溫補治經水色淡或白或綠者炙耆二錢黨參去蘆米炒茯苓白芍酒炒白朮淨炒當歸各一錢五分熟地三錢肉桂去皮另燉四分川芎炙草各一錢生薑二片紅棗二枚經閉凡經閉之症審其果有邪氣膈滯自當以開導之藥通之若衝任虧敗經血枯竭此乃源斷其流蓋婦女病損至旬月半載之後未有不經閉者故或以羸弱或以困倦或以咳嗽或以有熱或以飲食減少無脹無痛無阻無隔而經有久不至者無非血枯經閉之候急須調養氣血兼顧脾胃切不可妄行通利以致誤人慎之經閉列方調經飲和治婦人經脈阻滯氣逆不調多痛而實者當歸四錢牛膝鹽水炒山楂香附酒炒青皮茯苓各一錢如因不避生冷而血凝滯者加肉桂五分或吳萸六分兼脹悶者加厚朴一錢或砂仁七分氣滯者加烏藥一錢五分或痛在小腹者加小茴一錢五分倘因經水適來偊阻溺竅以致小便不通腹脹欲死者急用此方以通其經小便自利而愈元胡當歸散和散血治血積小腹疼痛或因氣逆月經不行肚腹作痛者當歸元胡索白芍酒炒沒藥制枳殼麵煨去瓤劉寄奴各二錢共研細末每服一錢溫酒調下或服決津煎亦佳方在上月經內澤蘭湯微補治虛弱人月經耗損漸至不通而生潮熱者此方甚宜切勿以峻劑通之當歸白芍酒炒各一錢澤蘭葉二錢炙草六分水煎一方有熟地柏子仁各一錢五分牛膝茺蔚子各一錢桃仁紅花丹皮元胡索看症任加逍遙散兼補治虛弱人經漸不通而生潮熱白朮淨一錢五分當歸二錢白芍酒炒茯苓柴胡各一錢五分薄荷四分炙草七分生薑一片歸脾湯補治虛弱人經漸不通飲食減少者炙耆黨參去蘆米炒當歸白芍酒炒棗仁即炒杵各一錢五分木香五分遠志去心四分龍眼淨肉六分白朮淨一錢五分炙草七分生薑一片附熱入血室方此症因傷寒勞役怒氣而發熱適遇經行以致熱入血室或血不止或血不行令人晝則明瞭安靜夜則譫語如見鬼神宜服涼血藥若元氣素弱而熱未退血未止者宜補陰並服歸脾湯等方加減保陰煎涼血寒治熱入血室生地二錢黃芩一錢白芍酒炒一錢五分柴胡一錢五分丹皮甘草各一錢或加地骨皮二錢補陰益氣煎補治熱入血室病雖漸愈而元氣素弱血尚未止者黨參去蘆米炒當歸各一錢五分熟地三錢淮山炒柴胡各一錢五分升麻蜜炙三分陳皮炙草各一錢加生薑二片煎如血未止加蓮蓬殼炒成炭研末一錢沖藥服逆經此症由食熱毒等物以致經血亂行上從口鼻而出然亦間有絡脈損傷瘀積肝旺而然者逆經列方加味四物湯寒補治經逆從口鼻出生地二錢阿膠炒珠白芍酒炒黃芩山梔炒成炭當歸丹皮各一錢川芎六分韭汁生地飲涼兼補治同上生地二錢當歸鬱金降香各一錢加韭菜搗汁半酒杯童便少許沖藥服單用韭菜汁童便燉熱服亦可鍋底煙研末二錢米飲調下止血甚效治逆經簡要方紅花歸尾各三錢先磨好京墨半盅燉熱急服以止血再服此方即愈血崩此症有暴崩有久崩暴崩者其來速其治亦易久崩者其患深其治亦難凡血因崩去勢必漸少少而不止病則為淋此等症候未有不由憂思憂怒先損脾胃次及衝任而然者初病當察其有火無火久病必要用參朮歸地之類以培本根但得胃氣未敗受補則可望生若不受補而日服清涼則難救矣血崩列方治血崩奇方百草霜即鍋底煙要平日燒草的燒柴者不堪用二錢研細末沖溫酒服立能止血水煎沖酒半杯服亦可一方用舊蓮蓬殼燒灰存性研細沖酒服二錢甚驗槐花散微涼治初病血崩及腸風下血槐花地榆去淨梢各二錢二味俱炒成炭研末酒煎服或水煎加酒半杯亦可保陰煎寒補陰治血因火逼妄行而崩凡便血不止及經期太早一切陰虛內熱動血等症俱宜生地熟地白芍酒炒各二錢續斷淮山各一錢五分黃芩黃柏甘草各一錢如夜熱加川地骨二錢多汗加麥冬棗仁各一錢五分血虛血滯筋骨疼痛加當歸一錢五分血滑不止者加去梢地榆炒黑研末一錢五分或加烏梅亦可加味逍遙散補微涼治肝經風熱致血妄行而崩者當歸白芍酒炒山梔炒黑柴胡白朮淨茯苓各一錢丹皮七分甘草一錢加生薑一片煎加味歸脾湯補微涼治脾經鬱結血不歸經而崩者黃耆酒炒黨參去蘆米炒棗仁即炒杵各一錢木香末四分沖藥服丹皮七分白朮淨一錢炙草六分加味六君子湯補治脾胃虧損不能攝血歸源而崩者黨參去蘆米炒二錢當歸白朮淨半夏制白芍酒炒茯苓各一錢五分陳皮柴胡炙草各一錢加蓮蓬殼燒成炭一錢研末沖藥服有熱加山梔一錢舉元煎補治氣虛下陷血崩血脫亡陽垂危等症炙耆三錢黨參去蘆米炒白朮飯蒸各二錢升麻蜜炙四分甘草炙一錢如兼虛寒者乾薑附子任加滑脫者加烏梅二隻奇效四物湯補治肝經虛熱血沸騰而崩久不止者當歸二錢川芎六分熟地三錢阿膠蛤粉炒珠白芍酒炒艾葉酒炒各一錢五分如血仍未止加百草霜一錢研末沖藥服有熱則加黃芩一錢柏葉散補澀治元氣虛弱崩中漏血年久不愈者白帶亦治當歸生地柏葉炒川續斷龜板炙川芎各三錢阿膠蛤粉炒珠一錢禹餘糧鱉甲炙各三錢地榆去梢炒黑牡蠣煅赤石脂煅鹿茸酥炙艾葉酒炒各一錢共為細末每服二錢粥水調下黃耆湯補治血崩日久不愈者炙耆二錢當歸薏米炒蓮蓬殼燒成炭研白芍酒炒阿膠蛤粉炒珠山藥炒各一錢五分加鹿角霜研末六分沖藥服或以錢作兩煉蜜為丸每服三錢溫酒下白湯下亦可附殺血症方此症或由血崩或由小產去血過多心無所養而作痛宜用甘溫之劑以養營血養營湯補治殺血心痛黨參去蘆米炒枸杞各一錢五分山藥炒二錢熟地當歸各三錢炙草一錢生薑二片如有熱去生薑加酒炒白芍二錢歸脾湯補治殺血症心無所養而痛者炙耆黨參去蘆米炒白芍酒炒棗仁即炒杵白朮淨各一錢五分遠志去心四分龍眼淨肉六分當歸三錢木香五分炙草七分胎孕凡婦人受胎之後有胎氣不安者或虛或實或寒或熱各有所因治之者當細察其症而用藥乃為至善若泥於古方謂白朮黃芩為安胎聖藥無有不誤氣滯者忌白朮中寒者忌黃芩胎氣有熱而不安者其症必多煩熱或渴或躁或漏血溺赤或大便堅結清其熱而胎自安有胎氣寒而不安者其症或吞酸吐酸或嘔惡脹滿或喜熱畏涼或小水清長大便泄瀉服溫中之藥而胎自安有胎氣實滯而不安者其症或食滯脹滿或肝氣滯逆或氣滯作痛察其所由開之導之而胎自安惟有胎氣虛而不安者最難調治其症有先天虛有後天虛實為胎元之所繫先天虛者由於稟賦隨陰陽之偏漸加培補後天虛者由於人事凡色欲勞倦飲食七情之類皆能傷其胎氣此總不離於胎氣之虛仍須加之謹慎為要宜問其平日之臟氣是寒是熱酌而治之不獨婦科諸症皆然凡妊娠有病以四物湯為主無論麻黃桂枝大黃薑附等藥皆可隨症加入古人六合四物湯論之詳矣如恐有礙以灶心黃土研末水調塗於心下及臍下干則易之孕婦宜節欲食淡勿過勞勿過佚日常行動以活其胎屏絕嗔怒以靜其性自然易生易育兒亦多壽此外尤有漏胎下血各症另有治法胎孕列方涼胎飲寒微補治胎氣內熱不安生地白芍酒炒各二錢茯苓一錢五分黃芩枳殼麵煨去瓤石斛當歸各一錢甘草七分如熱甚加黃柏一錢三味白朮湯涼治妊娠內熱心痛白朮淨三錢赤芍一錢五分黃芩炒一錢水煎溫胃飲溫補治臟寒嘔惡胎氣不安黨參去蘆米杵三錢白朮淨二錢扁豆炒杵一錢五分陳皮當歸炙草各一錢加煨姜二片煎滑泄者去當歸氣滯胸腹痛加藿香一錢五分砂仁五分下寒帶濁加故紙一錢人參橘皮湯補治妊娠脾胃虛弱氣滯惡阻嘔吐痰水飲食少進者黨參去蘆米炒陳皮白朮淨茯苓各一錢厚朴制七分炙草三分加生薑二片竹茹一團煎如因中脘停痰宜二陳湯加枳殼因飲食停滯宜六君加砂仁小和中飲和消滯治娠婦食滯脹滿不安扁豆炒杵二錢陳皮山楂各一錢五分厚朴制茯苓各一錢炙草五分加生薑二片煎氣不順者加砂仁七分寒滯者加煨姜火盛於上者加山梔一錢解肝煎和治妊娠肝氣滯逆脹滿不安藿香陳皮各一錢五分砂仁杵七分厚朴制茯苓白芍酒炒蘇梗各一錢安胎飲補治起居不慎胎動不安熟地一錢五分川芎六分白芍酒炒阿膠炒珠當歸茯苓各一錢白朮淨二錢炙草三分加艾葉四分煎養胎飲補治血不養胎胎動不安當歸三錢白芍酒炒一錢五分白朮飯蒸杜仲鹽水炒各二錢熟地四錢如腹時痛多寒者加川椒五分煨姜一片有火者加黃芩一錢七味阿膠散補治胎動腹痛白朮飯蒸茯苓阿膠蛤粉炒珠白芍酒炒當歸陳皮炙草各一錢加生薑二片紅棗二枚煎胎元飲補治胎氣虛而不安不固者或間二三日服一劑黨參去蘆米炒杜仲鹽水炒當歸各二錢熟地三錢白芍酒炒白朮飯蒸各一錢五分陳皮五分炙草一錢水煎有帶濁加山藥二錢故紙一錢氣分虛極加炙耆二錢白朮一錢五分如滯而胸腹飽悶者則勿用寒則加炮姜七分陰虛小腹痛加枸杞二錢氣逆加砂仁七分虛而兼熱者去杜仲加生地二錢若心脾氣虛宜服逍遙飲或歸脾湯達生飲補治妊娠臨月間三兩日或間三四日服一劑則如羊之易生倘有別症須以意增減黨參去蘆米炒白朮飯蒸當歸各一錢大腹皮酒洗曬乾一錢五分陳皮蘇葉白芍酒炒各一錢炙甘草一錢五分胎前子懸子腫子嗽子瀉子淋子氣子鳴子煩子滿子癇此外又有子喑者因督脈繫於舌本為胎氣壅閉故不能言俟分娩後自能言矣不必服藥並小便不通列方紫蘇飲兼補治胎氣不和上腠心腹脹滿疼痛謂之子懸紫蘇陳皮川芎大腹皮酒洗歸身白芍酒炒各一錢黨參去蘆米炒七分炙甘草五分加生薑三片蔥白二寸煎加味五皮湯和治妊娠四肢浮腫此乃胎水氾濫謂之子腫大腹皮酒洗生薑皮桑白皮五加皮各一錢茯苓皮於白朮淨各一錢五分加紅棗二枚煎磨木香少許沖服加味二陳湯和治妊娠久嗽謂之子嗽陳皮阿膠蛤粉炒珠麥冬去心桑白皮各一錢細辛四分乾薑五分北味四分白茯苓一錢半夏制一錢炙草五分加生薑二片煎如發熱鼻塞或流清涕者宜照感冒咳嗽方治加味四君子湯補兼涼治妊娠泄瀉謂之子瀉黨參去蘆米炒白朮淨茯苓各一錢五分砂仁杵五分黃芩七分炙草一錢如不宜涼者去黃芩或服補中益氣湯安營飲涼補治妊娠小便少而澀痛謂之子淋當歸生地滑石麥冬去心黨參去蘆木通各一錢竹葉十片草梢六分加燈心一團煎天仙藤飲和治妊娠三月之後足指發腫漸至腿膝飲食不甘或足指間出黃水謂之子氣天仙藤洗略炒香附炒杵陳皮烏藥各一錢川木瓜三片蘇葉四片甘草六分生薑三片如因脾虛弱中氣下陷宜兼服六君及補中益氣湯加味四物湯補治子在腹中失脫口內所含疙瘩而啼者謂之子鳴當歸白芍酒炒熟地白朮淨茯苓各一錢先將豆撒在地令孕婦撿之則子自含著疙瘩而止矣愈後服此湯以安胎竹葉湯涼補治妊娠心驚膽怯煩悶不安謂之子煩如胃寒則去黃芩當歸一錢川芎五分黃芩熟地麥冬去心白芍酒炒茯苓各一錢竹葉五片鯉魚湯補治妊娠腹脹胎中有水氣遍身浮腫小便不利謂之子滿當歸白芍酒炒白朮淨各一錢茯苓一錢五分橘紅五分鯉魚一隻約重四五兩略重亦可先將鯉魚去鱗臟煮熟去魚用汁加生薑五片入藥煎約一盅空心服當有胎水下如水未下盡或胎死腹中脹悶未除再製一服即水盡脹消而愈羚羊角湯涼散微補治妊娠血虛受風忽然口噤反張謂之子癇羚羊角先煎獨活各一錢鉤藤二錢黨參去蘆米炒八分白茯神防風各七分川芎五分當歸桑寄生各一錢五分炙草五分如因怒動肝火者宜兼服逍遙散小便不通四物加黃芩澤瀉湯補兼涼治妊娠小腸有熱小便不通當歸澤瀉鹽水炒熟地各一錢五分川芎五分白芍酒炒黃芩各一錢茯苓升麻湯微補治妊娠胞胎墜壓胞系繚亂小便點滴不通謂之轉胞其症最危最急當歸二錢川芎六分升麻蜜炙五分茯苓赤白各一錢苧根一錢五分加琥珀研末二錢調服治妊娠胞胎墜壓小便點滴不通奇方急令娠婦睡在竹床或睡在大長凳上一人扶穩一人倒舉凳尾輕輕搖數次即愈妊娠禁用各藥斑蝥水蛭虻蟲烏頭附子天雄野葛水銀巴豆牛膝薏米蜈蚣三稜莪朮代赭石芫花大戟麝香蛇蛻雄黃牙硝芒硝丹皮肉桂槐花牽牛皂角半夏南星通草瞿麥乾薑桃仁硼砂乾漆蟹爪地膽茅根此說出便產須知但半夏與參朮並用以補脾可不必忌虛陰之人姜附亦不得不用臨症者要識變通胎漏妊娠經血不固而漏謂之胎漏有因病氣而漏者則去其病有因胎氣而漏者則安其胎或涼或補各有所宜又有忽然下血者或由火熱迫血或由鬱怒氣逆或由損觸胎氣或由脾胃氣陷皆當審症調理若去血過多宜專顧元氣以防其脫陷胎漏列方獨聖散和治妊娠有所傷觸激動胎元腹痛下血極效大砂仁一錢連皮炒勿令焦黑取仁去膜研末白湯下膠艾湯補治妊娠卒然下血並治跌僕胎動不安腰腹疼痛或胎上搶或去血腹痛當歸艾葉各一錢五分白芍酒炒熟地各二錢阿膠蛤粉炒珠炙耆地榆去梢炒成炭炙草各一錢加生薑二片大棗二枚煎一方單用阿膠炒珠四錢艾葉二錢治亦同四聖散涼微補治因內有熱而胎漏下血條芩一錢五分白朮淨二錢阿膠蛤粉炒珠三錢砂仁杵六分艾葉五分如因脾胃虛陷或去血過多宜服八珍湯或補中益氣湯因惱怒傷肝者服加味逍遙散加生地蔥白湯和治胎動下血腹痛搶心蔥白約五六莖煎濃汁飲胎未死即安已死即下舉元煎補治去血過多速顧元氣以防其脫陷者炙耆三錢黨參去蘆米炒白朮淨各二錢炙草一錢升麻蜜炙四分如虛寒者姜附任加防滑脫者加烏梅二隻或文蛤六七分墮胎小產此症屢患者多在三個月或五七月之間下次之墮必應期而復然總屬氣血大虛蓋婦人腎以系胞而腰為之府故妊娠之候最慮腰痛痛甚則墮不得不防凡畏墮胎者必須察其所傷之由預為戒慎而培養之若到臨時則無及矣婦人當血氣既衰於小產後多有胎既落而復又下墮如更有一胎欲產者不必驚慌服八珍十全等湯自愈墮胎小產列方四物鹿膠湯溫補治屢患墮胎當歸鹿膠各一錢五分杜仲鹽水炒一錢補骨脂鹽水炒白芍酒炒川芎絲餅川續斷各一錢熟地二錢千金保孕丸補治妊娠腰背痛慣於小產墮胎不受溫熱之劑者受胎兩月即服之川續斷酒洗一兩山藥炒三兩川杜仲糯米煎湯浸透炒斷絲四兩研末棗肉和丸每服三錢米飲下忌酒醋惱怒桑寄生丸補治妊娠應期墮胎不受熱藥者川杜仲糯米水泡即以糯米拌炒勿令焦一兩六錢炙耆三兩二錢真桑寄生高麗參去蘆米炒北味各八錢白朮淨炒一兩二錢加去核大棗一兩二錢水熬成膏將所炒之糯米研末共和為丸如綠豆大每服四錢米湯送下一日二次芎歸補中湯補治氣血虛半產炙耆當歸川芎白朮淨黨參去蘆米炒白芍酒炒杜仲鹽水炒艾葉阿膠蛤粉炒珠各一錢北味六分炙草五分如脾氣虛弱則服補中益氣湯人參黃耆湯補治小產氣虛血下不止黨參去蘆米炒炙耆當歸白朮淨白朮酒炒艾葉各一錢阿膠蛤粉炒珠二錢如小產後血不止或煩渴者屬氣血大虛用八珍湯加泡姜補之腹痛嘔瀉服六君子湯加姜附胎死腹中此症多以觸傷或犯禁忌或胎薄弱不成或以胞破血乾持久而殞但察產母唇舌俱紅者母子無事唇舌俱青者母子俱死唇青舌紅者母死子活唇紅舌青者母活子死若非產期而覺腹中陰冷重墜或為嘔惡或穢氣上衝舌見於黑者皆子死之症速宜下之下後審其虛實隨加調補自愈子死腹中列方加味脫花煎攻峻劑治胎死腹中當歸七錢牛膝鹽水炒川芎各二錢肉桂去皮另燉紅花各一錢車前一錢五分朴硝三錢水煎好加入朴硝再煎三四沸服臨產臨產之月勿多睡宜常運動使血氣流暢又不可過勞凡一切應用之物預為備便穩婆要擇老成慣熟者暑天則以水漉地而掃時值寒冷則以紙糊密窗欞並燒火盤庶幾溫涼得宜房中只許曉事老婦二人陪伴須關閉門戶禁止雜人往來更不得大驚小怪無事詢問如產母欲食則進以薄粥美膳以助氣力渴則取白蜜半杯滾水調勻飲之使之潤燥滑胎自然易生有一月之前忽然腹痛如欲即產卻又不產此名試月又有臨月忽然腹痛或作或止或一日或三五日胎水少來但腹痛不密謂之弄胎無論胎水來與不來俱不妨礙當寬心待時切不可預先驚動混服催生等藥以致誤事俟至腰腹一陣痛似一陣痛極難忍糞門挺急如欲大便眼中時見金光漿破血來方是瓜熟蒂落正產之候如胞漿破後一二時辰不生即宜服催生等藥如脫花煎羊肉湯之類不應即服加味八珍湯蓋漿乃養兒之生漿幹不產必其胎元無力愈遲則愈干力必愈乏所以速宜催之與無故而妄服催生藥者不同若胞破久而水血乾產路澀則兒難下服藥以助氣血並急濃煎大盤蔥湯令產婦以小凳坐於盤內薰洗產戶良久並洗小腹使其暖而氣達血自行而產矣妊娠之婦切不可占卜問神如巫覡之徒哄嚇謀利妄言凶險產婦聞之則氣結滯而不順多致難產此宜切戒產難催生列方脫花煎熱兼補治產難經日催生最佳當歸七錢肉桂去皮另燉一錢牛膝鹽水炒車前子川芎各一錢五分或加酒一二杯沖藥服以助藥力如氣虛困劇者加參隨宜陰虛必如熟地三四錢羊肉湯補治難產經日服之以助氣血精羊肉四兩當歸五錢川芎二錢生薑五片水煎分四次服加味八珍湯補治胞漿破後血水枯竭元氣困憊者當歸二兩白朮飯蒸一兩二錢川芎四錢白茯苓五錢黨參去蘆米炒熟地各一兩五錢白芍酒炒七錢益母草三錢炙草四錢生薑五片大棗六枚水煎數碗不時飲之飲畢再撿再煎而飲以救之亦可得生不可遲緩尋常催生列方姑備平穩之方不服亦可保產無憂飲兼補治胞盛氣實臨產日先服者當歸一錢五分酒炒川芎白芍酒炒各一錢二分川貝去心研末沖藥服一錢黃耆八分生蘄艾七分醋炒絲餅一錢四分厚朴七分薑汁炒荊芥八分枳殼麵炒去瓤六分羌活炙草各五分加生薑三片煎達生飲最佳方在胎孕內保生無憂散補兼行治臨產補其血順其氣或胞胎肥厚根蒂堅牢者皆可使之易產並治小產瘀血作痛當歸川芎白芍酒炒乳香制枳殼麵煨去瓤木香各四錢共研末每二三錢水煎日服二次交骨不開列方此症無非陰氣不足陰不足則氣不達所以不開不開則產必艱難加味芎歸湯兼補治臨產交骨不開難產者當歸六錢川芎二錢龜板炙杵五錢婦人發洗淨煅透研二錢水煎服生產不順橫生者兒方轉身用力太早逼之使然也須安慰產母令其仰臥囑老練穩婆剪去指甲以香油潤手推兒身順直用中指探兒肩不使臍帶纏絆然後服脫花煎催之方在前二頁倒產者兒未轉身努力太早手腳先出也令穩婆以手輕輕推入又再推上兒身必轉若久之不生穩婆手入產戶就一邊撥轉兒頭服脫花煎渴則飲以蜜水飢則食以薄粥然後扶掖起身用力一送兒即生矣切勿以針刺兒腳心恐兒痛上系則母命難保偏產者兒方轉身母用力太急逼兒頭偏一邊雖露頂非頂也乃額角耳令穩婆輕手扶正其頭即下若兒頂後骨偏注穀道露頂穩婆輕手於穀道外旁托正產母用力則生矣礙產者兒轉身時臍帶絆其肩以致難生令穩婆輕手推兒向上以中指按兒肩脫去臍帶即生盤腸產者臨產子腸先出然後生子腸出時須以潔淨漆器盛之用萆麻子四十九粒去殼研爛貼在頂心候腸收盡速即洗去切不可遲若腸略干以磨刀水少許溫潤之又法用芝麻油紙捻點火吹熄以薰鼻腸亦收上於子腸出時產母仰臥穩婆將子腸溫水洗淨然後托起輕輕送入推而上之囑產母兩腿夾緊穀道其腸自收此法尤為便捷胞衣不下此症如無痛脹但見無力者宜補氣助血速服決津煎因惡露流入胞中脹滯不出者令穩婆以手指頂其胞底使其血散或以指摸上口攀開一角使血水傾瀉則自落矣如血滲胞中停蓄既久而為脹為痛或喘或急命在頃刻者非逐血破血不可須速服牛膝湯胞衣不下列方決津煎熱兼補治胞衣不下但見無力不痛不脹者當歸七錢澤瀉鹽水炒一錢五分牛膝鹽水炒二錢肉桂去皮另燉八分水煎服一方川芎二錢當歸六錢肉桂一錢治同牛膝煎攻峻劑治胞衣不下腹中脹急速服此方緩則不救當歸三錢川芎二錢牛膝鹽水炒二錢蒲黃一錢五分肉桂去皮另燉一錢朴硝三錢丹皮一錢加生薑二片煎好入朴硝再煎三四沸服如非危急只見不下並無脹痛者服當歸五錢川芎二錢最穩失笑散和治血入胎衣脹而不下五靈脂去土炒五錢蒲黃炒五錢共研末每服三錢溫酒下蛋醋飲和治胞衣不下生雞蛋二個去黃留白用好陳醋大半盅煎滾沖服治胞衣不下奇方用蓮葉一張扯作兩三塊煎水服胞衣即破作兩三塊而下無葉則用蓮蓬無論生枯均要扯破又方用萆麻子四十九粒去殼搗爛貼兩足心即下下後速即洗去遲恐腸出如腸已出仍用此藥敷囟門腸自收入藥即洗去勿遲以本婦頭髮攪入喉中使之作嘔則氣升血散胞軟自下難產者亦用此法甚效血暈氣脫產時胞胎既下忽然眼黑頭眩神昏口噤昏不知人此症有二一曰血暈一曰氣脫血暈者本由氣虛然亦有血壅痰滯者察其形氣果屬有餘胸腹脹痛上衝此血逆症也不可放倒宜服芎歸湯下失笑散痰盛氣粗則服二陳湯若氣脫者產時血既大行血去氣亦去多致昏暈不省微虛者少頃即醒大虛者脫竭即死察其形氣不足俱無脹痛氣粗之類而眼閉口開手冷者即是氣脫之症速服大補藥以救之少遲則不及倘作血暈治而用辛香化痰逐血之劑則立刻而斃矣切宜慎之血暈列方芎歸湯兼補逐血治胞衣下後血暈實症胸腹脹痛上衝者川芎二錢當歸六錢水煎用五靈脂去土炒蒲黃炒各一錢五分研末沖藥服加味二陳湯和治血暈實症痰盛氣粗者黨參去蘆米炒二錢半夏制茯苓陳皮各一錢五分炙草一錢生薑二片氣脫列方加味當歸補血湯補大熱治胞衣下後血脫而暈眼閉口開手足厥冷者炙耆一兩黨參去蘆米炒四錢當歸三錢乾薑炒二錢附子制三錢人參湯熱補治同上正高麗參去蘆米拌炒一兩五錢附子制三錢如倉猝未及撿藥宜急燒鐵秤錘盛瓦盤內捧至床前以醋淬之令酸氣入鼻內收神即醒若無秤錘即用新磚瓦燒亦可產後產後氣血俱去最多虛症固宜大加培補然有虛者亦有實者蓋虛症者其人平日必元氣素弱臨產又血隨胎去此當察其形氣果系不足須以全虛治之若其有邪有火有飲食停滯乃虛中有實不得不兼而治之實症者必其素無疾病或年當少壯或慣於辛苦貧勞即臨盆下血未免暫見虛損第此壅滯之餘不過皆護胎隨從之物去者自去生者旋生何虛之有治之者要審症用藥不可執一以致有誤如頭痛身痛憎寒發熱或腰背拘急此外感之實邪也或熱渴躁煩或便結腹脹口臭舌焦眼眵多尿管痛小便赤酷喜飲冷此內熱之實症也鬱怒動肝胸脅脹痛大便不利此氣逆之實症也惡露未盡瘀血上衝心腹脹滿疼痛拒按大便難而小便利此血逆之實症也富貴之家保護太過或多用人參耆術以致氣壅或多用糖酒炭火以致內熱此調攝太過之實症也又或因產恐其勞困強令多食以致停蓄不散此內傷飲食之實症也俱當因症施治不可執以為虛有狂言如見鬼神者以有敗血上衝胸腹脹痛宜服澤蘭湯並失笑丸此症與血虛神不守舍心慌自汗者迥別切莫混治產後有三禁發汗多恐亡陽利大便則傷胃利小便則津液竭而胃中枯燥此經常之法不可不知而應變之權尤不可不講產畢胞衣下後即服生化湯上床以被褥靠之暑月則以大藤枕或凳靠之須至四五日後方可平睡又常以手從心順熨至臍下令惡露下行並要避風養神少言語大忌梳頭濯足免招風濕產後列方生化湯微補治產後去瘀生新胞衣下後即服人人必用之方當歸五錢川芎二錢桃仁研七粒益母草一錢炮姜六分加童便半酒杯沖服更佳狂言澤蘭湯行血治敗血上衝胸腹脹痛狂言如見鬼神當歸牛膝鹽水炒茺蔚子白芍酒炒熟地各一錢五分澤蘭二錢柏子仁杵一錢五分或加失笑散一錢五分沖藥服方在胞衣不下內一方用生化湯倍加桃仁煎好煎失笑散一錢五分服不可服峻劑心慌自汗歸薑湯溫補治產後心慌自汗當歸三錢棗仁即炒杵一錢五分炮姜七分如氣虛加參或加製附子歸脾湯補治產後心慌自汗或心神驚悸黨參去蘆米炒白朮淨炒當歸白芍酒炒棗仁即炒杵炙耆各一錢五分遠志去心五分龍眼淨肉四分炙草六分腰痛獨活寄生散散治產後腰痛上連脊背下連腿膝屬風者當歸桑寄生防風秦艽牛膝鹽水炒威靈仙獨活狗脊各一錢金毛細辛三分白茯苓一錢桂枝五分炙草三分舒筋湯熱治產後血滯腰腹疼痛元胡索當歸肉桂去皮等分為末每服二錢溫酒下或白湯加酒一杯下桃仁湯散血治產後腰痛如錐刺屬惡露為患者澤蘭當歸各三錢牛膝鹽水炒二錢桃仁炒研十粒蘇木一錢加味八珍湯溫補治產後腰痛專在一處不連上下屬虛者黨參去蘆米炒白朮淨炒當歸白芍酒炒杜仲鹽水炒熟地各一錢續斷七分肉桂去皮另燉三分茯苓八分川芎五分炙草六分心腹痛四神散溫補治產後血虛或瘀血腹痛當歸一錢白芍酒炒川芎各一錢炮姜六分水煎加味六君子湯補治產後脾虛腹痛而嘔吐食少者黨參去蘆米炒三錢白朮淨半夏制當歸茯苓各一錢五分陳皮炙草各一錢煨姜二片羊肉湯溫補治產婦虛弱血氣不足而腹痛或寒氣入腹臍下脹痛手不可按者精羊肉四分當歸三錢生薑五片加蔥鹽煎日服三次兼嘔者加陳皮七分白朮一錢理中湯熱補治產後中氣虛寒而腹痛黨參去蘆米炒三錢白朮淨炒二錢乾薑微炒七分炙草一錢水煎加味四物湯補兼行治產後因怒氣而心腹痛者當歸三錢川芎柴胡各一錢五分熟地二錢白芍酒炒一錢木香六分如因氣滯者去柴胡通瘀煎散血治惡露留滯而心腹痛者其症由漸而甚或大小便不行或小腹硬實而脹或自下上衝心腹痛極如刀錐之刺手不可近與虛症不同歸尾三錢紅花新者炒黃二錢香附山楂各二錢烏藥青皮各一錢木香七分澤瀉鹽水炒一錢五分水煎加酒一杯服如寒滯者加肉桂四分火盛內熱者加梔子一錢微熱血虛者加酒炒白芍二錢血虛澀滯者加牛膝一錢血瘀不行者加去皮尖桃仁十粒或元胡索一錢五分痛近下者服此方若痛近上者用失笑散三錢溫酒調下兒枕腹痛此是兒已產下其所枕之腹內疼痛摸之亦似有塊按之亦微拒手與瘀血作痛自下上衝心腹痛不可忍者迥別切不可服桃仁紅花等藥以致有誤殿胞煎熱兼補治產後兒枕腹痛亦治產婦血虛腹痛當歸五錢川芎茯苓炙草各一錢肉桂去皮另燉四分如血熱有火者去肉桂加酒炒白芍一錢五分嘔者加煨姜三片陰虛者加熟地三錢氣滯加香附一錢五分腰痛加杜仲二錢身痛芎歸加古拜湯溫散治產後外感身痛兼鼻塞惡寒者當歸三錢川芎秦艽各一錢炮姜七分加荊芥穗二錢研末生薑湯調下四物加澤蘭湯散血兼補治產後身痛因瘀血凝滯以手按遍身而更痛者澤蘭熟地各二錢當歸三錢白芍酒炒川芎各一錢五分桃仁去皮尖研七粒紅花一錢四物加參朮湯熱補治血虛身痛喜按者黨參去蘆米炒白芍酒炒白朮淨川芎各一錢五分當歸熟地各二錢炮姜一錢發熱人參荊防散散兼補治產後外感風寒其症憎寒發熱頭疼身痛或腰背拘急凡屬外感熱晝夜不退與血虛者不同黨參去蘆川芎防風荊芥穗各一錢五分當歸二錢炙草六分生薑二片四物加黑薑湯溫補治產後陰血暴傷陽無所附夜熱晨退與血虛不同熟地三錢當歸二錢白芍酒炒川芎各一錢五分泡姜一錢加味四君子湯熱大熱治產後誤服寒涼之藥而發熱黨參去蘆米炒二錢白朮淨炒茯苓各一錢五分乾薑微炒六分附子制七分炙草五分如因元氣虛弱而發熱者服補中益氣湯加泡姜一錢若四肢畏冷急加附子當歸補血湯補治產後氣血損傷肌膚髮熱目赤面紅煩渴引飲或頭痛頭暈氣短悶亂者或服十全大補湯炙耆一兩當歸三錢乍寒乍熱八珍湯補治陰陽不和而寒熱往來者黨參去蘆米炒白芍酒炒白朮淨茯苓各一錢五分熟地三錢當歸二錢川芎炙草各一錢加生薑二片紅棗二枚煎如陽氣陷入陰中宜服補中益氣湯增減四物湯熱補治產後寒熱往來陰勝而寒多者黨參去蘆米炒當歸川芎乾薑微炒白芍酒炒各一錢炙草五分如陽勝熱多者服四物湯蓐勞此因產婦坐草艱難以致過勞心力故謂之蓐勞其症或寒熱如瘧或頭痛自汗或眩暈昏沉或百節疼痛或倦怠喘促飲食不甘形體虛羸之類悉當培補元氣為主豬腰湯補治產後蓐勞寒熱如瘧自汗無力或咳嗽頭痛腹痛俱效黨參去蘆米炒四錢當歸七錢白芍酒炒三錢水煎去渣用豬腰一對切碎同好米煮稀粥加蔥椒鹽豉日服一次母雞湯補治產後蓐勞虛汗不止黨參去蘆飯蒸炙耆白朮淨麻黃根去淨節茯苓牡蠣煅各二錢水煎去渣用母雞一隻去毛腸雜煎湯三碗任意服之產後喘急此症有二一由風寒外感一由陰血暴竭外感者以邪氣入肺而喘急必氣粗胸脹形色壯盛或多咳嗽自與虛症不同陰竭者氣短似喘上下不相接吐之若不能吞之若不得形色怯弱此乃無根將脫之兆最為危候切不可混治金水六君煎兼補治產後外感喘急而氣粗胸脹者當歸二錢熟地三錢半夏制茯苓各一錢五分陳皮炙草各一錢加生薑二片煎或用六君子湯加杏仁一錢貞元飲補治產後氣短似喘呼吸喘急提不能升咽不能降氣道噎塞熱劇垂危者當歸三錢熟地七錢炙草二錢如兼嘔或惡寒加煨姜二片氣虛加人參手足厥冷則加製附子附瘀血入肺參蘇飲補兼散血治瘀血入肺咳嗽喘急高麗參去蘆米拌炒一兩蘇木三錢如口鼻起黑氣手足厥冷自汗速加附子五錢亦有可救產後發痙此症腰背反張戴眼直視或四肢強勁身體抽搐無論剛痙柔痙均屬血燥血枯之病若誤用發散消導等藥必死十全大補湯溫補治產後發痙炙耆黨參去蘆米炒白芍酒炒白朮淨炒茯苓各一錢五分當歸三錢肉桂去皮另燉三分川芎一錢熟地三錢炙草七分生薑二片大棗二枚大補元煎補治同上黨參去蘆米炒一錢五分山藥炒杜仲鹽水炒各二錢熟地三錢當歸枸杞各一錢五分萸肉一錢炙草七分如元陽不足畏寒者加泡姜七分製附子一錢惡露不止清化飲涼治惡露不止因血熱者白芍酒炒麥冬去心各二錢丹皮茯苓黃芩生地石斛各一錢如骨蒸多汗者加地骨皮一錢五分補中益氣湯補治肝脾氣虛不能收攝而血不止者子宮下墜或玉門不閉均用此方加附子一錢炙耆黨參去蘆米炒白朮淨當歸各一錢陳皮六分升麻三分蜜炙柴胡五分炙草七分加生薑二片紅棗二枚煎血不止加炒黑去淨梢地榆一錢五分氣血俱虛血來淡色者速服十全大補湯傷食加味異功散補兼消治產後傷食吞酸噯腐滿悶者黨參去蘆米炒二錢白朮淨一錢五分陳皮麥芽炒茯苓神麯炒炙草各一錢加生薑二片煎如腹痛加木香末六分沖藥服泄瀉補中益氣加減湯補治產後泄瀉不可利小便炙耆白朮土炒黨參去蘆米炒淮山炒各一錢五分扁豆炒杵一錢升麻蜜炙三分陳皮六分炙草七分加生薑二片紅棗二枚煎如不止加肉蔻霜一錢寒加乾薑四分大便秘澀此症以血去津液不足而然若計其日期已多以大黃等藥通之則禍在反掌矣必待腹滿覺脹欲去不能者然後用此潤劑濟川煎滑兼補治產後大便秘結當歸四錢熟地三錢澤瀉鹽水炒一錢五分肉蓯蓉酒洗淡二錢枳殼麵煨去瓤六分升麻三分蜜炙豬膽汁導法大豬膽一隻研皂角末二分用醋少許和膽汁以竹管貫入穀道俟一食頃當有宿食惡物出乳汁不下凡產後乳遲或乳少多由氣血不足而然通之補之乳汁自來豬蹄湯和治乳汁不下通草二錢川芎七分陳皮六分川山甲五片炒炙草五分水煎去渣用豬蹄一隻洗切再入水五六碗煮約三碗加蔥姜鹽料取汁飲之忌食生冷物並時將蔥湯洗乳為妥又方鮮蝦約四五兩去皮須頭足取淨肉熱酒沖服隨飲豬蹄湯蝦酒只飲一次豬蹄湯可長服加味八珍豬蹄湯補治虛弱人氣血不足乳汁不下炙耆黨參去蘆米炒陳皮白芍酒炒當歸熟地白朮淨茯苓各一錢川芎六分木通一錢五分炙草七分以王不留行一錢同煎去渣用豬蹄一隻洗切加水同煮約二碗任服須用木梳在乳上順梳下
