body:
  text: 卷二血症凡人身之血半隨衝任而行於經絡半行於脈外而充肌腠皮毛若外有所感內有所傷則血不循經從上而湧則為吐血咳血咯血鼻血齒血舌血從下而走則為大小便血婦人血崩須審其或由血熱妄行或由血寒凝滯或由飲酒過多而咯吐或由怒氣傷肝而嘔血或由憂思過度而損傷心脾或由色欲勞傷而隔陽失血各症分明又要問其平日是陽臟陰臟現在愛涼愛熱病系新久人或靜躁小便是清是赤大便或結或稀逐一審明然後無誤又云失血之症無論上下皆是經絡散行之血若仍循其經常之道路自愈除瘀血與傷寒外其餘俱屬七情飢飽勞力等因可以一味固元湯主之補藥當用溫藥亦須急加桂附炮姜隨宜或血虛煩渴躁熱睡臥不安須服聖愈湯剛燥之劑不可用血氣喜溫而惡寒寒則泣而不流倘服寒藥已愈即宜接服溫補切不可再服涼劑以致不救吐血列方黑神散和治吐血衄血及口鼻俱出若聲未失無不可救百草霜即鍋底煙要鄉間燒草者燒柴者不可用研細末每服二錢米飲調下若衄血者兼以少許吹入鼻凡血不論上下用百草霜或煅透黑薑炭或燒蓮蓬殼存性研細末服均可止之參地煎涼補治吐血生地六錢黨參去蘆二錢百草霜二錢研末水煎又方藕節七個荷葉頂七個擂爛入蜜一匙煎服亦治卒暴吐血二神散涼治一切男婦吐血或血崩下血屬熱者陳槐花炒焦一兩百草霜四錢共研末每服三錢白茅根煎湯調下舌上忽然出血亦用此散摻之犀角地黃湯大寒治胃火血熱妄行吐衄或大便下血出斑出疹皆宜生地四錢麥冬去心白芍犀角尖先煎丹皮各一錢五分水煎又方生石膏二錢生地四錢治胃火熱甚煩熱作渴頭痛氣壅而吐血生地元參湯涼治色欲過度之人腎火爍金而吐血唾血生地四錢麥冬去心白芍酒炒丹皮丹參各一錢五分鬱金七分元參一錢五分三七五分加磨濃墨並童便各半酒杯沖服加味葛花解酲湯涼治飲酒過多而吐血黨參去蘆白朮淨茯苓砂仁杵白蔻淨仁杵葛花各一錢青皮陳皮豬苓澤瀉鹽水炒各七分神麯木香各五分黃連四分丹皮七分加味四物湯散血兼補治血瘀而吐未吐之前胸必痛及吐血色必紫或黑而成塊當歸川芎丹皮香附杵白芍酒炒蘇木各一錢五分生地酒炒四錢紅花一錢水煎如紫血盡而見鮮血即服六君子湯加當歸泡姜以溫補之又韭菜搗取自然汁飲亦善行瘀血芎歸飲散血兼補治飽食用力或因持重努傷脈絡失血湧吐者跌撲打傷令人大吐者亦宜之川芎二錢當歸三錢紅花一錢桃仁杵十二粒獨參湯補治大吐大衄大崩之後血若稍止即服此方聽其熟睡切勿驚醒則陰血一夜復生高麗參去蘆米炒一兩五錢固元湯補治吐血止後宜服黃耆炙黨參去蘆米炒白芍酒炒歸身各一錢五分炙草一錢煨姜二斤聖愈湯補治一切失血症或血虛煩渴燥熱睡臥不寧不宜剛燥之劑者炙耆一錢黨參去蘆米炒二錢熟地三錢川芎白芍酒炒當歸各一錢五分水煎如微有火者去熟地加生地二錢甘草炮薑湯熱治大吐大衄外有寒冷之狀者炮姜一錢五分炙草二錢北味一錢水煎或服附子理中湯加木香亦宜鎮陰煎補大熱治陰虛於下隔陽於上則真陽失守血隨而溢以致大吐大衄手足厥冷危在頃刻者速宜服之熟地一兩牛膝鹽水炒澤瀉鹽水炒各一錢五分附子制一錢肉桂去皮另燉八分炙草一錢五分水煎如兼惡寒者加炒乾姜一錢氣脫倦言軟弱之極者速加炒高麗參隨宜附子理中湯補大熱治吐血色黯而非鮮紅或如豬肝色或如紅米粥水色者此離位之血非由火逼其人氣息輕微身體不熱乃系脾腎不能攝血虛寒大症若服寒藥必死黨參去蘆米炒附子制各二錢白朮淨炒二錢炮姜一錢五分炙草一錢嗽血咯血列方加味地黃湯涼補治嗽而有血痰易出者生地三錢淮山二錢萸肉丹皮茯苓各一錢五分澤瀉鹽水炒側柏炒成炭研各一錢水煎如嗽而痰少難出者乃系水竭於下液涸於上也宜加天冬麥冬百合天門冬丸涼治吐血咯血大能潤肺止嗽貝母三錢五分天冬五錢杏仁三錢五分阿膠蛤粉炒珠茯苓各二錢五分煉蜜為丸如芡實大每噙化一丸津咽下生熟地黃湯涼治酒色勞傷以致咯出之痰中有血絲者此方治鼻衄亦可熟地生地各三錢天冬麥冬去心貝母杵茯神各一錢五分茜根一錢甘草六分水煎如有火加黃柏知母須自知謹慎不然必日甚鼻衄列方茜根湯涼治衄血不止心神煩悶生地二錢阿膠蛤粉炒珠茜根側柏葉炒黑各一錢五分甘草炙一錢加生薑二片煎柏艾飲涼治鼻衄生地三錢淮山二錢蓮仁去心二錢柏子仁去淨油丹皮萸肉各一錢五分澤瀉鹽水炒一錢生荷葉一張乾者不效加生艾葉搗汁半酒杯沖服治法與吐血略同凡加味地黃湯生熟地黃湯及鎮陰煎均可因症選服茅根湯涼治鼻血白茅根一兩側柏炒成炭二錢水煎或用生茅花更勝地黃膏涼補治衄血往來久不愈者生地黃熟地黃枸杞子川地骨各八錢共熬膏每服一匙蜜湯調下舌血牙血列方香薷飲散治舌上出血如孔鑽者香薷二錢水濃煎服半茶杯外用槐花或蒲黃炒成炭研末摻之蘿蔔方治滿口牙內出血生蘿蔔一個用口嚼爛含少頃吐去即愈竹茹醋治牙齦出血生竹茹五錢無生用干須加倍用醋浸一宿不時含之荊槐散治牙宣出血疼痛不止槐花荊芥穗等分為末搽患處杞子湯補治滿口牙內出血枸杞子四錢水煎漱之然後吞下以枸杞細嚼吞下亦可尿血列方生地黃飲涼治血熱小便出血生地一錢阿膠蛤粉炒珠側柏葉炒黑各一錢五分水煎地黃赤茯散涼治尿血生地赤茯苓海螵蛸去硬皮等分為末每服三錢柏葉車前煎湯調下此方血淋亦治如痛兼以藕汁蘿蔔汁調服發灰散和治尿血及一切血症亂髮洗淨煅透成炭研細末每服二錢米醋湯調下珀珠散微涼治所溺之血成塊竅滯不利莖中急痛者此症因忍精不泄或年老竭欲而成滑石飛過六錢甘草末琥珀末各一錢珍珠末五分加硃砂末五分合勻每服二錢白湯調下如有熱尿澀以導赤散加牛膝鬱金清之利後仍服此散甚效導赤散麥冬生地木通甘草竹葉車前赤茯大便下血列方清魂散和治腸風下鮮血而腹不痛者當歸五錢荊芥炒成炭三錢研末分三次米飲調下槐花湯微涼治腸風臟毒下血側柏葉二錢荊芥穗炒黑槐花炒黑各一錢一分枳殼麵煨去瓤一錢水煎或加白芍一錢五分烏梅二隻如有熱加生地二錢黃芩一錢歸芍六君子湯補治脾陰虛弱下血黨參去蘆米炒白朮淨炒茯苓各一錢五分當歸一錢五分白芍酒炒二錢半夏制陳皮各一錢炙草六分加燒黑蓮蓬殼研末一錢沖藥服附子理中湯補大熱治大便下血其血非鮮紅或淡紅色或灰黑色或色如紅米粥者此乃氣虛不能攝血脾元脫絶之症若加之嘔吐則更為危急宜速服此湯服涼藥必死慎之黨參去蘆米炒二錢附子制一錢五分白朮淨炒二錢乾薑炒一錢炙草一錢水煎嘔吐加製半夏二錢如糞出多或溏泄者乾薑用二錢附子用三錢腫脹此症有二一病在氣一病在水凡氣分之病倏然浮腫或自上及下隨按而起有氣熱者有氣寒者有氣濕者有氣虛者若病在水其色明潤其皮光亮其腫不速按之窅而不起浸漬有漸屬陰症者居多又云先腫於內而後及於外者多實先脹於表而後漸及於內或外雖脹而內不脹者多虛小便紅赤大便祕結者多實小便清白大便稀溏者多虛形色紅黃氣息粗長者多實形容惟悴聲音短促者多虛當辨而治之腫脹之病無論是氣是水是單腹脹愈後均宜服六君香砂六君歸脾補中益氣等湯或服六味八味金匱腎氣等丸須擇宜而用若病後浮腫者乃系虛症服補劑自愈不得誤認腫脹通用列方局方五皮飲和治風濕客於脾經以致面目虛浮四肢腫滿心腹膨脹上氣急促兼治皮水胎水茯苓皮二錢五加皮地骨皮大腹皮酒洗淨生薑皮各一錢五分水煎上腫宜發汗加蘇葉防風杏仁各一錢五分下腫宜利小便加木通一錢豬苓防己一錢五分小便清長為陰水加製附子生薑各一錢白朮二錢川椒六分木香七分小便不利為陽水加豬苓防己知母各一錢五分凡虛寒人宜加白朮黨參附子肉桂壯健人宜加枳殼萊蔔子畏風之甚者宜加黃耆三四錢或再加附子一錢淡寮五皮飲和治病後身面四肢浮腫小水不利此由氣不能運散漫於皮膚肌腠之間故令腫滿此方最宜孕婦胎水腫滿用此方加白朮茯苓生薑皮桑白皮大腹皮酒洗淨赤茯苓皮廣陳皮各一錢五分水煎腰以上腫者邪在表也宜發汗加蘇葉防風荊芥秦艽之類腰以下腫者邪在裡也宜加車前澤瀉萆薢防己赤小豆茯苓等藥以利小便若小便清長則不可過利如煩渴便閉者陽水也加連翹黃芩黃柏不煩渴便不閉者陰水也加附子乾薑肉桂氣腫列方平胃散和治心腹脹滿蒼朮米泔水浸一錢五分厚朴一錢陳皮一錢炙草六分水煎氣鬱加香附木香傷食加麥芽山楂傷酒加乾葛二錢砂仁七分痰多加茯苓三錢腹痛加生白芍二錢小便閉合五苓散煎服如貼臍左右上下脹者脹必兼痛去蒼朮加紅花一錢當歸柴胡各一錢五分肉桂四分厚朴散和治壯健人心腹脹滿而氣壅實者虛弱者勿服川厚朴薑汁製六錢研末每服二錢薑湯下調氣平胃散和行氣治胃氣不和脹滿腹痛蒼朮米泔水浸一錢五分厚朴薑汁製烏藥各一錢白檀香五分陳皮藿香各一錢砂仁杵五分白豆蔻去殼杵六分木香七分炙草五分生薑三片芍藥枳實散和治食積痞滿及小兒腹大脹滿時常疼痛脾胃不和等症最效白朮淨一兩枳實麵煨去瓤五錢陳皮赤芍藥各三錢老米炒香二錢蓮仁去心二錢研末每服二錢白湯下寒加乾薑氣虛加黨參水腫列方此症宜忌鹽醬愈後亦須忌百日茯苓湯和治水腫白朮淨二錢茯苓三錢郁李仁杵一錢五分加生薑汁煎又方白朮澤瀉等分為丸茯苓湯下小分清飲和治濕滯腫脹不能受補小水不利者茯苓三錢枳殼麵煨去瓤厚朴各一錢生薏米四錢澤瀉鹽水炒豬苓各一錢五分水煎如無內熱而寒滯者加肉桂五分黃疸症則加茵陳二錢消腫方和治水腫赤小豆杵揀緊小赤黯者始真四錢同黃雌雞煮食或用鯉魚鰂魚同煮食均可金匱腎氣湯熱補利水治脾腎陽虛不能行水小便不利腰重腳腫或肚腹腫脹四肢浮腫或喘急痰盛已成膨症者甚效熟地四錢淮山茯苓各二錢萸肉一錢五分牛膝鹽水炒附子制澤瀉鹽水炒車前丹皮各一錢肉桂去皮另燉四分雞屎醴涼治水腫甚效雄雞一隻用大麥喂四五日取雞屎約半茶懷炒黃色以好酒浸雞屎煎約一茶盅去渣令病人溫服少頃腹內氣轉而鳴濕從大便泄出其腫漸消如泄未盡再服一二次愈後須服六君子湯補之平日養雞之寵底鏟去上面汙穢連泥掘取一大碗水煎去泥加酒一杯服亦效治水腫奇方赤尾鯉魚一隻約重一斤破開去腸雜不得見水與鹽用生白礬四錢研細末摻入魚腹內以粗紙包裹外以黃土包好放灶內煨熟取出去淨紙泥食頭者上消食身與尾者下消一日用盡屢驗愈後要服補劑單腹脹列方五味異功散補治單腹脹凡一切腫脹愈後均宜服黨參去蘆米炒三錢白朮淨茯苓各二錢陳皮炙草各一錢水煎半夏藿香俱可加入如寒則加乾薑隨宜附子理中湯補大熱治單腹脹虛寒之甚者黨參去蘆米炒三錢白朮淨炒附子制各二錢乾薑炒一錢五分炙草一錢積聚此症一由五臟所生一由六腑所成蓋積者積壘之謂或以飲食之滯或以膿血之留凡汁沫凝聚旋成症塊皆積之類其病多在血分有形而靜者也聚者聚散之謂或脹或不脹或痛或不痛凡隨觸隨發時往時來皆聚之類其病多在氣分無形而動者也治此者當辨其新久虛實應攻應補或攻補兼施內經云大積大聚衰其半而止過則死誠不可不慎也積聚列方三稜散攻峻劑治積聚癥瘕堅滿不散此方惟壯健新病者宜服若久病或虛弱或年老須斟酌或服一錢兼服補劑白朮淨炒三稜各一兩木香一錢蓬朮當歸各二錢五分檳榔一錢五分研末每服二錢沸湯下熱積加黃連黃芩寒積加附子乾薑肉桂酒積加葛根或葛花血積加桃仁紅花痰積加半夏茯苓水積加桑白皮赤小豆肉積加山楂阿魏果積加麝香草果愈後宜服六君子湯與香砂六君子湯或附子理中湯枳實丸和去積專治食積癖塊白朮淨枳實麵煨去瓤山楂去核麥芽半夏制神麯各五錢蒼朮米泔水浸陳皮各一錢二分木香四分薑黃七分共研末用荷葉蒸飯為丸如緑豆大每服三錢淡薑湯下大和中飲和去積治飲食留滯積聚等症陳皮厚朴制各一錢五分山楂麥芽各二錢枳實麵煨去瓤一錢砂仁杵五分澤瀉鹽水炒一錢五分水煎脹甚加白芥子一錢胃寒噁心加乾薑一錢痛則加木香烏藥香附之類又芍藥枳實散治食積脹滿或疼痛最穩最驗大人小兒俱合方在腫脹內木香枳殼湯補兼消治虛弱人氣滯脹痛黨參米炒去蘆二錢白朮淨一錢五分枳殼麵煨去瓤厚朴制烏藥當歸陳皮各一錢木香六分加生薑二片煎分二次服加味香砂六君湯補兼行治虛弱人積聚黨參去蘆米炒二錢白朮淨陳皮製半夏歸身茯苓各一錢五分炙草七分木香沖藥服七分加生薑二片煎此方去生薑加煨姜三片用白蕪荑炒研末一錢沖藥服治血鱉多驗血鱉者嗜酒人血鬱於酒則成酒鱉多氣人血鬱於氣則成氣鱉虛癆人敗血雜痰則成血鱉此鱉如蟲之行上侵入咽下下觸入肛或附脅背或隱胸腹名雖各異治法俱同參附湯熱補治服攻藥大下血積自汗不止氣弱不能轉動者須速服此方高麗參去蘆米炒五錢附子制三錢水煎如貧不能買參者服炙耆六錢當歸二錢製附子三錢消痞膏治積聚痞塊朴硝蒜頭杵各五錢大黃急性子各三錢三稜蓬朮各四錢乳香制真阿魏沒藥制各二錢將三稜蓬朮大黃急性子研末用芝麻油四兩煎蒜頭朴硝及藥末煎好去蒜頭下黃丹二錢候已成膏以乳香沒藥阿魏三味研粉加入再加麝香二分攪勻貯有蓋瓦器內俟三兩日火氣去淨以白布或厚油紙攤貼五六日一換或見大便有膿血勿以為異亦有不下膿血者須忌房事及一切生冷物眩暈內經云上虛則眩又云腎虛則高搖髓海不足則腦轉耳鳴此症虛者十居八九而兼火兼痰者間亦有之原其所由或因勞倦過度或因飢飽失時或因嘔吐傷上或因泄瀉傷下或因大汗亡陽或因大醉傷陰或因被毆奪氣或因焦思不釋或因男子縱欲或因婦人血崩皆能致之須服補氣補血等藥切不可服寒涼消散之劑以伐其生氣此症忽然頭暈眼黑腦髓旋轉不可以動與頭痛之上實者不同宜辨眩暈列方八珍加減湯補治氣血兩虛眩暈黨參去蘆米炒白朮飯蒸各二錢熟地三錢當歸天麻茯苓各一錢五分炙草一錢生薑三片補中益氣加減湯補治氣虛眩暈炙耆一錢五分黨參去蘆米炒歸身白朮飯蒸天麻鉤藤各一錢五分陳皮七分炙草六分加生薑二片紅棗二枚煎六味地黃加減湯補治精氣不足而眩暈熟地四錢淮山炒杞子各二錢萸肉天麻茯苓各一錢五分炙草一錢水煎如火衰者加肉桂四五分天麻六君子湯補治眩暈兼有痰或嘔者黨參去蘆米炒二錢白朮淨二錢半夏制天麻茯苓各一錢五分陳皮炙草各一錢加生薑二片紅棗二枚煎頭痛此症有風邪有火邪風邪者身必寒熱或多清涕或兼咳嗽皆由風寒在經散去風寒其病自止火邪者各經俱有惟陽明為最正以陽明胃火盛於頭面而直達頭維故其病更甚也暫痛為邪久痛為虛邪則分寒熱而除之虛則審陰陽而補之然亦有久病為邪所纏暫痛因虛而發者外邪之火可散而去內郁之火得升而愈熾此外又有氣虛痛血虛痛腎虛痛痰痛偏左右痛者症與眩暈不同頭痛列方羌活湯散治外感邪在太陽頭痛防風羌活川芎各一錢五分蒼朮米泔水浸白芷各一錢甘草七分加生薑三片連須蔥白二寸煎如有汗去蒼朮升麻葛根湯散治外感邪在陽明頭痛連及目眶者葛根二錢升麻秦艽荊芥蘇葉赤芍各一錢白芷一錢五分甘草七分加生薑二片煎凡面浮腫而痛者風也亦服此方又癍疹者邪熱所化也用此方加牛蒡子逍遙散補微散治少陽頭痛兼兩脅痛者柴胡當歸白朮淨白芍酒炒茯苓各一錢五分炙草一錢薄荷五分加生薑二片煎如有熱加丹皮一錢梔子一錢五分都梁丸微散治風吹項背頭目昏眩腦痛及婦人胎前産後傷風頭痛者白芷沸湯泡切煉蜜為丸如彈子大每服一丸荊芥湯下加味二陳湯治頭痛而多痰者陳皮蒼朮米泔水浸各一錢半夏制川芎南星制茯苓各一錢五分炙草一錢生地芍藥湯寒治火邪頭痛生地二錢花粉白芍知母澤瀉鹽水炒黃柏各一錢五分木通一錢竹葉石膏湯寒治陽明火邪盛極而頭痛者生石膏杵三錢桔梗木通淡竹葉各一錢薄荷葉八分甘草一錢吳萸湯溫補治頭痛如破乾嘔吐涎沫者黨參去蘆米炒三錢吳萸泡一錢加生薑五片大棗四枚煎加味補中益氣湯補治氣虛頭痛炙耆一錢五分黨參去蘆米炒白朮淨歸身各一錢五分陳皮川芎各一錢升麻蜜炙三分柴胡四分炙草七分加生薑二片大棗一枚煎或加蔓荊子七分加味四物湯補治血虛頭痛熟地四錢川芎一錢五分當歸三錢蔓荊子杵一錢白芍酒炒一錢五分水煎如有熱加黃柏知母各一錢當歸酒補治血虛頭痛欲裂大當歸一兩用好酒煎服六味地黃加減湯補治腎水虛頭痛熟地四錢杞子二錢萸肉川芎茯苓各一錢五分淮山二錢炙草一錢八味地黃加減湯熱補治命門火虛頭痛熟地四錢淮山炒二錢杞子三錢萸肉川芎茯苓各一錢五分附子制一錢肉桂去皮另燉四分炙草一錢加酒洗淡肉蓯蓉二錢頭風痛列方點頭散和治偏正頭風川芎三錢香附去毛炒一兩研末每服二錢清茶調下二陳當歸湯和治偏左頭痛當歸三錢半夏制白芍酒炒川芎陳皮白芷茯苓各一錢炙草七分加味二陳湯寒治偏右頭風沙參酒炒三錢半夏制防風南星制川芎茯苓各一錢黃芩七分陳皮一錢黃連五分甘草六分偏正頭風薰蒸方川芎五錢殭蠶因人年歲一歲用一隻二歲二隻至五六十歲亦遞加之晚蠶沙二兩用水五六碗煎至三碗以厚紙封砂鍋中開一孔如錢大病人就之以薰蒸其痛處雖年久症不過治五六次即愈永不再發咽喉凡咽喉之腫腫於咽之兩旁為雙蛾腫於一邊者為單蛾其形圓突與纏喉風之滿片紅腫者不同大約多由於火而亦有陰虛水虧陰盛隔陽者果系實火必有火症可驗自當用清涼解毒之藥若因酒色過度以致真陰虧損此腎中之虛火也非壯水不可又或火虛於下隔陽於上此無根之火即腎中真寒症也非溫補命門不可內經云驟起非火緩起非寒故忽然而痛難忍者寒症也悠緩而痛者乃系熱症也如忽然腫大製藥不及恐閉塞咽喉速將小竹削尖刺破以出其血此亦不得已救急之策咽喉列方甘桔湯微涼治一切咽乾咽痛桔梗甘草各一錢五分水煎如治蛾喉加荊芥穗牛蒡子各一錢燒鹽散和治喉中懸癰垂長咽有妨礙白鹽燒過枯礬等分研細末蘸少許點之即消消毒涼隔散寒微散治咽喉初起腫痛黃芩黑梔各一錢五分連翹二錢牛蒡子一錢薄荷七分甘草一錢皂角散治雙單蛾喉皂角揀新的蟲蛀者勿用研細末好醋調勻以鵝毛蘸藥入喉攪動以出其痰另用此藥醋開塗喉外干則隨換功效甚速或用真桐油一分蘸藥卷攪喉內則痰隨油吐亦佳愈後均宜加味甘桔湯煎甘草水飲可解油氣指甲散治喉蛾手指甲焙焦六分燈心燒灰一分或五釐共研細末吹入患處其蛾即破破後亦服甘桔湯地黃滋陰湯補治咽喉腫痛日輕夜重痰聲如鋸者熟地五錢茯苓三錢麥冬去心萸肉各二錢牛膝鹽水炒一錢五分北味七分薑桂飲大熱治頃刻間咽喉痛極難忍肉桂去皮乾薑炒黃炙草各五分用滾水半碗將藥共燉好去渣候溫緩緩飲之一方用生附子一厚片塗白蜜炙透變黑色取如豆大一粒含口內咽津亦立刻見效八味地黃湯溫補治隔陽喉痹或因色欲傷精或因泄瀉傷腎或因過服寒涼以致火不歸元上熱下寒者熟地四錢淮山炒二錢澤瀉鹽水炒萸肉各一錢五分白芍酒炒元參各一錢茯苓錢五分肉桂去皮另燉六分水煎前方薑桂飲與炙附子粒亦可用眼目凡人六腑五臟之精華上注於目而為之睛肺之精為白眼筋之精為黑眼骨之精為瞳子血之精為絡毗肉之精為約束蓋風熱之邪上攻於目則赤腫疼痛白精赤火乘肺也黑精赤火乘肝也瞳仁赤火乘腎也目胞腫火乘脾也兩眥赤火自甚也其或隱澀難開羞明多淚暴生雲翳皆屬火症除此之外而一切目視無光及昏黑倦視非陰虛即陽虛不可混治又云腫而硬者屬熱盛也宜先清涼腫而軟者屬風盛也宜先發散病分新久障有內外新病多實久病多虛外障多火內障皆虛治各不同不可執一眼目列方密蒙花湯和散治風熱上攻兩眼昏暗眵淚羞明並赤腫翳障甘菊花三錢密蒙花羌活木賊石決明杵白蒺藜炒各一錢五分水煎如火盛加黃連五六分瀉肺湯涼散治肺受風熱七情鬱結風毒上攻眼目忽然腫痛難開者羌活元參桔梗各一錢五分川地骨一錢桑白皮二錢甘草一錢加減徙薪飲寒治目赤腫疼痛黃芩山梔杵炒黑白芍酒炒丹皮茯苓各一錢五分菊花二錢甘草六分八味還睛湯涼散治肝肺停留風熱翳膜遮睛痛澀眵淚決明子炒一錢五分白蒺藜炒去刺防風木賊山梔仁杵各一錢青葙子半炒四分蟬蛻去頭足四隻麥冬去心一錢細甘草六分抑肝順氣湯涼補行滯治眼紅不退氣滯血凝上攻頭目眼眶脹痛柴胡青皮生地草決明當歸各一錢五分香附酒炒杵二錢黃芩一錢白芍藥酒炒一錢五分川芎一錢甘草七分菊花飲微涼治目赤腫疼痛眼科藥多系寒涼看病加之白菊花二錢水煎如兩眼角肉綻者瀉心火為主加黃連六分黃芩一錢連翹一錢五分麥冬一錢五分甘草七分燈心一團白睛紅多者瀉肺火為主加桑白皮二錢黃芩一錢黃連四分黑梔升麻各一錢連翹一錢五分黑睛腫痛者瀉肝火為主加龍膽草青皮各一錢黃連三分草決明一錢五分甘草七分瞳神昏暗瀉腎火為主加生地澤瀉黃柏各一錢五分連翹一錢升麻七分黃連三分甘草六分又云紅絲侵黑珠者加桑白皮三錢目中紅絲多者加山梔仁三錢血灌瞳仁兩目通紅者加石膏大黃各二錢瞳仁端正不動者加新瓦焙燥蜣螂蟲研末三錢蟹眼蝦眼突出老膜者加千里明三錢石燕一錢五分視人長大似兩人者加青葙子三錢眼內如針刺者加大黃山梔仁各二錢兩目黑珠紅而白珠不紅者加茜草赤芍梔子仁各二錢白珠紅而黑珠不紅者加百合梔子仁各二錢黃連六分助陽和血湯微補兼散治眼發之後熱未退清白睛赤色隱澀難開而多眵淚者炙耆當歸酒洗各一錢五分柴胡一錢防風七分升麻蜜炙三分白芷六分荊子杵五分炙草四分駐景丸補治肝腎氣虛而目昏暗熟地七錢當歸五錢絲餅一兩杞子七錢北味三錢車前六錢楮實四錢川椒去合口者三錢煉蜜為丸如緑豆大每服三錢酒下或白湯下六味地黃湯補治腎水虛目視無光乾枯少潤熟地四錢淮山二錢萸肉茯苓各一錢五分澤瀉鹽水炒丹皮各一錢如腎火虛加製附子一錢肉桂四分加味四君子丸補治虛寒目疾潞黨參去蘆炒一兩白朮炒八錢川椒去合口者一錢五分絲餅七錢肉蓯蓉酒洗淡五錢茯苓四錢炙草二錢煉蜜為丸如緑豆大每服三錢白菊花湯下六一丸熱補治血虛目暗當歸五兩製附子五錢煉蜜為丸如緑豆大每服二錢酒下羊肝丸微補治目疾內障夜明沙淘淨蟬蛻去頭足當歸木賊去節等分為末用羊肝去筋膜煮熟搗爛為丸如緑豆大每服三錢白湯下百靈粉和治雞朦眼夜不見路者鍋底煙要燒草者方好燒柴者勿用二錢研細末用煮熟豬肝切片蘸而食之即愈治青盲奇方用白犬生子目未開者之乳頻頻點之雖十年久疾亦愈治胬肉方用雀糞研如香灰細乳汁和勻點之能去目中胬肉亦可止淚雀即是在屋檐為巢者立消膏治浮翳宿障霧膜遮睛雪白生鹽用淨磁器碗研如香灰細用大燈心蘸鹽少許輕手指定浮翳點上三四次即愈亦無痛癢去膜眼藥方治膜如米碎粒者甚效惟如梅花片者頗難海螵蛸去淨硬皮二錢腦片一分共研末如香灰細以入口無渣為度用燈心染生蜜糖蘸藥少許點患處日數次如眼內無膜不論何等眼藥切不可點入慎之凡欲退膜如蟬蛻蛇蛻木賊青葙子密蒙花草決明石決明夜明砂之類皆宜服洗眼方凡用寒涼藥點眼洗眼多致逼熱入內往往誤事惟天然水最善天然水即龍口水若無則用水從地脈來者用潔淨器煎滾傾入茶盅內候少溫揀新白絹一塊放水內洗眼日洗三五次火氣自退最穩最驗齒痛此症不過曰火曰蟲及風寒而已火痛多腫喜飲冷得冷則更疼者讎仇之意也蟲痛則一牙作痛蝕盡一牙又蝕一牙作痛也風寒者因客寒犯腦齒連頭痛是寒邪也故喜熱飲不腫不蛀也又云實火痛不可忍虛火其痛甚緩日輕夜重以手按其痛處實者熱也虛者風也當辨而治之齒痛列方消胃湯寒治胃火牙痛生地二錢當歸一錢五分黃連六分升麻一錢丹皮三錢如腫痛牙齦不出血者屬氣分加荊芥一錢防風一錢細辛四分滋陰清胃飲寒治胃火兼陰虛牙痛者生石膏杵二錢熟地四錢澤瀉鹽水炒一錢五分安腎湯補治虛火牙痛熟地四錢淮山炒枸杞各二錢茯苓牛膝鹽水炒萸肉各一錢五分水煎或加肉桂四分澤瀉一錢五分以引火歸位加味溫風湯大熱兼散治寒邪犯腦牙連頭痛者當歸川芎羌活各一錢五分蜂房炙一錢細辛四分蓽茇七分麻黃去淨節六分附子制一錢水煎服一半口含一半久之連涎吐出自愈丁香散治牙痛蓽茇丁香蠍梢川椒炒等分為末每用少許擦於患處又方細辛三分北味三分共搗為丸塞患處立效如神散治風牙蟲牙疼痛川椒炒二錢蜂房炙三錢共研細末每用二錢水煎數沸乘熱漱之立效散治風蟲牙痛良薑草烏細辛荊芥穗等分為末用少許擦牙有涎則吐之治蟲牙奇方川椒樟腦等分研末放銅杓內以盅蓋好周圍以面封固置風爐內微火升之少頃覺聞樟腦氣透出即取起在地上候冷揭開藥俱飛上盅蓋以少許塞牙痛處立愈殺蟲散治牙蟲痛在一處無論有膿無膿皆是雄黃揀明淨的六錢研細末用真芝麻油一盅調勻口含片時漱出再含再漱數次即愈又方五倍子煎濃汁含漱數次其蟲立死上牙痛韭菜子燒煙用筆管吸而薰其痛處如痛在下牙則煎濃汁不時含漱之人中白散治走馬牙疳牙床出血潰爛並治咽喉腫痛腐爛紅赤者元明粉五分人中白一錢真青黛兒茶真硼砂各一錢馬屁勃五分加頂上冰片二分共研極細末摻之如咽喉病則用筆管吹入日三次夜二次養牙法凡人牙將脫落必先浮突故欲養牙者須每日將牙輕輕咬實漸咬漸齊而牙自固又當於早起時咬定牙根而後小解非獨養牙亦且固腎飯後必漱齒至老不壞耳鼻凡耳之聾閉若由諸經之火壅塞清道而然者其症必哄哄熇熇或脹悶或煩熱或兼頭面紅赤清其火而閉自開至於肝膽氣逆風寒外感挖損震傷年老病後皆能致病治法多端惟鼻病只有外感與內傷二者而已耳症列方清化飲涼治內火上炎耳閉生地茯苓各二錢黃芩一錢麥冬去心白芍酒炒丹皮石斛各一錢五分柴胡清肝飲涼治怒動肝火而耳閉柴胡白芍酒炒各一錢五分黑梔連翹黃芩各一錢甘草七分地黃湯補治腎虛耳聾腎虛耳響其聲小與火熱上炎肝氣內動者不同熟地四錢淮山炒杞子茯苓各二錢萸肉一錢五分絲餅三錢如腎有邪火則去杞子絲餅加澤瀉一錢五分黃芩知母各一錢耳聾外治方真磁石一粒如豆大川山甲二分炙研末用綿少許撒藥末其上實包磁石塞耳口內含生鐵一塊如聞風雨之聲即通白龍散治耳有膿水不幹枯礬四分龍骨一錢五分共研末先用綿杖攪淨膿水然後將藥少許吹入日二三次又方亦將綿杖攪淨取菖蒲根水洗去泥搗汁一杯灌入浸洗數次即愈燒酒洗方治耳被挖傷內常濕而不幹者用三熬燒酒灌入耳內浸洗數次即干鼻症列方川芎飲和散治風寒鼻塞羌活川芎藁本白芷各一錢蒼朮米泔水浸一錢五分細辛四分甘草七分蔥白三寸蒼耳散和散治鼻流濁涕名鼻淵者辛夷仁薄荷葉各二錢五分蒼耳子一錢二分白芷五錢共為細末每服二錢茶清或蔥湯食後調下細辛散治鼻齆有齆肉不聞香臭瓜蒂細辛各一錢共研細末綿裹如豆大塞鼻內白礬散治鼻生瘜肉白礬煅研細末以綿咽脂包少許塞鼻內數日瘜肉隨落心腹痛此症須分虛實寒熱凡可按為虛拒按為實久痛為虛暴痛為實得食略可者為虛脹滿畏食者為實痛徐莫得其處者為虛痛劇一定不易者為實無脹無滯者多虛有物有滯者多實又云熱在上者必有煩熱焦渴喜冷等症熱在下者必有脹熱祕結等症三焦痛病惟因寒滯氣滯食滯者最多因蟲因火因痰因血者皆能作痛但痰痛蟲痛多在中焦火痛寒痛三焦俱有血痛則多在下焦然血症痛婦人所常有男子雖有亦少也宜辨之心腹痛列方香附湯和治心氣痛香附酒炒杵二錢加生薑二片鹽少許同瘦豬肉煎去藥連肉食荔香散和治心腹胃脘久痛屢觸屢發者婦人多有此症服之最效荔枝核燒微焦五錢木香四錢研末每用一錢二分清湯調下姜附散熱治心胃痛良薑酒炒香附醋炒研末因寒痛者姜加倍因氣痛者附加倍每服二錢米湯下或白湯下亦可百合湯和治心口痛服諸熱藥不效者烏藥二錢百合七錢丹參飲微涼治心痛及胃脘諸熱痛婦人更效丹參四錢檀香五分砂仁杵五分藿香飲溫治腹痛藿香三錢加生薑二片紅棗二枚煎香砂六君子湯補行滯治胃脘虛痛黨參去蘆米炒二錢白朮淨炒半夏制茯苓藿香各一錢五分砂仁杵五分陳皮一錢炙草七分加生薑二片煎寒加煨姜二大片或加乾薑五七分如心悸喜按得食少愈二便清利者宜服歸脾湯加石菖蒲七分排氣飲和行滯治胃脘氣逆脹痛胸脅脹痛亦治陳皮枳殼麵煨去瓤藿香各一錢五分木香七分香附杵澤瀉鹽水炒烏藥各二錢厚朴制一錢如食滯加山楂麥芽各二錢寒滯加乾薑吳萸肉桂之屬氣逆甚者加白芥子沉香檳榔之屬嘔而兼痛者加半夏丁香之屬痛在小腹者加小茴香兼疝者加荔枝核煨焦搗碎二三錢金鈴子散微涼治心腹痛及脅痛服熱藥而增痛者元胡索金鈴子等分研末每服三錢酒調下加味附子理中湯大熱峻劑治寒痛綿綿不休手足俱冷者黨參去蘆米炒二錢白朮淨炒當歸各一錢五分乾薑炒附子制木通各一錢吳萸泡六分肉桂去皮另燉四分炙草七分痰飲腹痛列方二術半夏湯和治痰飲此症痰聚則痛散則響白朮淨三錢蒼朮米泔水浸一錢半夏制白茯苓各二錢炙草七分加生薑二片煎如寒乾薑附子任加隨宜傷食腹痛列方加味平胃散和消食治傷食痛噯腐吞酸惡食腹脹其痛或有一條扛起者蒼朮米泔水浸厚朴制麥芽炒穀芽炒陳皮半夏制山楂各一錢五分炙草一錢如脹甚者加研生萊蔔子二錢食尚在胸中者服此湯後以手探而吐之腹脹拒按大便不通服承氣湯下之生韭飲和治食鬱久胃脘有瘀血作痛者生韭菜搗自然汁一盞加溫酒一二杯服或先嚼桃仁十餘粒用韭汁送下亦佳胸痛列方加味百合湯微涼治胸膈痛烏藥一錢五分百合四錢貝母杵栝蔞皮各二錢薤白三錢白蔻去谷杵七分顛倒木金散和治胸痛木香鬱金共研末氣鬱痛者倍木香血鬱痛者倍鬱金每服二錢老酒調下虛弱者煎參湯下神香散和治胸脅胃脘作痛逆氣難解者三焦滯皆可解丁香白豆蔻去殼等分研末每服五七分白湯下日數服不拘若寒氣作痛者薑湯調下脅痛列方柴胡疏肝湯和治肝實脅痛陳皮川芎各一錢白芍酒炒枳殼麵煨去瓤香附杵柴胡各一錢五分甘草五分左金湯寒治肝火脅痛白朮淨陳皮各一錢五分黃連八分吳萸泡四分水煎導痰湯治胸脅痛屬痰者茯苓二錢南星一錢制枳殼麵煨去瓤半夏制陳皮各一錢五分甘草六分生薑三片枳芎湯和治脅痛屬瘀血者枳殼麵煨去瓤鬱金川芎各一錢五分甘草六分水煎加味逍遙飲兼補治肝虛脅痛白朮淨茯苓當歸白芍酒炒柴胡各一錢五分川芎陳皮各一錢細辛四分薄荷三分炙草六分生薑三片小腹痛列方吳萸四逆湯大熱峻劑治中寒小腹痛甚附子制乾薑炒各一錢吳萸炙草各一錢水煎奔豚丸大熱峻劑治小腹氣結作痛川楝子五錢茯苓七錢五分橘核五錢五分荔枝核四錢燒焦製附子二錢五分吳萸泡三錢五分肉桂去皮一錢五分木香末三錢五分小茴香七錢五分共研末煉蜜為丸如緑豆大每服三錢白湯下臍腹痛列方五苓湯微熱治臍下痛近逼膀胱小便不利者白朮淨一錢五分茯苓二錢肉桂去皮另燉三分澤瀉鹽水炒豬苓各一錢五分通關飲微涼治臍下脹痛因陰虛陽氣不化小便點滴俱無者黃柏知母各一錢五分肉桂去皮另燉五分水煎真武湯熱治臍下痛水臟虛寒者白朮淨炒附子制各一錢五分白芍酒炒茯苓各二錢加生薑三大片煎小便利減茯苓泄瀉去白芍加乾薑七八分嘔加製半夏一錢五分四逆加白芍湯大熱峻劑治腎氣虛寒臍中痛不可忍而喜按者白芍酒炒三錢乾薑炒附子制各一錢炙草七分如口中熱渴腹滿拒按大便祕者此方不合宜服承氣湯加減四物湯補微熱治臍旁左右痛生黃耆一錢五分當歸二錢川芎一錢五分肉桂去皮另燉四分白芍藥酒炒一錢五分紅花六分炙草七分加生薑三片水酒各半煎蟲痛列方蔥油飲和治脾胃蟲痛渴或飲水口吐清水者是此症蔥白汁一酒杯真芝麻油一酒杯先飲蔥汁隨即飲麻油川椒烏梅湯溫治脾胃蟲痛其痛有時者是蟲症川椒去合口的一錢五分烏梅二隻加生薑三片煎又方明雄黃白礬雞心檳榔等分研末用飯和丸如緑豆大每服五分蕪荑散和治諸蟲木香一錢白蕪荑雞心檳榔各二錢共研末五更時先吃炙肉引蟲頭向上以石榴根煎湯開散服二錢而蟲自下腰痛此症凡戚戚悠悠屢發不已者腎之虛也遇陰雨或久坐痛而重者濕也遇諸寒而痛或喜暖而惡寒者寒也遇諸熱而痛及喜寒而惡熱者熱也鬱怒而痛者氣之滯也憂愁思慮而痛者氣之虛也勞動即痛者肝腎之虛也腎虛之人形色必清白或見黧黑或行立不支臥息少可或疲倦無力而勞動益甚積而漸者多不足暴而痛者多有餘如腰腎本無虛損只因邪火蓄結者必痛極必煩熱或大渴引飲或二便熱澀不通當直瀉其火水虧火盛者宜兼滋陰諸如此類須辨而治之腰痛列方五積散溫散治腰骨腳骨痠痛寒邪客於經絡者當歸蒼朮米泔水浸陳皮各一錢麻黃去淨節厚朴制乾薑枳殼麵煨去瓤各八分半夏制白芷各七分黨參去蘆桔梗肉桂去皮另燉茯苓各五分川芎四分加生薑三片蔥三莖煎除濕湯和治中濕身重腰腿疼痛大便溏小便或澀或利蒼朮米泔水浸厚朴制半夏制茯苓各一錢五分陳皮七分藿香炙草各五分加生薑三片紅棗二枚煎如兼風邪加羌活一錢獨活一錢五分白朮湯補治腰濕痛如系重物者白朮淨八錢生薏米七錢水煎如系寒熱去薏米加乾薑一錢知柏八味湯寒兼補治陰虛水虧火盛腰痛者生地四錢淮山茯苓各二錢萸肉澤瀉鹽水炒知母黃柏丹皮各一錢五分加味四物湯寒兼補治陰虛火盛腰痛生地四錢當歸二錢黃柏知母各一錢白芍酒炒梔子杵各一錢五分川芎一錢蒼朮湯寒治濕熱腰腿疼痛柴胡黃柏各一錢五分蒼朮米泔水浸二錢防風一錢水煎如痛甚加生薑汁沖藥服大分清飲寒治積熱閉結小水不利以致腰腹下部痛極者茯苓澤瀉鹽水炒豬苓各二錢木通枳殼麵煨去瓤車前各一錢梔子杵一錢五分如內熱甚者加黃芩黃柏龍膽草之類大便堅硬脹滿者加大黃二三錢六味補腎丸補治腎水虛腰痛者熟地八錢淮山炒五錢萸肉四錢丹皮一錢五分茯苓二錢澤瀉鹽水炒一錢杜仲鹽水炒三錢牛膝鹽水炒故紙鹽水炒各一錢鹿茸酥炙二錢煉蜜為丸如緑豆大每服三錢淡鹽湯下八味補腎丸熱補治腎火虛腰痛者熟地八錢淮山炒五錢萸肉四錢丹皮一錢五分茯苓二錢杜仲鹽水炒三錢澤瀉鹽水炒牛膝鹽水炒故紙鹽水炒附子制各一錢鹿茸酥炙二錢肉桂去皮另研七分煉蜜為丸如緑豆大每服三錢淡鹽湯下杜仲湯補治腎虛腰痛腳軟川杜仲鹽水炒去絲一兩酒水各半煎當歸地黃湯補治腎虛腰骨疼痛熟地五錢淮山炒杜仲鹽水炒當歸各二錢萸肉一錢牛膝鹽水炒一錢五分炙草八分如下部虛寒加肉桂五六分甚者加製附子一二錢多帶濁者加故紙一錢或金櫻子二錢氣虛加黨參二錢枸杞二錢胡桃湯溫補治腎虛腰痛故紙鹽水炒一錢五分川杜仲鹽水炒胡桃肉杵各四錢水煎鹿茸丸補治腎虛腰痛不能轉側鹿茸酥炙絲餅各一兩舶茴香五錢研末用羊腰子二隻酒煮爛去膜共藥末搗如泥和丸如緑豆大每服三錢溫酒或淡鹽湯下青娥丸溫補治腎虛腰痛益精助陽烏須壯腳力胡桃肉一兩川杜仲鹽水炒八錢破故紙鹽水炒大茴香巴戟天各四錢共研末煉蜜為丸如緑豆大每服三錢溫酒下補髓丹溫補治老人虛弱腎傷腰痛不可屈伸杜仲鹽水炒去絲十兩鹿茸酥炙四兩補骨脂四兩用芝麻五兩同炒以芝麻黑色無聲為度去芝麻不用共為細末用胡桃肉三十個水浸去皮搗為膏入面少許和丸如緑豆大每服三錢白湯或溫酒下瘀血腰痛列方鹿角飲和治瘀血腰痛如刺鹿角炒一兩研末酒開每服三錢舒筋湯熱治閃跌血滯腰腹疼痛元胡索當歸肉桂去皮等分為末每服二錢溫酒下或用白湯沖酒一杯下亦可生軍散治閃跌腰痛及肩挑重物受傷初時不覺日久方痛者亦效生大黃八錢研末先以蔥白搗爛炒熱於痛處擦遍隨用生薑汁調大黃末敷蓋以粗紙一日一換並儘量飲好燒酒極效熱症凡熱過即退者潮熱也熱而尚微者溫熱也常熱不已者壯熱也又有午前熱午後熱日靜而夜熱者熱病雖多屬陽當分真假如大便乾結小便赤澀神氣清明聲音強壯者實熱也藥須清涼或肢體發熱大便溏泄小便清長聲微氣短者虛寒也藥宜溫補又云口或渴唇或紅好飲冷水者真熱也口不渴唇不紅好飲滾湯者真寒也倘辨之不明以假作真殺人如反掌熱症列方石斛青蒿湯涼治火之微非壯熱者石斛三錢銀花麥冬去心川地骨各二錢丹皮一錢青蒿連翹黑山梔杵各一錢五分加淡竹葉十片燈心一團煎口渴加花粉二錢抽薪飲寒治諸火熾盛而壯熱者石斛一錢五分黃芩梔子淨仁炒杵枳殼麵煨去瓤澤瀉鹽水炒黃柏木通各一錢甘草五分如熱在經絡肌膚者加連翹花粉以解之熱在血分大小腸者加槐花黃連以清之熱在陽明頭面或躁煩口渴便實者加生地石膏以降之熱在下焦小水痛澀者加車前龍膽草以利之倘痛未除則去甘草用甘草梢一錢熱在陰分津液不足者加生地麥冬白芍之類以滋之熱在腸胃大便閉結者加大黃朴硝以通之一陰煎涼補治水虧火勝而熱者熟地四錢生地二錢白芍酒炒麥冬去心丹參各一錢五分甘草七分如火盛躁煩者加龜膠二錢心虛不眠者加當歸炒棗仁汗多煩躁加五味子或再加淮山萸肉女貞子吐血衄血加澤瀉以降之加茜根川續斷以澀之人參清肌湯補微散治午前潮熱氣虛無汗者黨參去蘆米炒白朮飯蒸白芍酒炒當歸茯苓柴胡各一錢五分乾葛二錢甘草七分加生薑二片紅棗二枚煎白朮除濕湯寒補治午後發熱背惡風四肢沉困小便色黃者又治汗後發熱黨參去蘆二錢生地白朮淨川地骨茯苓各一錢五分澤瀉鹽水炒知母各一錢炙甘草七分二皮四物湯涼補治日靜夜熱者生黨參去蘆白芍酒炒丹皮沙參各一錢五分川地骨二錢生地一錢甘草六分水煎如體質寒者去生地加煨姜一片當歸補血湯補治血虛身熱或口渴目赤面紅者黃耆炙六錢當歸一錢水煎四君加耆湯補治陽虛外熱黨參去蘆米炒二錢炙耆白朮淨茯苓各一錢五分炙草一錢加生薑二片大棗二枚煎補中益氣湯補治虛弱人困勞心勞力以致表熱自汗頭痛口乾不任風寒四肢困倦懶於言語者炙耆黨參去蘆米炒白朮淨各一錢五分陳皮七分歸身一錢柴胡四分升麻蜜炙三分炙草六分加生薑二片大棗一枚煎十味地黃湯熱補治陰盛隔陽真寒假熱上則唇焦口燥下則大便溏小便或清者熟地四錢淮山二錢萸肉澤瀉鹽水炒茯苓丹皮各一錢五分肉桂去皮另燉五分白芍酒炒附子制元參各一錢加減聖愈湯補治寒熱往來非若瘧疾之發有定候者黨參去蘆米炒二錢炙耆歸身柴胡各一錢五分熟地四錢白芍酒炒一錢炙草八分加生薑一片紅棗一枚煎附諸熱方柴防煎散微涼治溫熱時症柴胡防風桔梗各二錢甘草一錢水煎柴葛解肌湯寒散治溫熱症發熱頭痛不惡寒與傷寒異者柴胡葛根黃芩丹皮各一錢五分生地二錢赤芍貝母杵知母各一錢甘草六分生熟地黃湯涼兼補治燥症其人鼻乾口渴咽痛舌燥目火便祕乾熱惟秋冬時久晴乃有此病而吸鴉片者更易犯不可發散熟地三錢生地二錢天冬麥冬去心歸身花粉各一錢五分沙參二錢元參一錢加蔗汁一酒杯沖服或藕汁梨汁均可不寐此症當分有邪無邪有邪者神為病擾則不靜不靜則不寐乃實症也去其病則寐矣若無邪者皆由營氣之不足營主血血虛則無以養心心虛則神不守舍故或為驚惕或為恐畏或有所繫懸或多所妄思以致神魂不安終夜不寐此虛症也治之者宜以養營氣為主又云茶性陰寒陽為陰抑則不寐心本藏神心有事動而不靜則不寐不寐列方酸棗仁湯補微涼治氣血俱虛內無津液煩熱驚悸不寐者黨參去蘆棗仁即炒杵各一錢五分麥冬去心二錢龍眼肉六分竹葉十片炙草七分養心湯補兼涼治體質素弱或病後思慮過多心虛驚悸不寐熟地二錢生地酒炒一錢黨參去蘆棗仁即炒杵麥冬去心各一錢五分歸身茯苓各一錢炙草七分加五味子十五粒燈心一團煎補心湯涼補治思慮過多心神潰亂煩躁不寐者生地酒炒茯苓各二錢棗仁即炒杵當歸硃砂末拌蓮仁去心麥冬去心各一錢五分竹葉十片甘草七分加燈心一團煎益營湯補治思慮過度心血耗傷怔忡恍惚不寐黨參去蘆米炒二錢炙耆一錢棗仁即炒杵茯神當歸各一錢五分遠志去心三分白芍酒炒一錢炙草六分加生薑二片木香三分煎附驚悸列方遠志飲溫補治心勞虛寒夢寐驚悸黨參去蘆米炒當歸酒炒棗仁即炒杵茯神各一錢五分遠志去心四分黃耆炙一錢肉桂去皮另燉三分炙草六分加生薑二片煎酸棗仁湯亦治驚悸方在不寐內平補鎮心丸補微涼治心血不足時或怔忡夜多亂夢如墜崖谷常服安心腎益營衛黨參去蘆米炒五錢熟地酒蒸淮山薑汁炒茯神各四錢龍齒煅麥冬去心各三錢棗仁即炒杵天冬北味各二錢遠志去心一錢當歸三錢煉蜜為丸如緑豆大每服三錢米飲或溫酒下如欲溫補者加肉桂二錢鎮驚丹補治夜睡驚悸當歸三錢硃砂研末二分豬心一隻切片同蒸連汁食附身癢列方荊防生地湯涼散治身癢難忍防風荊芥各一錢赤芍生地銀花各八分木通五分甘草三分二味消風散散治同上薄荷葉蟬蛻去頭足等分研末每服二錢溫酒調下洗身去癢方用浮萍煎濃湯洗之即愈不思食凡人精血之司在命門水穀之司在脾胃脾胃者具坤順之德而有乾健之運也故坤德或慚補土以培其卑監乾健稍弛益火以助其轉運逮土強火旺則出納自如轉輸不息即能食矣世俗不悟每見不能食者便投香砂枳朴面卜楂芽等藥甚至用黃連山梔以為開胃良方害人不少又有辨於其微者不飢不思食是脾病飢不能食是肝病治者其審之不思食列方和中湯補開胃進食黨參去蘆米炒三錢白朮淨二錢木瓜去瓤陳皮各一錢砂仁杵六分炙草七分加煨姜三片紅棗二枚煎如胃寒去煨姜換用乾薑五七分或一錢隨宜加味四君湯補治脾胃氣虛口淡食不知味及耳鳴腳軟虛弱等症黨參去蘆米炒二錢黃耆炙白朮淨白扁豆炒杵茯苓各一錢五分炙草七分加生薑二片大棗二枚煎六君加味湯補微熱治脾胃虛弱及過服涼藥以致飲食少思或吞酸噯腐或噁心嘔吐或米穀不化者黨參去蘆米炒二錢白朮淨炒茯苓各一錢五分炮姜一錢半夏制一錢五分陳皮炙草各一錢加生薑二片大棗二枚煎如有滯加木香砂仁丁香茯苓湯大熱行滯治脾胃虛寒宿食留滯否塞疼痛氣不升降以致嘔吐涎沫或嘔酸水不思飲食陳皮半夏制茯苓各一錢五分丁香三分附子制砂仁杵各五分肉桂去皮另燉四分炮姜七分木香六分加生薑三片大棗二枚煎附傷食列方凡人必有胸悶吞酸噯腐腹脹腹痛等方是此症若無此等症但見頭痛發熱乃是外感切不可誤用消導藥以引邪入里變症百出為害非輕平胃散加味和治傷食蒼朮米泔水浸一錢五分厚朴薑汁炒一錢陳皮一錢炙草七分加生薑二片紅棗二枚煎如傷米麵之食加穀芽麥芽神麯傷肉食加山楂神麯或加蘿蔔子以消之食尚在膈服藥後以手探吐其愈最速傷食已久腹滿拒按須用承氣湯下之下後服香砂六君加炮姜以調養脾胃霍亂此症上吐下瀉有外受風寒寒氣入臟而病者有不慎口腹內傷生冷而病者有因事忍飢胃氣已傷而病者有一時過飽食不能化而病者有水土氣令寒溫不時遇之而病者有旱潦暴雨清濁相混感之而病者總之皆是寒濕傷脾之症又有轉筋霍亂者其足腹之筋拘攣急痛甚至牽縮陰丸痛迫小腹最為急候此足陽明厥陰氣血俱傷之症也更有乾霍亂者其症上欲吐而不能下欲瀉而不得胸腹脹急疼痛俗名為絞腸痧此必內有飲食停滯外有寒邪閉遏陰陽拒格氣道不通尤為危急宜先用鹽湯探吐去滯隔以通清氣然後服溫中散滯之藥庶無所誤凡霍亂吐瀉之後胃氣未清一切飲食之物稍遲為佳雖粥湯亦不可急與若其邪滯復聚則為害不小霍亂列方加味二陳湯和治霍亂嘔吐或兼瀉陳皮一錢藿香茯苓各二錢五分製半夏二錢炙草一錢生薑三片藿香正氣湯和治感四時不正之氣霍亂吐瀉頭痛寒熱往來者藿香紫蘇白芷大腹皮酒洗桔梗各一錢厚朴薑汁製白朮淨白茯苓陳皮半夏制炙草各八分加生薑三片紅棗一枚煎一味簡便方和治霍亂樟木皮一兩水煎服又方吐瀉不止用艾一把煎濃服六和湯和治夏秋暑濕傷脾或飲冷乘風多食瓜果以致客寒犯胃食留不化遂成霍亂黨參米炒去蘆半夏制砂仁杵各一錢扁豆炒杵藿香赤茯木瓜各二錢炙草一錢加生薑三片紅棗一枚煎平胃散和治脾胃不和脹滿嘔吐霍亂等症藿香一錢五分蒼朮米泔水浸厚朴薑汁炒陳皮各一錢加生薑二片煎如吐多加製半夏一錢五分腹痛加砂仁七分木香一錢寒加乾薑五七分或一錢冷香湯大熱峻劑治夏秋水濕恣食生冷陰陽相干遂成霍亂肚腹刺痛脅筋脹滿煩燥引飲無度者草豆蔻淨仁煨杵附子制良薑各一錢丁香七分白檀香炙草各一錢水煎候冷於嘔吐時服之附子粳米湯大熱峻劑治霍亂手足逆冷多嘔少吐者乾薑微炒一錢附子制半夏制各一錢五分炙草一錢加粳米一撮大棗二枚煎轉筋霍亂列方木瓜湯溫治霍亂吐瀉不已轉筋擾亂吳萸泡一錢茴香炒一錢木瓜三錢炙草一錢五分加生薑三片紫蘇葉十片煎四順附子湯大熱峻劑治霍亂轉筋吐瀉手足逆冷氣少不語身冷汗出者黨參去蘆米炒二錢附子制一錢五分乾薑炒炙草各一錢乾霍亂列方白礬散微涼治欲吐不出欲瀉不行兼之腹痛俗名絞腸痧者白礬一錢研末用陰陽水調服冷水滾湯各半沖勻便是陰陽水三消此症當分上中下上消者上焦病也大渴引飲隨飲隨渴以上焦之津液枯涸其病在肺中消者中焦病也多食善飢不為肌肉日加消瘦其病在脾胃下消者下焦病也小便黃赤為淋為濁如膏如脂面黑耳焦日漸消瘦其病在腎古人悉以為火然有實火者有虛火者此多真陰不足也倘不辨虛實其不誤者鮮矣天花粉乃治消渴之神藥惟半夏一味三消俱忌且血虛者禁用汗多者禁用口乾咽燥大便難者亦禁用三消列方四物湯加味補通治三消熟地四錢當歸二錢川芎一錢白芍酒炒一錢五分如上消加黨參二錢麥冬一錢五分花粉二錢北味六分以生津液或再加藕汁人乳沖藥服飲酒人宜加乾葛一錢五分中消加知母滑石各一錢五分生石膏三錢以降胃火下消加黃柏知母各一錢北味六分熟地四錢以生腎水花粉飲涼治上消生地麥冬去心乾葛花粉各二錢北味六分甘草七分加粳米百粒煎玉壺飲微涼兼補治同上生黨參去蘆三錢花粉三錢如飲酒人加乾葛一錢火府丹涼治上消心經有熱並治淋症生地三錢黃芩木通各一錢水煎人參白虎湯大寒峻劑治中消煩熱並治癍黃狂躁大渴等症生石膏三錢知母二錢黨參去蘆一錢五分甘草一錢加粳米一撮煎調胃承氣湯大寒峻劑治中消善飢而大便結者生軍二錢朴硝甘草各一錢水煎六味地黃湯加減補微涼治下消腎水虛者熟地四錢淮山二錢萸肉一錢花粉二錢茯苓一錢五分炙草七分八味地黃湯加減補微熱治下消腎火虛者熟地四錢淮山炒花粉各二錢茯苓一錢五分萸肉一錢五分澤瀉鹽水炒一錢肉桂去皮另燉五分北味六分痰飲凡水氣上逆得陽煎熬則稠而成痰得陰凝聚則稀而為飲皆以脾腎二經為主以水歸於腎而受制於脾也治之者當求其本又云飲為水液之屬凡嘔吐清水胸腹膨滿及腸胃渥渥有聲者便是若痰則稠濁無處不到五臟受傷皆能致之二者無非水穀之化但化得其正則為血氣化失其正即成痰涎痰涎日盛其人元氣之虛可知矣痰之由生有因熱者有因寒者有因風者有因濕者有因酒積者有因食積者有脾虛不能攝涎者有腎虛不能攝水者治痰必以順氣為先治飲須以溫中為要腸有水飲散則有聲聚則不利痰症列方二陳湯和通治諸痰陳皮一錢五分半夏制茯苓各二錢炙草一錢加生薑二片紅棗二枚煎如風痰加制南星一錢五分白附子一錢熱痰加黃芩一錢五分寒痰加乾薑一錢肉桂四分濕痰加蒼朮一錢五分郁痰加厚朴香附蘇葉惟燥痰則不宜此湯以有半夏茯苓其性過於滲燥也又陳修園加味方如火痰加海粉黃芩海石栝蔞仁之屬寒痰加乾薑附子風痰加天麻竹瀝薑汁制南星之屬燥痰加玉竹天冬栝蔞仁濕痰加蒼朮白朮郁痰加川芎貝母香附連翹虛痰加黨參白朮實痰加旋覆花枳實食積痰加萊蔔子痰多頭痛加天麻一錢五分膈上熱痰令人嘔吐加黃芩梔子生薑頑痰膠固加枳殼膽星嗜酒人手臂重痛麻木加蒼朮枳殼片子薑黃以上俱是治痰非治飲切勿混用然亦有用此方加前胡二錢白芥子一錢五分治停飲脅痛者六味地黃湯補治肝經血燥及腎水虧損而生痰者熟地四錢淮山二錢萸肉丹皮茯苓各一錢五分澤瀉鹽水炒一錢飲症列方澤瀉湯和治心下有支飲其人苦眩冒者凡飲症切不可用陰藥如地黃麥冬北味之類俱忌之白朮淨二錢澤瀉鹽水炒四錢大半夏湯和治飲症及脾胃不和陳皮半夏制白茯苓各二錢加生薑二片煎小半夏加茯苓湯和治飲症嘔吐心下痞膈間有水氣製半夏白茯苓各三錢加生薑五片煎茯苓甘草湯溫治水飲停蓄心下或時而悸者白茯苓三錢桂枝炙草各一錢加生薑六片煎桂苓朮附湯大熱治飲症屬虛寒者白朮淨炒茯苓各三錢肉桂去皮另燉四分附子制一錢加生薑汁半酒杯沖藥服理中化飲湯熱補治脾胃虛寒飲停於內嘔吐少食或大便不實小便或清者黨參去蘆米炒半夏制茯苓各二錢白朮淨炒三錢炮姜炙草各一錢生薑二片白朮姜附湯大熱峻劑治飲症腹痛腸內時響或嘔吐或嘔出並所下之糞如紅米粥或色帶黯黑此兼脾虛不能攝血最危之候涼藥點滴不可入口慎之白朮淨炒四錢半夏制二錢炮姜二錢白茯苓二錢附子制三錢炙草一錢五分癲狂癇此症不過調中補北瀉東南不必過求奇險癲者癡呆之狀哭笑無時語言無序其人常靜狂者罵詈不避親疏其人常動更有忽然昏倒口角流涎或作六畜聲愈後如平人作止有間斷者名之為癇此皆由痰火為病治者審之癲狂癇列方生鐵落飲寒治癲狂墜痰火鎮心神川貝杵三錢麥冬去心二錢元參一錢五分石菖蒲膽星橘紅連翹各一錢白茯神二錢用匠人所錘燒紅生鐵紛紛飛落之鐵花一大碗水煎三炷香久去鐵花取水加硃砂二分同藥煎服入竹瀝水半酒杯沖服更驗清膈煎寒治痰因火動而癲狂者陳皮一錢五分海石三錢膽星一錢白芥子五分貝母杵木通各二錢清心湯大寒峻劑治心受熱邪狂言叫罵動履失常黃連六分黃芩梔子淨仁炒杵連翹薄荷甘草各一錢大黃一錢朴硝一錢加竹葉二十片煎糞溏則去大黃朴硝苦參丸涼治狂疾觸發無時披頭大叫每欲殺人不避水火苦參二兩研末煉蜜為丸如緑豆大每服二錢白湯或清茶送下磁朱丸和治癲狂如神又治耳聾及眼目神水漸散睹物成二體內障神水淡緑淡白色均治真磁石一兩硃砂五錢神麯一兩五錢不得經火共研細末另用神麯五錢水煎乾入前藥煉蜜為丸如緑豆大每服二錢白湯下人參琥珀丸和治癲癇黨參去蘆米炒琥珀各五錢另研棗仁酒浸炒香二錢五分石菖蒲五錢遠志酒浸去心乳香制另研各四錢硃砂三錢白茯苓五錢煉蜜為丸如緑豆大每服二錢溫酒下或煎棗湯下礬朱散微涼治同上鬱金七錢白礬三錢硃砂水飛過一錢研末每服一錢薄荷湯調下青欖膏和治同上青欖子十斤入石臼內搗爛用砂鍋煎至無味去渣熬成膏加入白礬末八錢攪勻每早晚服一小酒杯滾水開下或用銅鍋煮熬俱可參朮茯神湯補治癲狂癇愈後培補黨參去蘆米炒白朮淨半夏制各二錢石菖蒲一錢茯神硃砂末拌五錢絲餅三錢炙草一錢製附子一分卷三嘔吐此症必有所因因寒滯者腹多疼痛因食滯者胸多脹滿因氣逆者脹連脅肋因火鬱者渴而躁熱因痰飲者必先渴水因風邪者每兼發熱若無此諸症悉屬胃虛王太僕曰食不得入是有火也食入反出是無火也即此二語可辨寒熱嘔吐列方勿混作翻胃治二陳湯和治脾胃不和而嘔吐陳皮茯苓各一錢五分半夏制二錢炙草七分加生薑三片煎食入而出是寒症加藿香一錢五分炒砂仁五分煨姜三大片寒甚則不用煨姜加乾薑五六分或一錢食不得入是熱症加黨參一錢五分黃芩一錢黃連五分如為飲食所傷吞酸噯腐加砂仁五分蒼朮藿香麥芽山楂各一錢吐酸水加吳萸七分黃連五分嘔吐無物加黨參一錢竹茹一錢五分旋覆花二錢代赭石三分大棗三枚生薑再加二片發熱有風邪者加荊芥防風各一錢五分頭痛加川芎一錢五分脾胃虛弱而嘔吐者加炒黨參白朮各二錢炒砂仁四分木香濕紙包煨六分兼腹痛者加藿香一錢五分木香一錢或六七分隨宜竹茹湯涼治胃熱嘔吐半夏制二錢乾葛竹茹各一錢五分甘草一錢加生薑三片紅棗二枚煎葛花湯和治飲酒過多痰逆嘔吐黨參去蘆葛花白朮淨澤瀉鹽水炒茯苓白蔻杵砂仁杵各一錢豬苓陳皮青皮各七分神麯炒杵木香各五分加生薑三片煎小半夏加茯苓湯和治嘔吐心下痞膈間有水眩悸者茯苓三錢半夏制二錢加生薑三大片煎二術二陳湯和治嘔吐清水如汁白朮淨炒半夏制茯苓各一錢五分蒼朮米泔水浸切陳皮各一錢炙草七分加生薑三片紅棗一枚煎如虛寒者加黨參二錢煨姜三大片或加乾薑七八分隨宜食滯加神麯一錢砂仁五分腹痛加藿香一錢五分木香七分吳茱萸湯溫治乾嘔胸滿吐涎沫及頭痛食谷欲嘔者黨參去蘆米炒三錢吳萸泡七分加生薑五片紅棗二枚煎一方製半夏二錢乾薑一錢治乾嘔吐寒痰溫胃飲熱補治中氣虛寒嘔吐不思飲食黨參去蘆米炒三錢白朮淨扁豆炒杵半夏制各二錢陳皮七分乾薑炒八分炙草一錢如胸腹痛者加藿香一錢五分砂仁五分木香七分大嘔大吐不能止者加炒高麗參三錢炒白朮一錢另研胡椒末二分沖藥服翻胃此症當辨新久及所致之由或由酷飲無度或由傷於酒濕或由縱食生冷敗其真陽或由七情憂鬱竭其中氣無非內傷之甚以致損傷胃氣而然治之者新病可兼去滯解鬱久病必須扶助正氣健脾養脾胃為主王太僕云食入反出是無火也此誠一言而盡然無火之由而猶有上中下三焦之辨寒在上焦則多為噁心或泛泛欲吐者此胃脘之陽虛也寒在中焦則食入不化食至中脘或少頃或半日復出者此胃中之陽虛也若寒在下焦則朝食暮吐暮食朝吐乃以食入幽門丙火不能傳化故久而復出此命門之陽虛也治之者當求其本始效嘔吐方內亦有可通用初愈宜飲參湯或食稀粥飯只可食半盅由漸而加一月後乃可復常亦切不可過飽翻胃列方陳皮半夏湯和治病在上焦噁心嘔食陳皮一錢五分半夏制二錢加生薑三片煎如有痰加茯苓二錢人參半夏湯熱治上焦為寒所傷而噁心嘔食者黨參米拌炒去蘆三錢半夏制二錢乾薑八分水煎加味六君子湯溫補治病在中焦嘔而兼有痰者黨參去蘆米炒半夏制各二錢白朮淨茯苓各一錢五分陳皮炙草各一錢吳萸五分生薑三片理中加半夏湯熱補治病在中焦脾胃虛寒食入反出者黨參去蘆米炒半夏制各二錢白朮淨炒歸身各一錢五分乾薑炒蓽茇炙草各一錢右歸飲加減湯熱補治病在下焦朝食暮吐暮食朝吐食入久而反出者熟地四錢淮山炒半夏制枸杞各二錢萸肉一錢五分附子制一錢肉桂去皮另燉五分炙草七分地黃肉桂湯熱補治同上愈後宜服六味地黃丸或加肉桂黨參去蘆米炒三錢熟地四錢半夏制歸身各二錢吳萸泡七分肉桂去皮另燉六分附子散大熱治病在下焦而反胃者大附子一個新燒磚一隻將附子淬入生薑汁放在磚上四面燒紅炭火逼干再幹再逼約薑汁盡半碗研末每服一錢米飲下姜要自然汁磚要新方佳香櫞甘蔗湯和通治反胃干香櫞二大只熬濃汁甘蔗汁五碗生薑汁一茶杯和勻早晚每服大半茶杯噎膈食不得入為噎食雖入咽即帶痰吐出為膈此皆由憂愁思慮積勞積鬱或酒色過度以致血液俱耗上下乾槁而然趙養葵則歸於治腎腎乃胃之關門關門不利升降息矣惟腎旺則胃陰充胃陰充則能食以大劑六味八味地黃湯為主而高鼓峰等又宗其法而變通之專取陽明以六味地黃湯去丹皮澤瀉茯苓加甘草枸杞生地當歸使一派甘潤之藥以養胃陰胃陰上濟則賁門寬展而飲食進胃陰下達則幽門闌門滋潤而二便通服十餘劑而愈薛立齊則以歸脾六君等湯與六味八味地黃丸間服或謂此症往往六七日不大便則陳物不去宜以大黃下之隨用芝麻煎濃飲之惟張仲景之法最佳以半夏為主而降衝任之逆以人參為輔而生既亡之液若於此而得其悟機又審其寒熱虛實而施治之則善矣幸而能愈初一二日只可飲參湯與稀粥一盅三日後由漸而加十日後方可食飯然亦不得飽食飽食傷胃則病復難救噎膈列方開膈法甘蔗約四寸去皮切片如錢白米一酒杯以水潤透用磁碗一隻將蔗與米放入碗內蓋密慢火蒸成飯先取蔗與病人徐徐嚼咽其汁喉嚨乃開隨食此飯開膈後看症服藥四物加味湯補治噎膈熟地四錢當歸二錢川芎一錢黨參去蘆米炒半夏制白芍酒炒各一錢五分加甘蔗汁牛乳各一酒杯沖藥服加減六味地黃湯涼補治同上生地當歸各二錢半夏制萸肉淮山枸杞各一錢五分甘草六分如寒則去生地加熟地三錢肉桂四分附子七分甘草炙歸脾湯補治同黃耆炙黨參去蘆米炒棗仁即炒杵白朮蒸飯白芍酒炒各一錢五分當歸三錢龍眼淨肉六分木香七分遠志去心三分炙草五分如有痰涎多者加泡吳萸六分葛花半夏湯補治好飲酒人噎膈黨參去蘆米炒三錢半夏制葛花各二錢白朮淨茯苓各一錢五分陳皮一錢炙草七分生薑二片加牛乳或羊乳半茶杯沖藥服如痰涎多者加泡吳萸六分烏藥半夏湯和治氣滯人噎膈黨參去蘆米炒三錢半夏制烏藥各二錢香附酒炒杵茯苓各一錢五分陳皮去白一錢砂仁杵七分炙草六分加生薑二片煎加味照前神麯半夏湯消食兼補治不節飲食人噎膈黨參去蘆米炒三錢白朮淨炒半夏制各二錢神麯炒山楂茯苓各一錢五分陳皮去白一錢炙草七分生薑三片同煎加味照前如大便結三方俱加當歸二錢一老醫云此症宜飲牛乳或同薑汁蔗汁陳酒服均佳若徒服香燥之藥以取快一時破氣而燥血是速其死也生薑汁煎補治噎食不下咽喉閉塞胸膈煩悶高麗參去蘆米拌炒百合各二兩牛酥白蜜生薑汁各五兩共入銅鍋內煎去渣熬膏每服一酒杯緩緩咽下金銀花膏微涼治噎膈胸痛畏食者金銀花十兩水煎去渣慢火熬成膏早晚每服一酒杯米湯下枇杷葉煎兼補噎膈均治黨參去蘆米炒一錢五分半夏制二錢阿膠蛤粉炒珠一錢五分枇杷葉去毛蜜炙三錢陳皮六分炙草五分生薑三片老人噎食不通方黃雌雞肉四兩茯苓二兩白麵六兩作餛飩入白油煮食三五次即愈治噎膈奇方香櫞一隻挖通心以乾結人糞填入仍封口火煅三炷香久取出碗蓋存性研細末每服二錢黃酒下三次即效如無香櫞用蘿蔔亦可厄逆此症雖由氣逆而然然有兼寒兼熱有因食滯氣滯亦有因中氣虛陰氣竭者治之當察其聲強氣盛多宜清降聲小息微悉宜溫補若大病之後而見此者乃虛脫之厄殊非吉兆凡咂逆多至七八聲相連收氣不回者難治厄逆列方柿蒂飲和治尋常厄逆柿蒂三錢水煎一方加丁香七分治胸滿厄逆不止又方用雄黃二錢研細末酒煎令病人以鼻常聞之即愈姜蜜飲溫治厄逆久不愈連連四五十聲者生薑汁半盅加蜜調勻燉熱服安胃飲涼治胃火上衝厄逆不止黨參去蘆陳皮山楂麥芽木通澤瀉鹽水炒黃芩石斛各一錢橘皮湯微涼治氣鬱火沖厄逆黨參去蘆半夏制各一錢竹茹陳皮各一錢五分甘草八分生薑一片丁香散熱治痢後或病後胃中虛寒厄逆黨參去蘆米炒半夏制陳皮茯苓各一錢良薑五分柿蒂一錢五分丁香四分炙草五分加生薑二片煎遺精遺精之症凡有所注戀而夢者精為神動也其因在心有欲事不遂而夢者精失其位也其因在腎有勞倦而即遺者筋力不勝肝脾之氣弱也有用心過度輒遺者中氣不足心脾之虛陷也有濕熱下流相火妄動而遺者脾腎之火不清也有無故滑而不禁者下元之虛肺腎之不固也有素稟不足而精易滑者先天之元氣單薄也有久服冷利等劑以致元陽失守而滑泄者誤藥之所致也治此者當各求所因至於年壯孤眠盛滿而溢則去者自去生者自生無足為意遺精列方菟絲子湯補治腎氣虛損目眩耳鳴四肢倦怠夜夢精遺絲餅五錢淮山炒三錢石蓮去殼去心白茯苓各二錢水煎一方加五味子六分治小便不禁補心神效丸補治心神不安夜夢遺泄黨參去蘆米炒淮山炒茯神各六錢遠志去心一錢五分熟地四錢棗仁即炒杵三錢北味二錢加另研柏子仁末三錢煉蜜為丸如緑豆大硃砂為衣每服三錢黨參龍骨煎湯下遠志飲兼補治心腎不足恍惚不寧夢遺泄精高麗參去蘆米炒二錢淮山炒三錢龍齒煅一錢五分石菖蒲一錢正茯神硃砂末拌一錢五分遠志去心五分茯神湯涼補治欲心太熾而夢遺者黨參去蘆一錢五分茯神二錢生地當歸菖蒲各一錢遠志去心五分黃連三分炙草四分加去心蓮仁七粒煎金鎖思仙丹補治嗜欲太過精血不固石蓮仁去心芡實各一兩五錢蓮蕊一兩共研末熬金櫻膏和丸如緑豆大每服三錢溫酒下或淡鹽湯入酒少許送下腎虛有火而滑泄加黃柏一錢乾葛湯涼治飲酒人酒味濕熱下干精臟而夢遺者白朮淨二錢乾葛茯苓各一錢五分白豆蔻去殼杵七分黃柏三分甘草五分加味四君子湯補治肝脾氣弱勞倦即遺精者黨參去蘆米炒三錢白朮飯蒸二錢茯苓一錢五分遠志去心五分炙草一錢生薑二片紅棗二枚菟絲煎補治心脾氣弱凡遇思慮勞倦即苦遺精者黨參去蘆米炒絲餅各二錢淮山炒三錢棗仁即炒杵當歸茯苓各一錢五分遠志去心四分炙草一錢加鹿角霜研末六分沖藥服參桂湯熱補治誤服久服寒藥而遺泄者高麗參去蘆米炒萸肉各一錢五分淮山炒茯苓各二錢菟絲餅三錢肉桂去皮另燉四分固真散和澀治才睡即夢泄者韭子炒白龍骨煅各一兩共研細末每服二錢溫酒調下或白湯沖酒一杯送下金櫻子丸補澀治遺泄精滑絲餅五錢茯苓酒拌蒸曬二錢牡蠣煅一錢五分金櫻子去毛去核蒸熟二錢共研末煉蜜為丸如緑豆大每服三錢酒下或淡鹽湯下五鎖散和澀治玉門不閉遺精日久如水之漏不能關束者文蛤一兩六錢白龍骨煅二錢白茯苓四錢共研細末每服二錢淡鹽湯下臨睡再服一次治遺精奇方荷葉二兩研細末每服三錢酒調下或白湯加酒一杯送下濁症淋症濁有赤白之分並有便濁精濁之異赤濁者熱勝於濕白濁者濕勝於熱便濁色似米泔水精濁便後如膠黏之有絲此病較淋症頗輕若淋之為病古人別為勞膏石氣血五種膏淋則溺出如膏勞淋每從勞後而得石淋則溺如砂石痛不易出氣淋則氣滯不通臍下悶痛血淋則瘀血停蓄莖中刺痛此皆為熱結膀胱所致治之者當辨人有強弱病有新久用藥庶不至誤又云溺出帶赤色為赤濁鮮紅色不痛者為尿血血來而痛者為血淋精濁則是因相火妄動久而痛澀俱去均宜用寧心固腎等藥方合濁症列方加味二陳湯涼治濁病初起宜導其濕陳皮一錢白朮淨二錢蒼朮米泔水浸半夏制黃柏萆薢各一錢五分茯苓三錢甘草七分如赤濁加丹參二錢體質寒者去黃柏病頗久者當服固劑清心蓮子飲涼治赤濁屬熱者炙耆八分黨參去蘆茯苓石菖蒲各一錢遠志去心五分石蓮淨仁杵去心一錢麥冬去心川地骨黃芩車前甘草各一錢五分分清飲涼治心移熱膀胱而為赤濁並治諸淋症丹參車前各一錢五分黃柏五分川萆薢三錢白朮淨茯苓各一錢石蓮淨仁去心七分石菖蒲五分固精丸和澀治下元虛損白濁如脂小便無度並效牡蠣煅絲餅韭子桑螵蛸煅北味龍骨煅茯苓白石脂煅等分為末酒和丸如緑豆大每服二錢淡鹽湯下萆薢分清飲溫治真元不固下焦虛寒或服寒涼利藥過多小便白濁頻數無度澄如膏糊等症川萆薢益智仁鹽水炒烏藥白茯苓石菖蒲各一錢五分甘草梢一錢加鹽少許煎菟絲丸補治思慮太過心腎虛損真元不固小便白濁夢寐頻泄尿有餘瀝菟絲餅二兩五錢石蓮仁去心六錢白茯苓一兩五錢研末酒和丸如緑豆大每服二錢淡鹽湯下鎖精丸溫治白濁白帶小便頻數破故紙白茯苓五味子炒各六錢青鹽三錢研末酒和丸如緑豆大每服二錢淡鹽湯下芡實杞子湯補澀治精濁熟地三錢淮山炒二錢杞子石蓮仁去心杵芡實杵各一錢五分蓮鬚牡蠣煅各一錢白茯苓一錢五分茯神一錢水煎好另以椿根萹蓄煎汁入藥再煎服如熱加黃連六分寒加益智仁一錢五分滯加烏藥一錢五分四君子加遠志湯補治心虛白濁頗久者黨參去蘆米炒茯苓各一錢五分白朮淨二錢遠志去心五分炙草七分金櫻膏溫補治虛勞遺精白濁黨參去蘆米炒山藥各二兩益智仁鹽水炒一兩桑螵蛸瓦焙燥二兩薏仁炒萸肉各四兩川杜仲鹽水炒一兩枸杞子芡實杵各一兩五錢青鹽三錢水煎去渣熬成膏以金櫻膏對半和勻每服三四匙空心白湯調下水陸二仙丹澀微補治精脫腎虛白濁與補陰藥同服更效芡實四兩研末同金櫻膏四兩和丸如緑豆大每服三錢淡鹽湯下加味附桂地黃湯熱補治命門火衰以致敗精為濁熟地三錢淮山炒茯苓各二錢絲餅四錢萸肉車前各一錢五分澤瀉鹽水炒丹皮各一錢附子制八分肉桂去皮另燉四分淋症列方五淋散寒治膀胱有熱小水不通淋澀不出或尿如豆汁或成砂石或為膏汁或熱而便血均宜山梔淨仁炒杵白芍酒炒各二錢當歸一錢五分赤茯苓三錢甘草一錢五分燈心一團如氣淋加香附二錢荊芥麥芽各一錢五分血淋加生地牛膝各二錢紅花一錢入麝香少許石淋加六一散三錢調下膏淋合分清飲煎勞淋合補中益氣湯煎如過服金石藥與老人陽已痿而思色以降其精致精內敗而為淋者加萆薢二錢石菖蒲一錢菟絲餅三錢以導之八正散寒微峻治心經蘊熱臟腑祕結小便赤澀淋閉不通及血淋等症滑石木通車前山梔淨仁炒杵大黃瞿麥萹蓄甘草各一錢加燈心二十莖煎導赤散涼治心火及小腸有熱小便赤澀赤濁血淋而渴者生地二錢木通一錢五分甘草一錢加竹葉二十片煎一方有黨參麥冬加味六一散涼治血淋滑石三錢車前一錢甘草梢四分加生柏葉生藕節搗汁半茶杯沖藥服牛膝煎和治石淋及死血作淋痛不可忍者凡五淋小便不通莖中痛甚者均宜牛膝鹽水炒捶碎一兩濃煎去渣加麝香少許調勻早午晚分三次服如氣淋則不用麝香加乳香末一錢有遺精症者禁用牛膝發灰散和治血淋亂髮洗淨火煅透研末二錢用藕節搗汁半茶盅調服二三次愈假蘇散微涼治氣淋瞿麥赤茯麥冬去心香附杵陳皮荊芥木通各一錢海金沙散涼治膏淋海金沙滑石各五錢甘草六分共研細末每服二錢燈心湯下六味地黃丸補治淋症久而水虛者熟地一兩淮山炒八錢萸肉六錢茯苓三錢澤瀉鹽水炒丹皮各二錢煉蜜為丸每服三錢白湯下加肉桂附子治冷淋琥珀散補治老人虛人小便不通淋瀝真琥珀五錢研末用高麗參煎湯調勻每服一錢疝氣此症大抵任病肝病居多小腸病亦多各經間或有之經云男子內結七疝女子帶下瘕聚治之之法必先治氣蓋寒有寒氣熱有熱氣濕有濕氣氣實者須破氣氣虛者須補氣諸症中俱當兼用氣藥凡寒症必喜暖惡寒鼻尖手足多冷大小便亦不熱若熱症必煩熱喜冷或為脹為痛或大便祕結或小水熱閉不通傷於寒則陰縮傷於熱則縱挺不收疝病初起必以溫經除濕散寒行氣為主切不可早用寒涼以致留邪為害疝氣列方加味五苓散溫治疝氣初起白朮淨二錢橘核杵茯苓金鈴子各一錢五分檳榔豬苓澤瀉鹽水炒各一錢小茴香一錢五分木通七分肉桂去皮另燉三分荔香散和治疝氣痛極並治小腹氣痛等症俱效凡在氣分者最宜荔枝核燒微焦大茴香各六錢研末好酒調服二錢或三錢日三次寒甚者加泡吳萸三錢此方加橘核六錢治腎囊大如斗者導氣湯溫治寒疝疼痛川楝子二錢木香一錢五分茴香一錢吳萸泡五分用長流水煎一方用栗木炭燒紅放碗內加好燒酒半碗以碗蓋住飲之雖痛不可忍亦必立止神應散熱治寒疝及諸疝心腹痛不可忍以此散氣開鬱元胡索小茴胡椒等分為末每服二錢酒調下加味二陳湯微熱通治七疝甚驗白朮淨半夏制小茴金鈴子各一錢五分陳皮澤瀉鹽水炒豬苓各一錢白茯苓一錢五分木通一錢肉桂去皮另燉三分炙草六分如寒甚者加乾薑一錢附子一錢熱極者去肉桂加黃柏知母各一錢五分小便如膏者加石菖蒲七分萆薢一錢五分氣上衝者去白朮加泡吳萸六分當歸一錢五分肉桂再加二分囊腫如水晶者加生薏米四錢桑白皮一錢五分痛不可忍者恐瘀血為膿致潰加桃仁十餘粒紅花一錢制乳香一錢筋縮者加生薏米一兩川木瓜二錢頑麻不痛者加川芎一錢檳榔一錢五分癢者加刺蒺藜三錢胡蘆巴丸熱治小腸氣蟠腸氣奔豚疝氣偏墜陰腫小腹有形如卵上下來去痛不可忍或絞結繞臍攻刺作痛者大把戟炒三錢胡蘆巴八錢茴香一兩吳萸泡五錢川楝子九錢製附子三錢共研末酒和為丸每服三錢空心溫酒下暖肝煎微熱兼補治肝腎陰寒小腹疼痛疝氣當歸枸杞各三錢茯苓小茴烏藥各二錢肉桂去皮另燉四分沉香六分生薑三片加味附桂地黃湯熱補治陰虛疝症熟地四錢淮山炒二錢萸肉川楝子丹皮茯苓小茴各一錢五分製附子澤瀉鹽水炒各一錢肉桂去皮另燉三分加味歸脾湯補治陽虛疝症炙黃耆白芍酒炒歸身白朮淨炒各一錢五分龍眼肉一錢棗仁即炒杵茴香各一錢五分黨參去蘆飯蒸二錢金鈴子一錢五分遠志去心四分木香六分炙草七分治寒疝神方大熱治病甚至於氣往上衝如有物築塞心臟欲死手足厥冷者二三服除極痛當立止荔枝核燒焦研末洋硫黃陳皮等分為末飯丸如緑豆大每服十四丸酒下多亦不得過二十丸一方葫蘆巴子一兩鐵鍋內炒黑研末每服三錢滾水沖服出微汗即消又方老絲瓜瓦上焙枯研末熱酒沖服重者不過三服即愈雖氣痛衝心亦效治陰囊腫痛奇方用蔥白乳香搗塗即時痛止腫消或用煨蔥入鹽少許搗塗亦可一方治偏左不痛者黨參三錢當歸炙耆各二錢川芎小茴橘核川楝子荔枝核各一錢川椒製附子各五分赤芍一錢五分另燉肉桂五分分三次沖藥服服一二劑效驗之至腳氣此症自膝至足或見麻痹或見冷痛或見痿弱或見攣急或腫或不腫或漸枯細或如火熱或有物如指發自踹腸而氣上衝心是皆腳氣之正病而亦有兼病者宜辨而治之又云腫者為濕腳氣不腫者為乾腳氣腫者當除濕乾者當行氣大抵此症有緩有急緩者其來漸初時飲食如故至二三月久乃日甚一日急者其來速或一二日即危治之若緩恐其氣上衝心亦能殺人寒濕外侵致成腳氣者十居六七其症疼痛拘攣惡寒凍厥宜以溫經除濕為主故多用麻黃桂附乾薑川烏之屬蓋以麻黃川烏走而不守能通行經絡乾薑桂附辛甘大熱能助陽退陰清熱濕既除病無不去除濕則用蒼朮白朮防己南星行氣利關節則用羌活獨活木瓜檳榔引經則用木通牛膝和血則用生地當歸此皆不可少之藥凡人不論男女老幼鞋襪濕切須速換即赤腳亦無礙不然則染腳氣之病慎之腳氣列方雞鳴散溫疏散治腳氣男女皆宜如感風濕流注浮腫疼痛者亦服之甚效橘紅木瓜各六錢檳榔杵五枚吳萸泡蘇葉各二錢桔梗三錢生薑三片煎好約於四五更時分作三次或六次溫服服畢食乾飯壓下至天明當有黑糞水瀉出即是腎家所感寒濕之毒漸當痛住腫消須遲吃飯加減檳榔湯和疏散治腳氣腳弱名曰壅疾貴在疏通春夏尤宜橘紅檳榔蘇葉各二錢炙草一錢加生薑三片煎如腳痛不已者加五加皮二錢木香一錢中滿不食加枳殼一錢痰厥或吐加半夏一錢五分轉筋者加吳萸六分腳腫而痛加大腹皮川木瓜各二錢腳痛而熱加地骨皮二錢小便不利加木通一錢五分大便不通加大黃一錢五分婦人腳痛加當歸二錢室女腳痛多是肝血滯實加赤芍藥二錢獨活湯熱補兼散治腳氣陽虛寒勝經氣不行頑麻不用如神麻黃去節獨活川芎附子制牛膝鹽水炒炙耆黨參去蘆米拌當歸白芍酒炒茯苓白朮淨炒杜仲鹽水炒乾薑肉桂去皮另研沖藥服木香炙草等分研末每用七錢加生薑三片紅棗三枚煎服凡虛弱之人受寒濕此方所必用切勿以為腳氣忌補而棄之二妙湯寒治濕熱腳氣疼痛者蒼朮米泔水浸切黃柏各二錢水煎加生薑汁半酒杯沖服此二味藥有雄壯之氣氣實者加酒一杯助之痛甚再加薑汁又云有氣加氣藥血虛加補血藥一方有陳皮一錢羌活二錢芍藥甘草各一錢威靈仙酒炒研末三分立效散溫疏散治腳氣攻心兼治暴腫甚效木瓜蘇葉陳皮各二錢吳萸泡一錢檳榔杵四隻加生薑五片煎分二次服檳榔散和行氣治腳氣衝心煩悶不識人茴香檳榔木香等分研末每服三錢白湯調下半夏散熱兼散治腳氣煩悶嘔逆心胸壅滯不能飲食黨參去蘆米炒赤茯各二錢肉桂去皮另燉四分半夏制陳皮前胡檳榔杵蘇葉各一錢五分加生薑三片煎或加淡竹茹一錢茱萸散溫治腳氣入腹喘急欲死川木瓜吳萸泡等分為末每服三錢酒調下刺腳氣方治腳氣腫痛白芥子白芷各五錢共研細末薑汁和勻敷患處脫肛大腸與肺為表裡肺虛則大腸滑脫故有因久瀉久痢脾腎氣陷而脫者有因中氣虛寒不能收攝而脫者有因色欲傷腎而脫者有因酒濕傷脾而脫者有因腎氣本虛而脫者有因過服寒涼而脫者亦有因濕熱下墜而脫者然熱者必熱赤腫痛乃系實症不然非氣虛即陽虛也須用溫補升提之藥始效脫肛列方涼血清腸湯涼兼補治大腸血熱脫肛生地二錢當歸白芍酒炒槐花炒各一錢五分黃芩一錢川芎五分升麻六分甘草七分加味補中益氣湯涼補治脾虛下陷而有熱者炙耆黨參去蘆白朮淨槐花各一錢五分當歸黃芩各一錢升麻五分柴胡七分陳皮六分炙草七分如無熱則去黃芩槐花加北味七分薑棗同煎柯子人參湯補治脫肛黨參去蘆米炒二錢白朮淨炒蓮仁去心炒歸身茯苓各一錢五分升麻蜜炙五分柯子杵一隻炙草七分加生薑二片煎如臟寒加乾薑隨宜或再加附子升陽除濕湯和治酒濕脫肛白朮淨葛花茯苓各一錢五分升麻六分澤瀉鹽水炒蒼朮米泔水浸神麯各一錢甘草五分加生薑二片煎參耆白朮湯補治瀉痢與産育氣虛脫肛黨參去蘆米炒二錢炙耆白朮淨炒肉蔻霜茯苓各一錢五分淮山炒二錢升麻蜜炙六分炙甘草七分加生薑二片煎或加製附子五分補陰益氣湯補治陰虛肝腎不足而下陷脫肛者熟地三錢黨參去蘆米炒淮山炒各二錢當歸一錢五分陳皮七分升麻蜜炙五分炙草一錢生薑二片蟠龍散治熱症脫肛腫痛者地龍曬乾五錢風化硝一兩共研細末先用荊芥八錢生蔥四根煎湯候溫以軟帛淋洗拭淨如濕則將藥末摻之干則調芝麻油塗之須以油紙托上明礬五倍子散治脫肛五倍子三錢白礬二錢共研末用水二碗煎沸候溫以軟帛蘸湯淋洗日數次即上如脫肛長者淋洗後以油紙托上四圍皆用赤石脂研細末摻之泄瀉泄瀉之症有寒有熱實熱者形氣有餘聲音壯亮飲食裕如舉動輕捷虛寒者形氣不足精神短少言語輕微舉動疲倦以此辨之始無所誤但人之病此實熱固有而虛寒居多辨之未真不如先服平劑為妥水瀉系清濁不分利其小便自愈挾濕則兼用去濕藥一二味若口中和小便清長切不可利利則傷陰又有洞瀉一症忽然大瀉不止或汗或喘最為危候多因夏月伏陰在內虛寒人恣食寒涼蔬果所致須速服大劑附子理中湯乃可挽回泄瀉列方四苓湯和治水瀉小便短少者白朮土炒澤瀉鹽水炒茯苓各二錢豬苓一錢五分如腳冷者是挾濕加蒼朮一錢兼感冒身熱者加防風荊芥各一錢五分體質寒者加肉桂三四分胃苓湯和治脾濕泄瀉不止陳皮厚朴制蒼朮米泔水浸各一錢白朮土炒茯苓各二錢澤瀉鹽水炒豬苓各一錢五分甘草七分加生薑二片紅棗二枚煎扁豆四苓湯和治夏月暑瀉欲成痢者白朮土炒二錢厚朴薑汁炒一錢扁豆炒杵澤瀉鹽水炒豬苓茯苓各一錢五分生薑二片如有火人加香藿一錢黃連五分無火人加肉桂三分防風芍藥湯和治瀉而腹痛者白朮土炒二錢白芍酒炒一錢五分防風陳皮各一錢白朮芍藥湯補治脾經受濕體倦泄瀉水穀不化白朮土炒二錢白芍酒炒一錢五分炙草二錢柴胡湯涼治平人身熱煩渴泄瀉胃寒者去黃芩白朮土炒二錢黃芩澤瀉鹽水炒柴胡豬苓茯苓各一錢五分茵陳飲寒治熱瀉或口渴喜冷小水不利者甚驗山梔子炒杵茵陳澤瀉鹽水炒青皮甘菊花各一錢五分甘草一錢七味白朮散補微涼治泄瀉而渴者無論大人小兒應驗如神黨參去蘆白朮土炒茯苓各一錢五分藿香一錢木香濕紙包煨六分乾葛二錢炙草七分如胃寒人加煨姜二片白朮湯補治小便清長而瀉者白朮土炒四錢炙草一錢加煨姜三片大棗二枚煎如寒甚則煨姜換用乾薑隨宜理中止瀉湯熱補兼澀治寒瀉溫胃止泄黨參去蘆米炒一錢五分乾薑炒一錢白朮土炒二錢肉蔻霜一錢五分炙草一錢或加柯子一隻藿香一錢五分八味理中湯熱補消滯治脾胃虛寒飲食不化食滯泄瀉胸膈痞滿黨參去蘆米炒茯苓各一錢五分白朮土炒二錢乾薑炒神麯炒麥芽各一錢砂仁炒杵五分炙草一錢加生薑二片煎如飲食不化加生益智仁一錢五分北味吳萸湯溫治五更即溏瀉經年不愈名為腎泄肉蔻霜一錢北味六分吳萸泡五分白朮淨炒一錢五分炙甘草五分姜附湯大熱峻劑治忽然暴瀉不止或大汗大喘手足厥冷氣少不欲言語者白朮淨炒三錢附子制三錢乾薑炒一錢五分良薑一錢炙草一錢水煎候溫急服如欲嘔加製半夏二錢痢疾此症所下有紅有白穢濁膠黏裡急後重欲下不下當分虛實寒熱實熱者其人必形氣強壯畏熱喜冷不欲衣被渴欲飲水小便赤痛或下純紅鮮血虛寒者其人必體質薄弱喜暖畏冷常欲衣被口不渴水小便清長若混治最易殺人如發熱不休非外感風寒即經絡不和宜用人參敗毒散加老米治其初起以取微汗則愈如邪侵陽明則用仲景葛根湯寒熱往來必用小柴胡湯熱多口渴則去半夏加葛根口中熱胸腹脹滿則用承氣湯下之口中和小便清長手足冷者是虛寒無疑當用理中湯加灶心土八錢危極者亦用此方救之有滯服平胃散脾胃虛弱服六君湯察其無外症惡症三日外方可服芍藥湯倘是産婦俱宜於各方之內加阿膠炙草痢症列方人參敗毒湯散治痢疾初起身熱者不可望速須因症服藥始免日甚羌活獨活黨參去蘆川芎各一錢桔梗一錢五分枳殼麵煨去瓤六分柴胡七分甘草八分加生薑二片老米一撮煎薑茶飲和治痢初起陳細茶二錢生薑八片水煎芍藥湯和治痢疾初起身不熱者生白芍山楂燒成炭桔梗各一錢五分陳茶葉二錢炙甘草七分生薑五片如渴加葛根一錢五分歸芍湯和治痢疾當歸二錢桔梗一錢五分枳殼麵煨去瓤六分生白芍三錢木香濕紙包煨檳榔各一錢炙草七分加生薑三片煎如白痢加蒼朮七分砂仁四分紅痢則加山楂炭一錢黃芩芍藥湯寒治熱痢生白芍六錢黃芩一錢五分甘草一錢如腹痛加肉桂三分膿血甚者加當歸一錢黃連五分芩連湯寒治實熱人痢疾當歸二錢黃連六分黃芩一錢五分生白芍三錢檳榔木香各一錢炙草五分如腹中脹滿而痛手按更痛者加生大黃二錢厚朴一錢下之審非此症切不可服芍藥木香湯熱治虛寒人痢疾白芍酒炒七錢木香濕紙包煨炮姜各一錢蘄艾揉去灰泥一錢五分炙草一錢吳萸黃連拌炒去黃連七分歸芍利導湯滑腸兼補治痢日夜數十次欲下不下逐點而來者油當歸七錢枳殼麵煨去瓤蘿蔔子檳榔各一錢生白芍五錢車前一錢五分細甘草一錢如實熱加槐花一錢五分虛寒人加泡吳萸六分乾薑六七分或一錢甘草蜜炙服藥後大便漸通色變黃即不可再服恐過滑也須服黨參甘草湯黨參甘草湯補治痢疾糞漸變黃者黨參去蘆七錢甘草一錢如寒痢參用米拌炒甘草蜜炙加煨姜一片當歸黃耆湯補治妊娠下痢腹痛小便澀者黃耆炙三錢當歸六錢加糯米一撮煎噤口痢下痢常覺噁心欲吐食不能入此症最危虛寒者居多亦間有實症若因食積必胸腹脹滿因火鬱必臟腑熾熱無脹無火但見臟氣不能容受有出無入精神日敗其故有二一由脾氣之弱或為嘔吐或為吞酸或惡聞食氣飢不能食而枵腹待斃此中焦不運病在脾也非用人參白朮乾薑炙草之屬不可一由腎氣之弱則命門不暖大腸不能固小腸不能化胃氣不能行此下焦失守而化源無主病在腎也非用熟地附子肉桂吳萸之屬不可脾胃強而食自能入其理甚明不加審察妄用寒涼攻擊之藥必速其死矣慎之噤口痢列方人參黃連飲寒治噤口痢屬熱者生黨參去蘆三錢黃連吳萸拌炒去吳萸六分加粳米一錢濃煎逐匙入口人參蓮子飲補治噤口寒痢噁心不能食者黨參去蘆米拌炒四錢石蓮去殼去心炒六錢加陳倉米一錢煎有高麗參則不用黨參治噤口痢奇方糯米殼炒開花入薑汁再炒研細末每服二三錢白湯調下開噤方鐵稱錘二隻無稱錘用新磚瓦亦可瓦盤一隻銅盤亦可將稱錘燒紅放盤內以好醋淬之日夜數次令病人聞其氣甚效理中湯熱補治虛寒各痢症危極者以此方救之或可回生黨參去蘆米炒三錢白朮淨炒二錢乾薑一錢炙草七分加灶心土八錢先煎澄清去土入藥煎服附瘧痢並行列方有痢後瘧有瘧後痢亦有瘧痢並行者治之當分寒熱柴芩煎寒治內火上衝瘧痢並行頭痛煩渴喜冷者柴胡二錢澤瀉鹽水炒梔子杵各一錢五分枳殼麵煨去瓤木通各一錢黃芩一錢五分如下純紅鮮血者加酒炒白芍二錢甘草一錢濕勝氣陷者加防風一錢補中益氣加薑桂湯熱補治瘧止而痢更甚者炙耆白朮淨炒當歸各一錢五分升麻蜜炙三分柴胡五分黨參去蘆米炒三錢乾薑五分肉桂去皮另燉三分陳皮一錢炙草七分水煎凡瘧後痢痢後瘧俱宜服補中益氣湯薑桂則因人而用瘧痢並作先治瘧瘧止痢益甚須服此湯若復瘧則去薑桂加製附子隨宜小便閉凡人小水不通若火在下焦必有火症可據及溺管疼痛此則可清可利又有敗精宿血阻塞水道而不通者亦可用法以通之固非難事所難者其惟氣閉乎然氣亦當分虛實實閉者不過肝強氣逆移礙膀胱或破其氣或提其氣而升之猶易為力至於虛閉之症最危最難治之不得不加意詳審矣經云膀胱者州都之官氣化則能出是水即氣氣即水氣既不化安得不閉今人往往見小水不通輒強為通利而不知真陽下竭元海無根再用苦寒之藥以清之通之是醫殺之也臨症者其慎之又云大小便俱閉通其大便而小便自利小便閉列方導赤散涼治心火及小腸有熱小便不通而渴生地三錢木通一錢五分麥冬去心赤茯苓各二錢竹葉十片甘草七分大分清飲寒治積熱閉結小水不利或腰腹下部極痛或濕熱黃疸溺血蓄血淋閉等症茯苓澤瀉鹽水炒各二錢木通豬苓枳殼麵煨去瓤車前各一錢梔子炒杵一錢五分加內熱甚者加黃芩黃柏龍膽草之類大便堅硬脹滿加大黃三二錢葵子湯寒治膀胱實熱腹脹小便不通口舌乾燥滑石葵子豬苓赤苓枳實去瓤瞿麥木通黃芩車前各一錢甘草五分化陰煎寒兼滋陰治水虧陰涸陽水有餘小便癃閉淋濁疼痛等症熟地四錢牛膝鹽水炒生地各二錢生知母黃柏生各一錢五分豬苓二錢緑豆三錢閩澤瀉鹽水炒二錢加食鹽少許煎如熱甚加龍膽草一錢五分滋腎飲微涼治腎虛足熱小便不通肚腹腫脹之甚眼睛欲突出者凡病在下焦不渴者宜之一名通關飲方在臍腹痛內蔥白湯和治小便卒暴不通小腹脹急氣上衝心悶絶欲死陳皮三錢葵子一錢五分加蔥白三莖煎春澤湯微熱兼補治氣虛小便閉黨參去蘆米炒二錢白朮飯蒸茯苓澤瀉鹽水炒豬苓各一錢五分肉桂去皮另燉四分舉元煎補治小便閉因氣虛下陷者提而升之炙耆黨參米炒去蘆各二錢白朮淨一錢五分升麻炒五分炙草七分水煎服後即以手探而吐之譬之滴水之器閉其上竅倒懸之點滴不下去其上閉下竅即通八味地黃湯熱補治腎火虛而閉用附桂蒸動腎氣以開關熟地五錢淮山炒澤瀉鹽水炒茯苓各二錢萸肉丹皮各一錢五分肉桂去皮另燉六分附子制一錢治小便閉奇方白菊花根搗爛取汁半茶盅用熱酒沖汁服或滾水加酒一小杯沖亦可如倉猝無白菊花根即別樣色亦宜取用蔥尉法治小便不通連根蔥三斤慢火炒熟透加好燒酒二杯再炒用布分作二包輪流順尉臍下即通如一時無蔥則以食鹽炒熱尉之但不可太熱免傷皮膚薰洗法治小便不通皂角十兩蔥頭二斤王不留行十兩煎濃湯一大盤令病人坐浸其中薰洗小腹下體久之熱氣下達壅滯自開而便通但便出時須聽其在盤內切不可起致使氣收復閉通後要審症施治不可有誤附小便不禁列方菟絲子飲溫治小便不禁或遺尿或過多者絲餅三錢牡蠣煅一錢北味杵五分益智仁鹽水炒一錢熟地二錢固脬丸熱治小便不禁遺尿不覺菟絲餅一二兩桑螵蛸炙五錢戎鹽一錢茴香一兩製附子五錢研末酒和為丸每服三四十粒米飲下縮泉飲溫治脬氣不足小便頻多淮山炒三錢烏藥一錢五分益智仁鹽水炒一錢大便燥結大便不通之症不過陰結陽結二者而已陽結者或以飲食之火起於脾或以酒色之火熾於腎或以時令之火蓄於臟凡因暴病及年壯氣實之人乃有此症此則宜清宜泄也若陰結者既無火症又喜熱惡冷其必下焦陽虛則陽氣不行陽氣不行則不能傳送或以下焦陰虛則精血枯燥精血枯燥則腸臟乾枯故治之者陽虛陰結則益其火須用右歸飲八味地黃湯之屬陰虛陰結者則壯其水宜用左歸飲六味地黃湯之屬均加洗淡肉蓯蓉三二錢多效又有大便本無結燥或連日或旬日欲解不解解下只些須而不能通暢及其已解仍非乾硬此總由七情勞倦色欲以致陽氣內虧不能化行亦陰結之類也當服理中歸脾右歸八味地黃等湯凡虛弱之人雖旬日十餘日不大便不必以為意倘病家醫家性急欲速遽用大黃等藥通之多致誤事大便燥結列方小承氣湯大寒峻劑治陽結因邪有餘津液枯燥者須察果系實熱始可服切勿輕用大黃二錢枳實厚朴各一錢如不下煎好藥加芒硝一二錢再煎服四順清涼飲子寒微峻治陽結較前方略緩大黃一錢五分白芍酒炒當歸各一錢五分甘草一錢水煎潤腸湯寒補微峻治陽結大便燥結不通熟地四錢生地二錢當歸三錢火麻仁一錢五分大黃一錢甘草一錢肉蓯蓉丸潤治陰結或因發汗利小便致亡津液而大便不通者凡老人虛人亦宜肉蓯蓉酒洗淡四兩沉香末二錢用火麻仁一兩搗爛和水取汁為丸如緑豆大每服一錢米飲下益血潤腸湯潤兼補治陰結凡虛弱及老人大便不通均宜熟地四錢麻仁二錢枳殼去瓤麵炒一錢肉蓯蓉酒洗去甲二錢杏仁杵一錢阿膠蛤粉炒一錢五分當歸三錢加減左歸飲補潤劑治陰虛陰結而大便不通者熟地六錢萸肉二錢淮山二錢肉蓯蓉酒洗淡當歸各三錢杞子二錢加減右歸飲熱補潤劑治陽虛陰結而大便不通者熟地六錢萸肉淮山炒各二錢肉蓯蓉酒洗淡三錢杞子二錢肉桂去皮另燉四分附子制一錢油當歸三錢蜜煎導方治虛弱人大便祕結白蜜四兩加皂角末四五分微火煎稍凝即用竹箸攪之勿令焦俟可為丸以手速捻成條上略小下大約長二寸許麻油塗納穀道內夾緊大便急極然後去之或用線系下截亦是善法豬膽汁導方治老人或虛弱人大便不通大豬膽一隻加入好醋少許用小竹管插入膽口線縛緊將油塗滑小竹管納穀道中以手捻膽汁灌下約一食頃當大便出宿食惡物甚效小兒科內載各方乃係為飲乳小孩而設若四五歲以上藥味則宜略重惟大黃黃連附子乾薑肉桂等藥須斟酌小兒之病非外感風寒即內傷飲食及驚風吐瀉寒熱疳癇而已蓋外感者必有外症如發熱頭痛拘急無汗或因風搐搦之類是也內傷者必有里症如吐瀉腹痛脹滿驚疳積聚之類是也熱者必有熱症如熱渴燥煩祕結癰瘍之類是也寒者必有寒症如清冷吐瀉無熱無煩噁心喜熱之類是也四者之外尤當辨其虛實有聲音之虛實有形色之虛實如體質強盛與柔弱者有異聲音雄壯與短怯者有異形色紅赤與青白者有異觀其形色審其病情若果有實邪果有火症不得不暫為治標治標之法及病則已切不可妄為攻擊消耗小兒以柔嫩之體血氣未育臟腑甚脆略受傷殘即痿敗而不可救慎之小兒疾痛疴癢不能自言旁人又不能代言且以嬌嫩之體易虛易實藥一過分變幻百出即危在頃刻矣凡小兒有病自一二歲至十二三歲全恃父母細心看理方能知真其虛實寒熱庶不至誤有一等父母姑息之深飽暖失宜果物恣食或畏苦廢藥或求速雜投為害亦不淺小兒一切雜症與大人同治惟藥味較輕耳至於大黃朴硝等藥非萬不得已切不可用發熱凡小兒平日無病陡然發熱乃是外感風寒外感之症其至甚速若熱由內生其來必緩察其絶無表症而熱在臟腑七竅三焦三陰筋骨肌肉之間即是內熱之症但熱有虛實實熱者面赤氣粗口燥唇瘡作渴喜冷飲水大小便難或掀衣露體煩啼暴叫聲洪伸體而臥睡不露睛手足指熱此其邪氣有餘可清可散虛熱者面色清白氣怯神倦恍惚軟弱口鼻微冷不喜寒涼飲湯安靜泄瀉多尿嘔惡驚惕上盛下泄抱而喜按乍涼乍溫夜則虛汗睡則露睛屈體而臥手足指冷此其正氣不足最宜調補切不可妄用寒涼及消散克伐等劑小兒發熱服表散藥不退如別無癰毒疳積而耳後紅筋燦然及眼如包淚手指尖冷者必是痘疹飲食內傷本無發熱蓋飲食傷臟不過為脹為痛為吐瀉安得有肌表之症惟傷風夾食者有之傷食久而成疳者有之其熱之來亦有漸不可不辨發熱列方紫蘇飲散治傷風身體發熱憎寒嚏涕鼻塞聲重凡陡然發熱者即宜服此方或服鉤藤飲最穩紫蘇黨參去蘆飯蒸各一錢桔梗八分半夏制防風各七分川芎六分陳皮五分甘草四分加生薑一小片紅棗一枚煎如服後尚有餘熱未清摘生竹葉二十片煎服鉤藤飲散治感冒兼肝風內動黨參去蘆防風各一錢蟬蛻去頭足四隻鉤藤一錢五分荊芥六分竹葉十片陳皮四分甘草二分如有痰加竹黃一錢一分生犀散涼治心經風熱柴胡葛根各一錢犀角鎊三分地骨皮白芍酒炒各一錢甘草五分柴胡飲涼補治肌熱蒸熱積熱或汗後餘熱黨參去蘆柴胡各六分白芍酒炒黃芩各八分當歸一錢甘草四分柴苓竹葉飲涼治壯熱往來柴胡麥冬去心黨參去蘆赤茯苓各六分黃芩一錢甘草五分加生竹葉五片煎人參黃連飲寒治心經蘊熱煩躁者黨參去蘆一錢生地麥冬去心各七分黃連四分竹葉十片炙草三分加生薑一小片煎黃芩芍藥湯寒治伏火熱症白芍酒炒黃芩各一錢山梔炒黑杵六分丹皮七分甘草一錢地骨皮飲涼補治晝靜夜熱生地一錢沙參八分丹皮六分地骨皮一錢五分黨參去蘆白芍酒炒各七分甘草四分四物加天麻鉤藤湯兼補治肝經血虛生風而熱熟地一錢當歸天麻白芍酒炒各七分川芎五分鉤藤一錢參耆四物湯補治汗後陰虛陽無所附而熱黨參去蘆飯蒸八分炙耆當歸白芍酒炒各七分熟地一錢川芎五分四君子加味湯補治陽虛而熱者黨參去蘆米炒白朮淨炙耆茯苓各一錢炙草四分加生薑一小片紅棗一枚煎參桂飲熱補治隔陽熱症口燥舌焦者熟地二錢黨參去蘆米炒七分肉桂去皮另燉二分澤瀉鹽水炒白芍酒炒淮山各一錢急驚小兒或感風寒或積乳食皆能生痰痰積則化火或受暑熱亦能生火失於清解則痰隨火升痰火上壅閉其肺竅則諸竅俱閉其症壯熱痰壅昏悶不醒竄視反張搐搦顫動牙關緊急口中氣熱頰赤唇紅飲冷便祕此因痰火鬱結肝風內動而然宜利火降痰醒後當清熱養血肝主筋肝失所養則筋脈乾熱故外作抽搐拘攣而現青色此是肝風內動非外風也不可誤治血虛則肝風內動風動則肝火愈熾火熾則肺金虧肝邪愈盛若屢服祛風化痰瀉火辛散之劑便當認作脾虛血損急補脾土庶不至變慢脾之症凡小兒服藥後余藥須與乳母服乳母宜忌口急驚列方利火降痰湯寒治急驚壯熱痰壅昏悶不醒搐搦顫動柴胡八分黃芩七分陳皮六分天竹黃一錢五分鉤藤二錢連翹一錢木通七分細甘草四分清熱降痰湯涼治同上柴胡一錢連翹八分蟬蛻去頭足四隻鉤藤鉤一錢五分陳皮五分澤瀉鹽水炒六分甘草三分加竹瀝水半酒杯沖藥服生地丹參湯涼治急驚初愈清熱養血者生地一錢五分丹參一錢青蒿七分白芍酒炒八分丹皮五分桔梗六分竹葉四分甘草三分人參竹葉湯涼補治虛弱小兒急驚初愈生黨參去蘆二錢生竹葉二十片水煎慢驚小兒慢驚因作吐作瀉或吐瀉交作稍久則脾土虛弱肝木乘之其症氣微神緩昏睡露睛痰鳴氣促鼻煽乍發乍靜時涼時熱面部淡白瀉漸青色手足微搐無力神氣懨懨不振乃脾虛生風無陽症也此症多因病後或因誤用寒涼損傷脾胃所致然亦有小兒脾胃素弱不必病後及誤藥者總屬脾胃虛寒之症初起當用溫補加藿香煨姜糞見青色即加木香或肉桂若手足漸冷唇舌痿白此將脫之候速用附子以回陽方可以救一切驅風逐痰之藥絲毫不得用慢驚列方加味異功散溫補治慢驚初起黨參去蘆飯蒸白朮飯蒸鉤藤當歸各一錢陳皮五分茯苓七分炙草四分加煨姜一片煎泄瀉則去當歸加味六君子湯熱補治慢驚昏睡露睛痰鳴氣促黨參去蘆米炒白朮淨炒各一錢半夏制七分乾薑四分陳皮五分茯苓八分炙草四分附子理中湯補大熱治慢驚手足漸冷唇舌痿白者黨參去蘆米炒白朮淨炒各一錢五分附子制七分乾薑微炒四分炙草五分紅棗一枚附桂地黃湯補大熱治慢驚口燥舌焦陰症似陽者熟地三錢白芍酒炒一錢五分附子制六分澤瀉鹽水炒黨參去蘆米炒各一錢肉桂去皮另燉二分驚啼此症與驚風不同與大驚猝恐者亦異蓋小兒肝氣未充膽氣最怯凡耳聞驟聲目睹驟色雖非大驚猝恐亦能怖其神魂醒時受怖寐則驚惕或振動不寧或忽爾啼叫或微有煩熱皆神怯不安之症宜以安神養氣為主驚啼多淚忽啼忽止者是驚惕啼叫無度聲長不揚者是腹痛驚啼列方硃砂安神丸寒治寐中驚悸而煩熱者生地當歸黃連各一錢薑汁炒甘草五分共研末米飲和丸如芡實大硃砂為衣每服一丸滾水開融灌下參麥湯微涼治驚悸而微煩熱者生黨參去蘆八分麥冬去心六分北味三分水煎團參散補治心虛驚悸黨參去蘆飯蒸當歸各二錢共研細末每服一錢用豬心一片硃砂五釐煎湯下安神丸補治受驚嚇而驚啼者黨參去蘆飯蒸棗仁炒茯神各七分陳皮白芍酒炒當歸各五分炙草四分共研末薑汁和丸如芡實大每服一丸白湯開下腹脹腹痛小兒肚腹或痛或脹雖由食積與寒涼傷脾而然然使脾胃不虛則腹中和暖運化以時何至為寒涼食積所傷故治之者當以健脾暖胃為主審無火症不得妄用涼藥無拒按堅實等症切不可妄用攻擊之藥慎之腹脹腹痛列方藿香飲和治腹痛黨參去蘆飯蒸藿香各一錢陳皮五分加生薑一小片煎四君子加味湯溫補治寒滯腹痛黨參米炒去蘆白朮淨炒各一錢藿香木香各六分茯苓炙草四分煨姜一片加味六君子湯補去積治腹有食積痛而兼脹者黨參去蘆飯蒸白朮淨炒各一錢茯苓七分神麯炒八分陳皮四分半夏制五分木香六分炙草三分芍藥枳實散消微補治小兒肚腹膨脹或不時作痛大人亦宜白朮淨四錢枳實麵煨去瓤二錢赤芍蓮仁去心陳皮各一錢加炒香老米一錢共研細末量兒大小或一錢或一錢零米飲調下白湯下亦可疳症小兒疳疾皆因病後脾胃虧損或用藥過傷不能傳化乳食內亡津液虛火妄動或乳母六淫七情飲食起居失宜致兒為患凡疳在內者目腫腹脹瀉痢青白體漸瘦弱疳在外者鼻下赤爛頻揉鼻耳或肢體生瘡其症不一治亦多方而有驗有不驗竟有過服寒涼克伐之劑而斃者故不可不慎疳者干也因脾胃津液乾涸而然在小兒為疳疾在大人則為癆瘵宜兼調補脾胃為要疳症列方治疳疾藥皮硝三錢苦杏仁二錢生梔子七個真頭道酒糟一兩蔥頭七個每個約長一寸白灰面三錢大紅棗去核七個共入石臼內搗爛成泥用白布二塊約寬五寸將藥在布上攤勻一貼肚臍一貼背後正對肚臍之處用帶捆好貼三日肉見青色即愈如未見青再換藥一次無有不效治疳奇方羊尿脬六七隻吹脹陰乾頂上汾酒一瓶將汾酒灌入尿脬內用線扎緊掛小兒心口胃脘之間症重者不過數時其酒自然消減必須稱准方知減否如減再換一個入酒掛上換至數個酒不消減即愈無汾酒用好燒酒亦可消疳散和治疳積眼雄黃二分石決明煅一錢五分海螵蛸煅去殼五分正辰砂一分滑石五分蘆甘石童便泡一日一夜燒透以能浮水為度五分共研細末加冰片五釐再研量兒大小或三四分或五六分用不落水雞肝一副竹刀切破上開下連摻藥在內線扎好加淘米水入砂灌煮熟連湯食盡神效之至疹症凡出疹皆由胎毒蘊於脾肺發於皮毛肌肉之間一時傳染大小相似未有不因天行癘氣而發者總之君相二火燔灼太陰脾肺受之其為症則有咳嗽噴嚏面腫腮紅目胞浮腫眼淚汪汪鼻流清涕呵缺悶煩乍涼乍熱手足稍冷夜臥驚悸或噁心嘔噦或以手掐面目唇鼻是即出疹之候便宜用解毒散邪等藥不使毒留於中庶無他患疹將出其面必赤中指冷而多嗽大熱五六日而後遍身見紅點此所以異於出痘與傷寒疹與痘不同痘本於肝腎出自中下二焦始終不妨於食而全賴水穀為主所以能食則吉不能食則凶治痘者不可不顧脾腎疹之毒則由表邪不解而內犯太陰陽明病在上中二焦多不能食治疹者宜解散火邪則自能食疹出至二三日必兩鼻孔俱干待收完毒輕者清涕即來當思飲食不必服藥如清涕來遲不思飲食者須要清肺解毒必清涕復出方可無慮疹與麻癍同類疹則大者如蘇子次者如芥子小者如蠶子而成粒成片者是也麻則最細而碎如蚊跡模糊者是也癍則無粒惟紅紫成片如雲如錦者是也俱是火邪治宜解散疹毒須假嗽多而散故疹後旬日之內尚宜有嗽切不可見嗽而治嗽至於泄瀉嘔吐腹痛亦是疹毒使然不得妄用補澀之藥宜謹避風寒忌雞魚炙煿鹽醋五辛並生果之物以免逼毒入里疹後瀉痢須細審虛實亦間有過服寒涼而將成慢脾者當急溫補不可執一不通以致不救疹症四忌忌初起即用寒涼俟出後看症用藥忌妄用辛熱忌誤用補澀忌葷腥生冷風寒疹症列方升麻葛根湯散微涼治疹症初起升麻葛根白芍酒炒甘草各一錢如譫語狂亂調辰砂一分六一散一錢服牛蒡子黃芩貝母知母桔梗麥冬連翹生地當歸防風荊芥柴胡桑白皮等藥均可隨症加入透邪煎散微補治疹症初熱疑似之時恐誤藥者當歸荊芥各一錢升麻三分白芍酒炒一錢五分防風甘草各七分如熱甚加柴胡一錢加味瀉白散寒治疹出之時咳嗽口乾心煩者桑白皮一錢元參七分連翹八分地骨皮一錢天花粉一錢黃連三分甘草四分敗毒散散微補治風寒外束逡巡不出或出而覆沒者生黨參去蘆防風荊芥各一錢當歸牛蒡子升麻各七分川芎五分甘草四分加薄荷六分煎加味四物湯涼補治心血不足疹色淡白者生地酒炒透白芍酒炒防風當歸各一錢川芎六分炙草五分涼血補陰湯涼治疹色帶紫或出大甚者生地黃一錢白芍酒炒連翹各七分紅花六分牛蒡子黃芩當歸乾葛各八分導赤散涼治疹症譫語溺閉生地二錢木通一錢竹葉二十片甘草六分加味甘桔湯涼治疹症火毒上薰而咽喉干痛牛蒡子桔梗連翹甘草各一錢水煎緩緩咽之解毒合白虎湯大寒治疹症煩躁大渴生石膏一錢知母七分黃連四分連翹七分金銀花一錢甘草五分加粳米一撮煎加味犀角地黃湯大寒治疹症吐血衄血生地白芍酒炒山梔仁炒杵犀角各一錢先煎丹皮七分如小便赤加木通一錢加味四芩散涼治疹症泄瀉白朮土炒茯苓澤瀉鹽水炒金銀花各一錢豬苓七分如小便如米泔水加車前木通各一錢黃芩湯涼治火邪內逼下焦而痢者白芍酒炒一錢五分黃芩一錢炙草七分加大棗一枚煎如火逼上焦而吐或吐痢並作者俱加半夏一錢五分生薑一片大紫胡湯寒峻劑治疹症大便祕結發熱身痛者柴胡半夏制白芍酒炒黃芩各一錢枳實麵煨去瓤六分大黃八分生薑一片紅棗一枚二母散寒治疹後嗽甚者貝母去心童便洗知母各二錢乾薑一片共研末每服一錢白湯下痘症近日有種洋痘之法最為穩妥但恐有未種而自出者方法亦不可不為之備痘由胎毒內藏而復因時氣外觸其毒乃發始終皆賴乎血氣若血氣充暢則易出易收氣血不足則變症不一治痘者必要先顧血氣蓋氣主形以起脹血主色以灌漿凡為白為陷為灰色為不起發為頂有孔為出水為痛為癢為浮腫為痘殼為不靨不落為肌表不固為膚腠不通等症皆氣之病也至如為紫黑為乾枯為無血為無膿為黑陷黑靨為腫痛牙疳為疔癰癍疹為津液不達為痘後餘毒皆血之病也氣與血相需氣至而血不隨雖起發而灌必不周血至而氣不至雖潤澤而毒終不透表熱者肌膚大熱根窠紅紫頂赤發癍頭面紅腫紫黑焦枯癰腫疔毒痛甚皆火在肌表之症治宜散血解毒裡熱者煩躁狂言口乾大渴咽腫喉痛內熱自汗小便赤澀大便祕結衄血溺血皆火在臟腑之症治宜清熱解毒表寒者不起發不紅活根窠淡白身涼癢塌倒陷乾枯皆肌表無陽之症治宜補陽溫表裡寒者為吐瀉為嘔惡為腹脹為腹痛為吞酸為不欲食為寒戰咬牙惡寒喜暖為小便清長大便不實完穀不化皆臟腑無陽之症治宜溫中補陽當腫不腫者必其元氣不足當消不消者必其毒氣有餘治痘宜先顧脾胃能食者吉不泄瀉者吉且須培補氣血略兼發散始合看心窩有紅色耳後有紅筋目中含淚身體發熱手指亦皆熱惟中指男左女右獨寒便是出痘若傷寒症則中指獨熱甚驗如熱盛血虛者首尾俱不可用白朮半夏之燥悍及升麻之提氣上衝要謹避風寒忌葷腥生冷生果蔥蒜雞鴨蛋豬肉茶水等物痘疹之候頭常欲涼足常欲溫若頭溫足冷者多不治此亦宜辨痘症四忌忌清熱敗毒忌克伐氣血忌妄投醫藥忌吞服醫家小丸痘症四宜宜補氣宜補血宜補脾腎宜察虛實痘症列方柴歸飲散治痘初時發熱未退無論是痘是邪疑似之間當歸白芍酒炒各一錢防風荊芥穗各八分柴胡七分甘草五分加生薑一片煎血熱加生地一錢陰虛加熟地一錢五分氣虛加黨參一錢五分虛寒加炮姜六分肉桂三分火盛加黃芩八分熱渴加乾薑一錢五分腹痛加木香四分嘔吐加陳皮五分炮姜四分如陽明實熱邪盛者初起用升麻葛根湯方在疹症內六物煎補治痘症血氣不充隨症加減甚效並治孕婦氣血俱虛等症黨參去蘆米炒白芍酒炒當歸各一錢熟地一錢五分川芎三分炙草六分如發熱不退或痘未出之先宜加蘇葉一錢防風八分頭痛加蔓荊子七分川芎三分咽痛加桔梗八分連翹七分不起發不灌漿或灌而漿薄加糯米五十粒川芎六分肉桂三分人乳半酒杯好酒少許以助營氣虛寒癢塌不起加炒川山甲六分紅紫血熱不起加紫草七分或犀角八分脾氣滯者加陳皮六分山楂八分胃氣虛寒多嘔者加炒乾姜四分或加丁香三分腹痛兼滯者加木香五分陳皮四分表虛氣陷不起或多汗者加酒炒黃耆一錢氣血兩虛未起未灌而先癢者加肉桂三分白芷六分元氣大虛寒戰咬牙泄瀉者去白芍加黃耆一錢五分製附子六分乾薑四分或再加肉桂三分生薑一小片六氣煎補微熱治痘症氣虛癢塌倒陷寒戰咬牙並治男婦陽氣虛寒等病黃耆炙黨參去蘆米炒各一錢肉桂去皮另燉三分白朮淨七分當歸一錢炙草六分如泄瀉去當歸加肉蔻霜五分茯苓八分其餘加減照前六物煎涼血養營煎寒補治痘血虛血熱地紅熱渴或色燥不起及便結溺赤陽盛陰虛等症生地白芍酒炒當歸地骨皮各一錢黃芩八分紫草七分紅花六分生甘草五分如渴加花粉一錢肌熱無汗加紫蘇一錢荊芥七分熱毒甚者加牛蒡子七分連翹一錢木通八分血熱毒不透者加犀角八分加味四物湯寒補陽治痘症熱毒熾盛紫黑乾枯煩熱便結純陽等症生地黃芩白芍酒炒當歸連翹各一錢川芎五分紫草八分木通八分如渴加花粉麥冬各一錢陽明熱甚頭面牙齦腫痛者加生石膏一錢五分知母一錢大腸乾結臍腹實脹者加大黃一錢血熱妄行者加犀角一錢童便半酒杯沖服小水熱閉者加山梔車前各一錢兼表熱者加蘇葉荊芥各一錢連翹升麻湯涼治痘散毒清火連翹一錢葛根白芍酒炒桔梗各七分升麻六分薄荷一分甘草七分加竹葉十片燈心十條煎加味甘桔湯涼治痘症肺熱咽喉腫痛聲不清者桔梗一錢甘草七分柯子皮三分牛蒡子炒六分連翹五分薄荷一分托裡十補散溫補調氣補血內托痘毒五日後必用之方也亦治一切癰疽高麗參去蘆米炒黃耆酒炒當歸各一錢川芎川厚朴防風桔梗白芷炙甘草各五分肉桂去皮另燉三分共為細末每服一錢或二錢木香湯下保元湯補治虛弱人出痘炙耆黨參米拌炒去蘆各一錢炙草六分如痘灰白色或頂陷者加酒炒黃耆當歸各一錢癢則去當歸加酒炒白芍一錢五分活血湯補養營起痘當歸一錢川芎四分紅花三分水煎服鹿耆催漿湯補治痘不起漿炙耆一錢五分鹿茸酥炙七分香附一錢川山甲炒研五分水煎內托散補治痘雖起發以手按之水漿即出者黃耆酒炒一錢五分黨參米炒去蘆一錢川芎五分丁香二分糯米五十粒炙草五分快班越婢湯溫補治痘手足不起發黃耆酒炒一錢五分白芍酒炒一錢桂枝六分防風七分炙草四分生薑一片紅棗一枚蟬蛻散補微散治痘瘡虛陷不起當歸六分川芎三分防風荊芥穗升麻淡蜜炙薄荷各二錢蟬蛻去頭足四隻高麗參米拌炒六分白芍酒炒五分炙草三分加味保元湯溫補治痘瘡漿清腳淡倒靨炙耆黨參去蘆米炒白芍酒炒扁豆炒杵當歸各一錢肉桂去皮另燉三分木香四分炙草五分紫草飲補治痘瘡黑陷氣血虛弱不起黃耆酒炒一錢五分紫草炙草各一錢加糯米一百粒煎加味四聖飲兼補治痘黑陷倒陷黨參米拌炒去蘆黃耆酒炒各一錢紫草七分木通八分蟬蛻去頭足六隻川芎木香炙草各六分加糯米五十粒煎起痘奇方治痘不起或倒靨或灰白者童子糞要乾結者用新瓦煅透存性每一兩入冰片一分研勻少則服五分多則服一錢蜜水調下入藥沖服亦可百花膏治痘燥痂皮濺起作痛或痂欲落不落者白蜜一小酒杯滑石一錢研細末略用湯和勻以鵝翎染藥輕掃痛處則易落無痕固肌湯補治痘發表太過以致肌肉不密痘痂久黏不落炙耆八分當歸酒洗七分蟬蛻去頭足四隻高麗參去蘆米炒六分糯米一錢炙草五分催漿飲補治空倉痘外雖起發而內無膿漿者黃耆酒炒八分川芎白芷牛子各五分肉桂去皮另燉三分當歸一錢五分鹿茸酥炙生地酒炒各一錢白芍七分山甲炒三分水煎服二劑即去山甲補氣健脾湯溫補治漏痘上有孔者高麗參去蘆米炒八分黃耆酒炒八分川芎白芷各五分白扁豆炒杵一錢丁香二分肉桂去皮另燉三分淮山炒七分炙甘草四分加龍眼肉四分去心炒蓮仁七分實漿飲補治痘色光亮全無膿血者看其中有起脹極大者刺去其水高麗參去蘆米炒黃耆酒炒鹿茸酥炙當歸各八分白扁豆炒杵淮山炒白朮飯蒸各七分白芷五分炙草四分山楂六分黃豆二十粒治爛痘列方敗草散治痘癢抓搔已爛膿血淋漓者爛草蓋屋蓋牆多年者或野外自爛者尤佳研極細末摻之如遍身俱抓爛者須多摻席上令兒坐臥其上即愈白龍散治爛痘及抓破者干黃牛糞在風露中日久者煅成灰取中心白者為末入薄絹囊內於爛處撲之痘後目疾列方決明散和治痘後眼生翳障石決明煅穀精草各二錢共研細末每用一錢以蒸熟豬肝蘸食臭蟲方治痘眼發紅將上瘼或已有白點者臭蟲血射入眼內即愈或用蛙膽調臭蟲血點入更佳痘後癰列方三痘散治痘後癰初起者緑豆黑豆赤小豆各四錢共研細末醋調勻時時塗之自愈黃豆散治痘後癰黃豆炒八錢研細末熟水和勻塗之或炒黑研末芝麻油調塗亦佳一方用赤小豆研末調雞蛋清塗之痘疔列方此疔能閉痘毒凡未齊則不出現既齊則不起發行聚則必致倒陷看痘中有紫黑乾硬暴脹獨大者即是須急治之一見此疔即以銀針挑破吸盡紫血乃以藥塗之拔毒膏治痘疔蒲公英二兩水煎熬膏載磁器內放水中一日一夜冷去火氣俟挑破痘疔吸盡紫血即以此膏塗之又方雄黃一錢紫草三錢研細末如法挑吸用胭脂汁調塗之
