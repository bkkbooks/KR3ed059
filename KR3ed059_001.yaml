body:
  text: 卷一傷風此症由外感風邪初起覺微涼畏風旋即發熱或鼻塞聲重或頭痛身痛或邪連陽明而口渴或邪侵少陽而寒熱往來速即照方服藥一劑未愈再服一劑避風寒忌口慎起居邪無有不退若隱忍遲滯且食油膩以致留邪不去庸醫治之每多受害凡平日無病陡然發熱熱無停止者即是傷風微汗則熱退無汗則復熱者仍是外感之邪猶未解芩連知柏等寒涼並神麯山楂麥芽各消導之藥一則使邪凝不散一則能引邪入里初傷風時切不可服邪未傳裡則舌無苔有熱仍當發散如已傳裡則舌苔粗白渴欲飲水宜服葛根湯舌苔白而轉黃則加黃芩至黃而轉黑或起芒刺煩躁大渴宜服人參白虎湯大便秘結小腹脹滿則服小承氣湯風寒俱從背俞而入無論春夏秋冬俱宜著背心以護之若嚴寒時節所縫綿衣此處綿須加厚庶免傷風傷寒之患養生者其慎之而年老及虛弱人更不可忽傷風列方蘇葉湯散治傷風發熱蘇葉防風川芎各一錢五分陳皮一錢甘草六分加生薑二片煎如嫌甘草微涼則用蜜炙以下同羌活湯散治風邪發熱兼肩背痛或腰及手足痛者亦宜羌活防風川芎秦艽各一錢五分甘草六分加生薑二片煎葛根湯散微涼治風邪發熱兼渴柴胡一錢五分葛根二錢黨參生去蘆防風荊芥各一錢五分甘草六分生薑二片二陳羌活湯散治風邪發熱兼鼻塞聲重或流清涕防風羌活茯苓半夏制各一錢五分陳皮川芎各一錢蒼朮米泔水浸七分甘草六分加生薑三片煎沖和湯散治感冒風濕頭目不清鼻塞聲重倦怠欠伸出淚蒼朮米泔水浸荊芥各一錢五分炙草七分加生薑二片煎二陳杏仁湯散治風邪發熱兼咳嗽防風荊芥茯苓半夏制各一錢五分陳皮桔梗各一錢杏仁二錢杵甘草六分加生薑二片煎參歸荊防湯散兼補治風邪發熱平素身體虛弱者黨參炒二錢陳皮一錢防風歸身荊芥各一錢五分炙草六分紅棗二枚生薑二片如頭痛加川芎一錢五分大便溏則去當歸加味小柴胡湯涼散治寒熱往來無汗者柴胡二錢羌活黨參生半夏防風各一錢五分黃芩一錢甘草六分加生薑三片煎如臟寒者去黃芩甘桔湯散微涼治風邪入肺鬱而為熱以致喉干或喉痛者桔梗甘草各一錢五分荊芥穗一錢加生薑二片煎傷寒此症乃因外感寒邪四時皆有惟冬季為正傷寒蓋人因不慎起居以致陰邪乘虛而入初病時發熱惡寒頭項痛腰脊強身疼無汗須速服發散之劑未愈則再服務期身有微汗則邪從外入者亦使之從外而出庶免有害若猶豫隱忍邪即傳經或巡經傳隔經傳且有合病並病兩感病變多端甚難措手茲略選數方得某病當服某湯用活法治之庶或有濟又云傷寒大症必得良醫診視方無所誤若無良醫服發散藥後每日惟飲淡薑湯俟其漸愈此亦不藥當中醫之法至於大小承氣等湯必察其胸腹果滿脹腸胃果燥結乃可服而下之如似脹非脹似滿非滿仍不宜服恐誤下或致不救傷寒列方人參敗毒加減湯散治傷寒初起發熱惡寒頭痛腰脊強身疼無汗者黨參去蘆羌活獨活川芎各一錢五分蘇葉一錢五分防風藿香各一錢炙草六分加生薑三片蔥白三寸煎葛根升麻湯散微涼治邪傳胃經身熱目痛鼻乾唇焦不渴葛根二錢升麻秦艽荊芥白芷赤芍蘇葉各一錢甘草六分加生薑二片煎凡面浮腫而痛者風也亦宜此方小柴胡湯涼治邪傳膽經耳聾口苦咽乾目眩胸滿脅痛頭有汗寒熱往來而嘔柴胡二錢白芍酒炒半夏制黃芩各一錢五分黨參去蘆甘草各一錢生薑二片紅棗二枚大柴胡湯大寒峻劑治邪入脾經腹滿而吐食不下嗌乾手足自溫或自利口不渴柴胡一錢五分半夏制一錢黃芩白芍各二錢枳實一錢大黃一錢五苓散微熱治邪止傳脾腑口渴溺赤白朮淨一錢五分茯苓三錢豬苓澤瀉各一錢肉桂去皮另燉三分如不宜熱者去肉桂白虎湯大寒治邪止傳陽明胃腑譫語狂亂燥渴便閉自汗不得眠生石膏五錢知母二錢甘草二錢粳米一撮小承氣湯大寒峻劑治邪傳腎經舌乾口燥利清水或欲吐不吐目不明病至此已危大黃二錢枳實一錢厚朴一錢大承氣湯大寒峻劑治邪傳入肝經小腹滿舌卷囊縮厥逆或氣上撞心飢而不欲食病至此已危極大黃三錢枳實一錢厚朴一錢芒硝二錢附子理中湯大熱峻劑治病初起寒邪直中三陰腹冷痛吐清沫利清穀蜷臥肢冷囊縮吐蛔舌黑而潤黨參去蘆米炒茯苓各一錢五分白朮淨炒製附子各二錢乾薑炒黃炙草各一錢大棗二枚當歸羌活湯散兼補治虛弱及老人傷寒初起發熱惡寒頭痛身痛無汗黨參米炒去蘆二錢羌活獨活當歸各一錢五分川芎藿香各一錢炙草七分紫蘇一錢加紅棗二枚生薑二片蔥白三寸煎結胸外治法傷寒下早則成結胸亦有不下而亦結胸者其症心胸脹痛手不可近若服陷胸湯未免太峻不如用罨熨之方較穩痰積各病亦宜蔥頭連須一斤生蘿蔔五個若無則用子四兩研碎老生薑五兩三味共搗爛略揸去水燒酒炒熱用布分作二包於心胸或脅下痛處順熨而又罨之干則用揸去之水並酒再炒輪流熨罨自能豁然開散汗出而愈但不可太熱恐傷皮膚大便結則兼熨臍腹麻黃桂枝湯列方西北地方多寒人之肌腠密必服此二方始愈麻黃湯溫散治傷寒初起發熱惡熱無汗者麻黃去根節二錢桂枝一錢杏仁八粒去皮尖炒杵炙草六分加生薑三片大棗一枚煎桂枝湯散寒治傷寒初起發熱惡寒有汗者桂枝赤芍各一錢五分炙草一錢加生薑五片大棗三枚煎服後啜熱粥一盅蓋被睡咳嗽咳嗽之症惟有外感內傷二者而已蓋外感者陽邪也邪自外而入故治辛溫內傷者陰病也陰受傷於內故治宜甘平外感之嗽自上而下其來速病在肺內傷之嗽自下而上其來徐病在腎又有勞傷之嗽因汗出風邪入肺又復內搖其精以致精血虧損則邪不散痰亦不出此即勞傷干嗽之類也最難醫治故人不可不慎外感咳嗽附濕痰嗽心胸煩熱嗽蘇子湯和治外感咳嗽陳皮茯苓前胡半夏制各一錢五分蘇子七分杏仁杵二錢甘草六分加生薑三片煎如頭痛鼻塞加川芎一錢五分痰不易出加當歸二錢年老人尤宜惟大便滑者忌用痰結而黃平人加黃芩一錢五分虛寒人則加薑汁炒貝母六安煎加減溫散治外感咳嗽冬月寒氣盛邪不易散者陳皮茯苓杏仁杵前胡各一錢五分細辛五分半夏制二錢炙草七分生薑三片五均湯溫散治外感風寒鼻塞聲重語音不出咳嗽喘急胸滿咽痛者麻黃去根節七分荊芥一錢桔梗一錢五分杏仁杵二錢甘草六分加生薑三片煎麻黃須先煎去沫甘草不用炙白朮加減湯和治五臟受濕咳嗽痰多氣喘身重陳皮一錢五分白朮淨二錢半夏制一錢蒼朮米泔水浸一錢茯苓一錢五分杏仁杵一錢炙草一錢生薑三片前胡湯微涼治心胸煩熱咳嗽不利涕唾稠黏前胡麥冬去心貝母杵各一錢五分桑白皮蜜炙一錢五分杏仁杵一錢炙草六分生薑三片久嗽列方杏仁丸兼補治久嗽及老人咳嗽喘急不能睡臥核桃去殼留衣一兩五錢杏仁去皮尖炒一兩五錢煉老蜜為丸每隻約重三錢臨睡薑湯嚼下六君加味湯補治外感咳嗽久服散藥未愈者黨參去蘆飯蒸白朮淨炒杏仁杵半夏制茯苓各一錢五分陳皮一錢炙草七分加生薑二片紅棗二枚煎止嗽六君湯溫補治老人痰嗽年久不愈者黨參去蘆飯蒸陳皮核桃去殼留衣杵款冬花蜜炙半夏制茯苓各一錢五分白朮淨炒二錢炙甘草一錢加泡姜七分北味六分煎內傷咳嗽列方此症多因酒色勞傷初起時微嗽日甚一日則或為夜熱潮熱或為形容瘦減或兩顴常赤氣短喉干最為難治有宜暫服涼藥者有宜補水者有宜補火者有宜補土以生金者當因病施治瀉白散涼治內傷肺熱咳嗽桑白皮蜜炙川地骨各四錢甘草二錢共研細末每服一二錢白湯下此散服一二料已愈六七分即止當思培補不可過劑鱉甲丸微涼治虛癆咳嗽耳鳴眼花五味子二兩鱉甲炙川地骨各一兩三錢煉蜜為丸如綠豆大每服四錢鹽湯下百花膏和治虛癆咳嗽不已款冬花蜜炙百合蒸透焙乾等分研末蜜和丸約每隻重三錢臨臥薑湯下燕窩湯補治虛癆咳嗽潤肺清金沙參二錢燕窩三錢百合五錢共燉爛食救肺湯涼補治虛癆咳嗽肺燥黨參去蘆杏仁去皮尖杵貝母杵枇杷葉去淨毛蜜炙各一錢五分麥冬去心生地各一錢阿膠蛤粉炒珠二錢細甘草六分加味地黃丸補治虛癆咳嗽熟地一兩淮山七錢茯苓六錢萸肉四錢丹皮二錢北味四錢麥冬去心三錢蛤蚧去頭足炙五錢澤瀉鹽水炒二錢蜜和丸如綠豆大每服四錢白湯下黃耆散補治虛癆久嗽唾血之症正黃耆飯蒸真阿膠蛤粉炒珠糯米炒各八錢等分為末每早晚米飲下二錢加味六君湯補治虛癆咳嗽日久以致粥飯食少者黨參去蘆飯蒸二錢白朮淨半夏制款冬花蜜炙茯苓各一錢五分陳皮一錢北味六分炙甘草七分加生薑二片大棗二枚煎寧肺散劫劑治咳嗽久肺氣不通咯唾膿血自汗長年不愈者服之立止烏梅肉七分粟殼去筋膜蜜炙二錢共研細末烏梅湯下乾咳嗽列方貝母丸微涼治乾咳嗽川貝母一兩五錢研末蜜丸如龍眼大淡薑湯嚼下鳳髓膏兼補治乾咳嗽大能潤肺淮山炒杏仁去皮尖研胡桃仁研各四兩共煎濃攄去渣加牛髓白蜜各八兩熬將成膏入磁瓶內以紙封口重湯燉一日取起冷定用白湯化服一二匙早午晚均宜牛髓即牛骨筒內結成者瓊玉膏涼補治虛癆肺枯乾咳嗽或好酒者久嗽尤效大生地四兩蜜糖四兩共煎濃汁用絹攄過待用雲茯苓一兩二錢黨參六錢研極細末與藥汁和勻入磁瓶內紙封瓶口置砂鍋水煮一日取起埋落地去透火氣每早晚白湯調下半酒杯或溫酒下亦可喘促二症相似而實不同宜細辨之切不可混治喘者實邪也病在上焦或風寒外感或痰涎內盛或火熾傷金或水氣乘肺其人胸脹氣粗聲高息湧膨膨然若不能容惟以呼出為快也此其病在肺宜清宜破促者虛症也病在下焦或精泄之後或藥誤之後或大汗大瀉之後或婦人月期生產之後氣道噎塞聲低息短皇皇然氣若不續提之不升吸之不下勞動則益甚但得引長一息為快也此其病在肝腎真陰虧損精不化氣則上下不交非培補本根不可倘用實症等藥則危在頃刻矣慎之喘症列方蘇子杏仁湯和治上氣喘急不得臥蘇子六分陳皮半夏制桑白皮蜜炙各一錢五分桔梗一錢杏仁杵二錢炙草五分加生薑二片煎加蘿蔔子一錢更驗蘿蔔子丸和治氣壅痰盛喘急喘嗽亦宜杏仁去皮尖蘿蔔子炒等分為細末粥和丸如綠豆大每服三錢白湯下如食積成痰而喘者加山楂神麯炒栝蔞仁研製半夏各一錢五分十緡湯微峻治痰喘不得臥人扶而坐一服即安半夏制二錢皂角炙八分炙甘草一錢加生薑三片煎孕婦忌服皂角小青龍湯熱散峻劑治初感寒邪心下有水氣發熱咳嗽喘急老人及虛弱者勿服麻黃去根節七分桂枝一錢半夏制二錢白芍酒炒一錢五分北味六分細辛乾薑炒炙草各五分人參定喘湯溫散治肺氣上喘喉中有聲坐臥不安胸膈緊痛及肺感寒邪咳嗽聲重黨參去蘆米炒阿膠蛤粉炒珠半夏制桑白皮蜜炙各一錢五分麻黃去根節七分北味五分炙草六分加生薑三片煎麻黃先煎去沫四磨飲破氣治氣逆胸膈脹滿喘急沉香烏藥枳實檳榔用酒磨白湯沖服黨參煎湯沖服更妥杏仁丸兼補治喘嗽胡桃仁去殼留衣杏仁去皮尖各七錢研膏煉老蜜為丸如彈子大每服一丸細嚼薑湯下又方以胡桃肉三枚生薑三片臨臥嚼服飲湯三四口再嚼再飲而睡止嗽無痰促症列方枸杞湯補治促症腎主納氣腎虛則不能吸氣歸根而短故用枸杞以補之只用一味者任專則效速較八味地黃丸尤勝大枸杞四錢加生薑一片大棗二枚煎獨參湯補治氣虛氣脫促症反胃嘔吐各垂危病亦宜高麗參米拌炒去蘆一兩五錢濃煎乘熱服日再進兼以參煮粥食尤佳又方高麗參二錢胡桃仁五枚加姜一片大棗二枚煎服貞元飲補治氣短似喘呼吸促急氣道噎塞勢劇垂危此乃元海無根虧損肝腎子午不交氣脫症也婦人血海常虧者最多此病熟地七錢當歸三錢炙草二錢水煎溫服如兼嘔惡或惡寒者加煨姜三片氣虛極加高麗參四錢肝腎陰虛手足厥冷加肉桂六分哮喘此症原有夙根胸中多痰結於喉間與氣相擊隨其呼吸呀呷有聲偶觸風寒即發遇勞亦發治之者既發時以攻邪氣為主發後以扶正氣為主哮喘症列方麻黃蘇子湯溫散治哮喘既發陳皮一錢半夏制竹黃各一錢五分麻黃先煎去沫七分蘇子六分沉香研末沖藥四分細辛五分炙草六分加生薑二片煎蘇陳九寶湯溫散治老人小兒素有喘急之症發則連綿不已咳嗽哮吼夜不得臥麻黃去根節先煎六分蘇葉陳皮大腹皮酒洗各一錢桂枝七分薄荷五分杏仁杵桑白皮蜜炙各一錢炙草五分烏梅一隻生薑三片六君貝母丸兼補治哮喘既發後補方如虛弱之人無論已發未發均宜照服黨參去蘆米炒貝母薑汁炒半夏制各一兩五錢茯苓一兩二錢陳皮一兩白朮淨炒二兩炙草五錢用竹瀝水一茶杯老生薑汁半茶杯與各藥和勻曬乾後再和竹瀝薑汁二次曬乾研細末煉蜜為丸如綠豆大每服三錢白湯下中風忽然昏倒勢甚危急宜分清閉症脫症用藥切不可混治閉症列方此症忽然昏倒牙關緊急兩手握固危在頃刻皆由真氣耗散脾腎已傷故肝邪得以侮之一見此症速煎薑湯用竹箸抉開口灌之如抉不開以通關散吹入鼻孔有嚏可救無嚏難治以開關散擦牙其口可開通關散治中風閉症將散少許吹入鼻內此散藥鋪有賣生半夏生南星薄荷細辛皂角等分共研細末開關散治閉症牙關緊閉擦之可開生南星一錢冰片三分烏梅去核四隻共研細末生薑湯溫散治閉症初服須抉開口灌老生薑五錢水煎四君加味湯兼補治閉症脾虛者黨參去蘆飯蒸三錢天麻茯苓鉤藤各一錢五分白朮二錢炙草一錢加生薑汁半酒杯沖藥服有痰加竹瀝水半酒杯如倉猝無竹瀝水即加天竹黃一錢五分加減六味地黃湯兼補治閉症腎水虛者熟地五錢淮山二錢萸肉天麻茯苓鉤藤各一錢五分加味同上加味六君子湯兼補治閉症口眼歪斜偏左者黨參去蘆飯蒸二錢白朮淨半夏制茯苓各一錢五分陳皮一錢炙草七分加竹瀝水薑汁各半酒杯沖藥服以去經絡之痰或加殭蠶天麻羚羊角以熄風活絡或加附子以固陰肉桂以通陽黃耆以勝風當審病而用之加味四物湯兼補治閉症口眼歪斜偏右者熟地四錢當歸二錢白芍酒炒川芎各一錢五分加味同上八珍湯補治閉症醒後宜培補者黨參去蘆米炒二錢白朮淨二錢熟地三錢川芎一錢當歸白芍酒炒茯苓各一錢五分炙草一錢加生薑二片棗二枚煎脫症此症倏然仆倒昏不知人口開手撒眼合遺尿皆由素不能慎或七情內傷或酒色過度或年力衰邁氣血將離再有所損以致陰陽相失精氣不交昏僕不醒此乃陽氣暴脫之候也最危最急與閉症迥不相同切勿混治一見此症速即服大劑附子理中湯十中或可救一二遲則氣脫倘灌蘇合牛黃等散風去痰之藥必死薑湯亦不可服慎之若吐沫直視搖頭上攛面赤如脂汗出如珠筋骨疼痛即為脫絕不治之症脫症列方附子理中湯補大熱治中風脫症高麗參去蘆炒四錢川乾薑炒一錢白朮淨炒二錢附子制二錢炙甘草一錢水煎如無麗參則選好黨參亦可人參鹿茸丸熱補治脫症愈後培補者熟地六錢枸杞隔紙炒三錢肉桂去皮一錢鹿茸去毛酥炙二錢附子制二錢白朮飯蒸六錢淮山薑汁炒三錢麗參飯蒸切炒二錢北味鹽水浸炒二錢麥冬去心紹酒潤曬乾二錢共研末煉蜜為丸如綠豆大硃砂為衣每服三錢米湯下忌生蘿蔔生蒜及蕓薹諸血亦不可食風中經絡此症忽然倒僕人事不省但風從外入中人肢體或頑麻不仁或癱瘓不用或語言蹇澀或痰涎壅滯或半身不遂手足不隨若覺疼痛多屬風邪如只麻木不痛皆由血氣之虧治之者宜辨痹症各方多可通用凡為風邪所侵而痛無論手足腰脊等處初起速即用羌活二三兩研末酒炒布包敷之次日即愈免至留邪為患此秘方也加薑汁一酒杯炒風中經絡列方秦艽湯散兼補治風中經絡而痛羌活一錢五分當歸二錢川芎一錢熟地三錢秦艽白芍酒炒獨活各一錢五分如有熱加防己一錢黃芩一錢五分有寒加製附子一錢肉桂四分小續命湯亦治此症方在痹症內當歸羌活湯散兼補治風中經絡口眼喎斜手足拘急黨參去蘆炒二錢當歸秦艽獨活鉤藤各一錢五分白芍酒炒羌活各一錢炙草七分加生薑二片煎養血湯散兼補治風中經絡血少偏枯筋脈拘攣疼痛當歸二錢熟地三錢白朮酒炒一錢五分藁本一錢防風一錢五分川芎白芷各一錢細辛四分易老天麻湯熱散微補治肢節麻木手足不隨等症熟地五錢當歸二錢牛膝酒炒萆薢天麻酒炒羌活各一錢五分附子制一錢生薑二片黃耆五物湯熱補治半身不遂或癱瘓不用其人心清語謇舌軟無力者若神氣不清則是痰病須服二陳加薑汁竹瀝虛弱人則服六君加薑汁竹瀝炙耆四錢當歸白芍酒炒桂枝各一錢五分加生薑二片大棗二枚煎神效黃耆湯補治渾身或頭面手足麻木不仁目緊縮小及羞明畏日視物不明黃耆酒炒二錢黨參去蘆炒白芍酒炒各一錢蔓荊子杵一錢陳皮五分炙草一錢水煎臨睡熱服凡麻木不仁雖有熱症不得用黃柏惟加黃耆黃耆烏蛇酒熱補去風治半身不遂肌肉消瘦為偏枯症忌用散藥宜服此酒正北耆蜜炙一兩當歸七錢桂枝五錢烏蛇肉炙一兩五錢白芍藥酒炒四錢燒酒浸早晚隨量飲暑症前人分為陰暑陽暑未免亂人聽聞而不知畏熱貪涼涼襲於外則有發熱惡寒頭痛等病此由靜得之謂之傷風傷寒服防風羌活諸散藥自愈若夏日炎炎長途跋涉人觸之則生暑病此由動得之謂之傷暑其症口渴心煩頭痛溺赤身熱汗出不止脅下有汗熱有停止四肢困倦與外感風寒不同宜辨暑症列方六一散涼治暑天熱傷元氣或身熱或小便短赤或煩渴欲飲者此方盪滌邪熱從小便而出加硃砂三錢名益元散使心神不安藉以鎮之亦佳二散藥鋪均有賣滑石一兩甘草一錢共研細末每服三錢白湯調下如無汗則加香薷一錢渴欲飲水加乾葛二錢足冷則加蒼朮一錢俱是水煎開散服乃虛弱人平穩之方香薷飲散治傷暑熱而無汗者若有汗則非宜香薷一錢五分扁豆杵二錢五分厚朴一錢炙草六分如兩足轉筋加川木瓜一錢五分茯苓一錢五分心煩口渴加黃連五分但黃連系苦寒之藥平日胃寒者不可服香薷乃夏月解表之藥如冬月之麻黃氣虛人亦不可多服均當因其人之體質而用之歸葛飲涼補治陽明溫暑時症大熱大渴津液枯涸陰虛不能作汗等症當歸二錢乾葛三錢水煎候微溫服不可過熱如大便溏者勿服當歸人參白虎湯大寒治傷暑身熱大渴大汗兼治赤斑狂躁渴欲飲水者生石膏五錢知母去毛二錢黨參去蘆二錢甘草一錢加粳米一撮煎如兩足冷者是暑而挾濕加蒼朮一錢五分此方乃係為壯健人而設若體質虛寒者勿服生脈散涼補治熱傷元氣肢體倦怠氣短口渴此是預服以卻暑者或暑病愈後以此收功非暑病正方也生黨參去蘆八錢麥冬去心三錢北味七分水煎服俗醫誤看生脈二字每用此方以救脈脫殊不知脈脫由陽氣欲散服此湯是速其死也必要四逆等湯乃可挽回附中暑症此症由暑天路途受熱熱傷元氣忽然昏僕不省人事切不可灌以冷水冷水入口即不能救急以熱物熨其臍下服中暑等方又暑月身熱昏睡或恐出丹以生扁豆數粒與食不知腥味即是此症急用生扁豆六錢研汁一小茶杯滾水沖服即愈中暑列方茯苓半夏湯和治中暑忽然昏倒製半夏醋炒四錢茯苓二錢甘草二錢共研末白湯調下二錢蒜子湯溫治同上大蒜頭三隻搗爛取汁以白湯衝入灌之即醒醒後服益元散濕症此症頭重腰冷或一身四肢疼痛在身以上者要兼散身以下者要利小便大概固然矣然有寒有熱濕熱者多煩渴小便赤澀大便秘結宜清宜利寒濕者小水清長大便稀溏宜溫宜燥病各不同治須分別濕症列方二術二陳湯和治濕症白朮淨二錢蒼朮米泔水浸半夏制各一錢五分陳皮一錢茯苓二錢炙草七分加生薑二片煎凡內外之濕俱用此方主之外濕加紫蘇防風乾葛木瓜內濕加木通澤瀉砂仁木香食積濕加山楂麥芽枳實寒濕加乾薑濕熱加黃連黃芩熱輕者只加連翹除濕湯散濕治中濕身體重腰腿疼痛大便溏小便或澀或利陳皮一錢半夏制蒼朮米泔水浸白朮淨炒茯苓防風羌活各一錢五分炙草六分加生薑三片紅棗二枚煎寒濕加乾薑七分濕熱約加黃連黃芩各五分所加輕重仍因其人之體質用之羌活勝濕湯散治外傷濕氣一身盡痛防風一錢羌活獨活各一錢五分藁本一錢荊子杵川芎炙草各五分水煎食後溫服如身重腰痛沉沉然經有寒也加酒炒防己五分製附子五分加味四苓散利濕治濕勝身痛小便不利而渴羌活二錢白朮淨澤瀉鹽水炒豬苓茯苓各一錢五分如體質寒者加肉桂三分或四五分腎著湯微熱治寒濕腰痛其痛冷重如帶五千錢此症不渴小便亦利白朮淨五錢蒼朮米泔水浸一錢乾薑七分茯苓三錢一味白朮酒補去濕治中濕骨節疼痛白朮淨一兩酒煎頻飲不能飲酒者水煎亦可黃疸此症遍身面目皆黃宜分別陰陽陽黃者其色帶亮多由外感風濕內傷酒食或身有熱或煩渴或躁擾不寧或小水赤澀或大便閉結清火利小便熱去而黃自退若系陰黃其色帶暗總由氣血之敗或喜靜惡動或精神困倦或言語輕微或畏寒少食或四肢無力或大便不實小水如膏此與濕熱發黃者反如冰炭宜速服溫補之劑倘誤作陽黃治無不隨藥而斃者陽黃列方茵陳四苓湯和治陽黃無汗小便短少惟利小便使其濕熱俱從水道而去蒼朮米泔水浸茵陳澤瀉鹽水炒豬苓茯苓各一錢五分如熱甚加梔子杵一錢茵陳蘇葉湯散治陽黃表無汗而身熱者紫蘇二錢茵陳二錢水煎加酒半杯沖服茵陳大黃湯大寒峻劑治陽黃表有汗大便閉而腹滿者生大黃二錢梔子杵茵陳各一錢五分加燈心一團水煎陰黃列方茵陳五苓湯微熱治陰黃小便不利者白朮淨二錢豬苓澤瀉鹽水炒茯苓茵陳各一錢五分肉桂四分去皮另燉茵陳姜附湯大熱峻劑治陰黃小便利者白朮淨炒二錢附子制一錢乾薑七分茵陳一錢五分肉桂去皮另燉三分炙草七分茵陳理中湯熱補治陰黃溫脾去濕黨參米拌炒去蘆茵陳各一錢五分白朮淨炒二錢乾薑一錢炙草一錢茵陳四逆湯大熱峻劑治陰黃溫腎去濕製附子茵陳各一錢五分乾薑炙草各一錢痹症痿症痹與痿二症相似而實不同痹者風寒濕雜至血氣為邪所閉則病而為痹治行痹者散風為主仍須去寒利濕而參以補血之藥蓋治風先治血血行風自滅也治痛痹者散寒為主仍須疏風燥濕而參以補火之藥非大辛大溫不能除其凝寒之害也治著痹者利濕為主仍須祛風解寒而參以補脾補氣藥使土強可以勝濕而自無頑麻也提其大綱約略如此若夫痿病雖起於肺熱而所重獨在陽明蓋肺金體燥居上主氣而畏火脾土性溫居中主四肢畏木火能炎上若嗜欲無節則水失所養火寡於畏而侮所勝則肺得火邪而熱矣木性剛急肺受熱不能管攝一身脾受傷則四肢不能為用而諸痿作矣治之者瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有治痿之法無出於此又云痹病通身疼痛或麻木不仁痿病惟兩足軟弱不能行麻木亦有之而全不痛乃兼氣血之虛也以此辨之顯而易見不可混治痿症或不能食亦當培補脾胃切不可用風藥及蒸炙之法用之必危且要淡滋味方能保全痹症列方五積散微熱兼散治痹症之實者當歸一錢麻黃八分蒼朮米泔水浸陳皮各一錢厚朴乾薑枳殼各八分半夏制七分桔梗茯苓麗參炒各五分川芎四分白芍酒炒八分肉桂去皮另燉四分白芷七分炙草五分加生薑三片蔥白二莖煎加味二妙丸涼治濕熱為病兩足痹痛如火燎從兩足跗熱起漸至腰胯或麻痹痿軟者當歸防己龜板酥炙川牛膝鹽水炒蒼朮米泔水浸各五錢秦艽一錢五分黃柏酒浸曬乾一兩川萆薢五錢酒煮面和為丸如綠豆大每服三錢淡薑湯下羌活勝濕湯散治外傷濕氣一身盡痛者防風藁本各一錢五分羌活獨活各二錢川芎荊子杵炙草各五分如身重腰痛沉沉然經有寒也加酒炒防己附子各五分蠲痹湯微熱散治風寒濕三氣成痹羌活獨活秦艽各一錢海風藤三錢當歸三錢川芎七分桑皮三錢制乳香八分木香八分肉桂去皮另燉四分炙草六分又方散兼補治周痹及手足冷痹腳腿沉重或身體沉重背項拘急者此亦名蠲痹湯當歸二錢白芍酒炒黃耆酒炒薑黃羌活各一錢五分炙草六分加生薑二片紅棗二枚煎除濕蠲痹湯散治風濕痹痛羌活蒼朮米泔水浸白朮淨澤瀉鹽水炒茯苓各一錢五分甘草六分加生薑汁竹瀝各半酒杯煎痛在上者加桂枝威靈仙各一錢痛在下者加防己木通黃柏牛膝各一錢活絡飲散微補治風濕痹痛諸藥不效者當歸二錢白朮淨羌活各一錢五分獨活川芎各一錢炙草六分加生薑三片煎熱加黃芩一錢寒加肉桂四分製附子八分茯苓一錢五分續斷丸散涼血治肝腎受風風毒流注下部腳疼痛不能踐地行步艱難小便餘瀝此藥補五臟內傷調中益氣祛風涼血兼強筋骨防風羌活薏米五加皮牛膝酒浸續斷各三錢生地五錢川杜仲鹽水炒五錢萆薢四錢研末用青鹽五錢川木瓜去皮子二兩酒煎成膏和丸如綠豆大每服二錢淡鹽湯或溫酒下薏米酒散兼補治腳痹白朮淨三錢熟地八錢牛膝鹽水炒六錢生薏米一兩防風獨活杜仲鹽水炒海桐皮各五錢加五加皮六錢酒浸一月每空心服一二杯常令酒氣不斷久之覺皮膚如有蟲行即風濕散也黃耆五物湯補微熱治身體四肢不仁為痹症屬虛之總方黃耆炙白芍酒炒各三錢桂枝一錢五分加生薑五片大棗四枚煎或加當歸二錢羌活獨活各一錢五分痿症列方甘菊湯補微涼治痿症腿足不能起立能食易飢者熟地淮山各四錢元參三錢甘菊花七錢白芍酒炒當歸黨參去蘆各二錢建神麯一錢水煎如兩足熱極者服加味二妙丸方在痹症內虎潛丸涼兼補治痿症能降陰火滋腎水熟地酒炒黃柏各六錢知母六錢川牛膝鹽水炒四錢龜板炙八錢白芍酒炒當歸各四錢虎脛骨酥炙瑣陽酥炙陳皮各三錢加乾薑一錢共研末煉蜜為丸如綠豆大每服二錢淡薑湯或酒下加味四物湯涼補治血熱陰虛諸痿四肢軟弱不能舉動者熟地三錢當歸麥冬去心蒼朮米泔水浸黃柏黨參去蘆各一錢北味九粒白芍酒炒川芎各七分杜仲鹽水炒八分牛膝鹽水炒五分知母三分水煎沖酒一杯服加味六君子湯微涼兼補治痿症氣虛多痰者黨參去蘆二錢陳皮蒼朮米泔水浸黃柏各一錢白朮淨紫苑半夏制茯苓各一錢五分炙草七分生薑三片加味四斤丸補治腎虛肺熱熱淫於內以致筋骨痿弱不能收持者熟地鹿茸酥炙木瓜肉蓯蓉洗淡牛膝絲餅北味各五錢煉蜜為丸如綠豆大每服二錢溫酒或米飲下加味金剛丸補治痿病筋骨軟弱絲餅七錢牛膝鹽水炒木瓜各五錢肉蓯蓉酒洗淡七錢杜仲鹽水炒六錢萆薢五錢煉蜜為丸如綠豆大每服二錢淡鹽湯下一方單用杜仲一兩煎服鹿角膠丸補治血虛虧損兩腳痿弱不能行動久臥床褥者鹿角膠三兩黨參去蘆米炒熟地各四錢鹿角霜虎脛骨酥炙龜板酥炙白朮淨炒川杜仲鹽水炒各三錢菟絲餅四錢牛膝鹽水炒二錢當歸五錢白茯苓四錢共研末先將鹿膠用酒溶化加煉蜜為丸如綠豆大每服二錢淡鹽湯下十全大補湯溫補治痿症已久氣血大虛者黃耆炙黨參去蘆米炒當歸白朮飯蒸白芍酒炒茯苓各一錢五分熟地三錢川芎一錢肉桂去皮另燉四分炙草七分加生薑二片大棗二枚煎歷節風此症肢節走痛痛無定處皆由其氣血本虛或汗出當風或勞倦過度或醉而行房調護不謹以致三氣之邪遍歷關節而疼痛非常如虎之咬故俗人又謂之白虎風蓋其症日輕夜重遇風雨陰晦而甚者此陰邪之在陰分也治宜溫熱或得暖遇熱而甚者此濕熱傷陰之火症也宜清宜涼又云若筋骨拘滯伸縮不利者陰虛血燥也非養其血氣不可大都治法與痹症略同須參看歷節風列方當歸羌活湯散兼補治歷節風症當歸二錢川芎一錢白芍酒炒羌活獨活各一錢五分炙草七分加生薑二片煎熱加黃芩黃柏各一錢寒加肉桂四分製附子六七分或一錢小便不利加茯苓一錢五分又五積散治歷節風初起兼頭痛惡寒發熱者為新受之邪宜服方在痹症內薏苡仁湯溫散治風寒濕流注手足疼痛麻痹不仁難以屈伸當歸白芍酒炒各一錢五分蒼朮米泔水浸一錢麻黃去淨節八分肉桂去皮燉四分薏米三錢炙草七分加生薑三片煎有熱去肉桂自汗去麻黃虎骨散溫散治風毒走注疼痛不定少得睡臥者當歸自然銅醋淬沒藥制另研蒼耳子血竭另研骨碎補去毛赤芍各二錢虎脛骨酥炙五錢白芷一錢二分川牛膝酒浸檳榔五加皮羌活明天麻各二錢五分龜板酥炙五錢白附子炮一錢二分防風二錢油肉桂去皮另研一錢二分共研細末每服二錢溫酒調下或白湯調加酒一杯亦可玉竹湯和治歷節風久服辛熱之藥不愈用此方為柔潤熄肝風之法生黃耆阿膠蛤粉炒珠直殭蠶酒洗菊花各一錢五分黑芝麻蒺藜當歸鬚各一錢玉竹一錢五分炙甘草七分水煎凡久病不愈切不可徒用風藥宜大補氣血用十全大補湯各一錢加真桑寄生三錢製附子七分薑汁竹瀝各半酒杯沖藥服久病所服之方所有金銀花刺蒺藜鉤藤鉤等藥均宜加入薰洗歷節風法取樟木屑一籮放大桶內煮滾水一擔傾入桶邊放一高凳桶內安一矮凳令病人坐在桶邊腳踏小凳上外以草荐或夾被在病人頸膊處圍緊勿使木氣衝上以致損目俟水溫即洗浴止痛最速鶴膝風此症由風寒濕合痹於膝而成風勝則走注作痛寒勝則如錐刺痛濕勝則腫屈無力久則膝腫日粗大腿漸小痛而無膿皮色不變成壞症矣宜早治之鶴膝風列方大防風湯熱補兼散治三陰虧損寒濕乘虛內侵致患鶴膝風附骨疽等症初起時即先服此方又治痢後腳膝軟痛此藥祛風順氣活血壯筋骨黃耆飯蒸一錢白朮淨防風黨參去蘆米炒羌活各一錢五分杜仲鹽水炒熟地白芍酒炒附子制牛膝鹽水炒當歸川芎各一錢肉桂去皮另燉四分炙草六分加生薑三片煎又五積散治鶴膝風初起兼發熱頭痛者即宜服之痢後變成者亦宜方在痹症內二妙散寒治鶴膝風赤熱焮腫並一切濕熱在經筋骨疼痛者均宜蒼朮米泔水浸黃柏酒炒各一錢五分水煎如氣滯加行氣藥血虛加補血藥痛甚則加生薑汁熱辣服之四物加味湯補散治鶴膝風陰虛者熟地四錢當歸二錢白芍酒炒羌活獨活各一錢五分牛膝鹽水炒川芎各一錢炙草七分水煎如有寒加肉桂四分製附子六七分或一錢加味四君子湯補散治鶴膝風陽虛症黨參去蘆米炒茯苓羌活獨活各一錢五分白朮淨二錢牛膝鹽水炒當歸各一錢炙草七分加生薑三片煎如有寒加乾薑七八分或一錢病久而虛者服十全大補湯塗鶴膝方治病初起者白芥子要陳的愈陳愈佳四錢研細末用薑蔥汁調塗患處約一時久即起泡泡干皮脫自愈火龍膏藥治鶴膝風歷節風凡風寒濕毒所襲及濕痰流注經絡疼痛不能行步者均宜牛皮膠四兩乳香制沒藥制各二錢五分麝香一分用老生薑八兩搗取自然汁同牛皮膠熔化入乳香沒藥攪勻俟少溫再加麝香則成膏矣以青布或油紙攤貼患處當痛止腫消時疫此症有由感不正之氣而得者或頭痛發熱或頸腫發頤此在天之疫也若一人之病染及一室一室之病染及一鄉一邑其症憎寒壯熱口吐黃涎乃在人之疫也初病時俱宜服散藥發汗未汗則再服總以得微汗為吉倘汗不出而邪傳陽明則必大熱大渴有自汗癍黃等症治不得法鮮不危矣時疫列方敗毒湯散治四時傷寒瘟疫憎寒壯熱頭痛項強身體疼痛初起須速服此方黨參去蘆羌活防風川芎柴胡桔梗獨活各一錢五分甘草七分加生薑三片煎未汗則再照服火盛人去黨參加黃芩一錢牛蒡子一錢五分血弱人加當歸一錢五分柴葛解肌湯涼散治時疫邪傳陽明熱而兼渴者柴胡一錢五分葛根二錢白芍酒炒羌活黃芩桔梗白芷各一錢五分甘草一錢加生薑三片煎無汗惡寒去黃芩冬月加蘇葉一錢清涼飲寒治疫邪入里脹悶譫狂諸症秦艽赤芍知母貝母連翹各一錢薄荷七分柴胡一錢五分丹參五錢加人中黃三錢煎黃連梔子湯大寒治時疫上膈結熱黃芩梔子連翹各一錢五分黃連六分青蒿薄荷各一錢甘草七分消毒飲寒散治時疫憎寒壯熱頭面頸項俱腫目不能開口乾舌燥俗所謂大頭瘟者羌活防風黃芩白芷各一錢五分黃連射干各一錢元參一錢五分甘草一錢加生薑三片煎如有痰加竹瀝薑汁各半酒杯服大便熱結者加生大黃三錢小便赤澀加澤瀉木通各一錢五分以上各方銀花俱可加入瘧疾此症寒熱往來或口苦耳聾胸滿脅痛發有一定之候一日一發者邪淺二日一發者邪深三日一發者邪更深其症有寒熱平分者有熱多寒少者有熱少寒多者且有先寒後熱先熱後寒單熱無寒單寒無熱者種種不一要皆少陽之病照方服藥無有不愈凡瘧疾初起無汗要有汗發散為先若病後汗多亦宜兼斂汗久而不愈則不必計其瘧疾均宜服六君子補中益氣附桂地黃湯等補劑瘧疾列方小柴胡湯涼治瘧疾初起凡氣血和平之人非虛弱者均宜服平日胃寒者去黃芩柴胡三錢黨參去蘆半夏制黃芩各一錢五分甘草七分加生薑三片紅棗二枚煎如無汗加蘇葉二錢防風一錢汗多加酒炒白芍一錢五分桂枝七分脅脹或痛去紅棗加煅牡蠣粉一錢五分腹痛去黃芩加酒炒白芍一錢五分小便不利加茯苓二錢口渴加葛根二錢麥冬二錢熱多加知母一錢五分貝母二錢或再加生石膏二錢單熱者亦然若欲速愈此方三服後加酒炒常山三錢以截之小柴胡加減湯微熱治寒多熱少或單寒者柴胡二錢黨參去蘆半夏制各一錢五分肉桂去皮另燉三分炙草七分加生薑三片紅棗二枚煎如汗多去肉桂加酒炒白芍一錢五分桂枝七分口渴加葛根麥冬各一錢五分無汗腹痛脅脹或痛加減同前方柴胡參歸湯散兼補治虛弱人瘧疾初起黨參去蘆半夏制歸身紫蘇各一錢五分柴胡二錢陳皮一錢炙草一錢加生薑三片紅棗二枚煎有汗去紫蘇糞溏去歸身其餘加減與第二方同附桂二陳湯熱治寒瘧寒多熱少腰足厥冷或單寒者陳皮一錢半夏制茯苓各一錢五分肉桂去皮另燉三分附子制六分炙草一錢加生薑三片紅棗一枚煎柴胡六味地黃湯補治久瘧熱未退而口乾唇焦者熟地五錢淮山二錢柴胡萸肉茯苓丹皮各一錢五分澤瀉鹽水炒一錢白朮湯補治久瘧未愈白朮淨一兩加生薑五大片煎寅時一服渣再煎病將來時又一服補中益氣湯補治久瘧未愈黨參去蘆二錢炙耆白朮淨當歸柴胡各一錢五分陳皮一錢升麻蜜炙三分炙草一錢加生薑一片烏梅二隻煎六君子加味丸兼補微攻治久瘧成症癖結於小腹上名瘧母者黨參去蘆米炒五錢白朮淨六錢龜甲醋炙八錢莪朮五錢半夏制三錢茯苓三錢陳皮一錢五分炙草一錢共研細末加木香末一錢五分煉蜜為丸如綠豆大每服三錢白湯下汗症此症有自汗有盜汗自汗者陽虛陽虛則表不固治宜實表補陽盜汗者陰虛陰虛則血必熱治宜清火補陰此其大法固不可不知然亦有不盡然者須辨而治之又云因於熱者所出之汗必熱因於寒者所出之汗必冷汗症列方白朮散治自汗盜汗白朮淨四兩浮小麥三兩同煎半日去小麥取白朮切片焙乾為末每服二三錢仍煎小麥湯調下若小兒則以飯蒸黃耆煎湯量兒大小與服忌蘿蔔辛辣香炒等物牡蠣飲和治體虛或病後津液不固常覺自汗黃耆炙三錢牡蠣煅淬酸中二錢麻黃根去淨節二錢加浮小麥一錢五分同煎玉屏風飲補治自汗黃耆炙一錢五分防風一錢白朮淨炒二錢加生薑二片煎參麥湯補微涼治熱傷元氣肢體困倦氣短口渴汗出不止者生黨參去蘆五錢麥冬去心三錢五味子三錢水煎黃耆六一湯補治表虛自汗黃耆炙六錢炙草一錢水煎加味歸脾湯補治陰陽俱虛自汗盜汗怔忡不眠煩躁等症黨參去蘆飯蒸二錢黃耆炙棗仁即炒杵麥冬去心白朮淨炒白芍酒炒歸身各一錢五分遠志去心四分龍眼淨肉一錢北味六分炙草七分耆附湯熱補治陽虛自汗其人常惡寒者黃耆炙四錢附子制一錢水煎參苓散補治睡中汗出黨參去蘆飯蒸七錢棗仁即炒杵四錢白茯苓五錢研末每服三錢米飲調下當歸六黃湯寒兼補治陰虛發熱其人常有盜汗者甚驗黃耆炙當歸熟地各二錢黃芩生地黃柏各一錢黃連六分酸棗仁湯補兼寒治心虛不固盜汗黨參去蘆棗仁炒杵白芍酒炒黃耆飯蒸當歸生地各一錢五分茯苓一錢黃柏七分知母一錢北味六分勞倦內傷此症由飢飽失時或勞倦過度以致脾腎受傷忽然發熱怠惰嗜臥懶於言語亦間有頭痛惡寒者非外感也外感之惡寒雖近烈火而不休內傷之惡寒得就溫暖而即解外感之自汗聲高氣壯內傷之自汗氣短聲微外感之發熱頭痛晝夜不止內傷之發熱頭痛則有止期以此辨之庶不至誤勞倦內傷列方補中益氣湯補治虛弱人勞倦發熱黃耆炙黨參米炒去蘆各一錢五分白朮飯蒸歸身各一錢陳皮六分升麻蜜炙四分柴胡六分炙草七分加生薑一片紅棗二枚煎溫胃飲溫補微散治勞倦內傷平素臟寒而兼略有外感者黨參去蘆米炒白朮淨炒各一錢五分歸身防風各一錢陳皮五分乾薑六分炙草七分加生薑一片煎四君防風湯補兼散治勞倦內傷外感者黨參去蘆米炒二錢白朮飯蒸一錢五分防風茯苓荊芥各一錢炙草七分加生薑一片紅棗二枚煎當歸防風湯補兼散治勞倦內傷血虛外感者黨參去蘆飯蒸淮山各一錢五分當歸二錢防風荊芥各一錢炙草七分加生薑一片紅棗二枚煎癆瘵凡人內傷元氣者無非虛損之症至於虛損之深即成癆瘵或骨蒸或干嗽或吐血吐痰營衛俱敗尪羸日甚積漸而來以致本末俱竭此症切不可服寒涼藥萬一要服多不過三兩劑即當溫補不然則難救此症由色傷者居多癆瘵列方瀉白散微涼治火氣乘金而成痰嗽者桑白皮二錢地骨皮一錢五分甘草七分水煎地骨皮散補微涼治陰虛火旺骨蒸發熱日靜夜劇者熟地四錢當歸丹皮各一錢五分川地骨二錢川芎一錢白芍酒炒一錢五分通關飲微涼治肺痿聲嘶喉痹咳血煩躁者黃柏知母各一錢五分肉桂去皮另燉六分水煎四生丸涼治陽盛陰虛血熱妄行或吐或衄者生地生艾葉生柏葉生荷葉共搗成團如白鴿蛋大曬乾每服一丸滾湯化下秦艽扶羸湯微涼兼補治肺痿骨蒸癆嗽或寒熱往來聲啞自汗體虛倦怠者黨參去蘆秦艽紫苑川地骨柴胡當歸各一錢五分鱉甲醋炙先煎四錢細甘草六分潤神散補微涼治癆瘵憎寒壯熱口乾咽燥疲倦煩躁自汗黨參去蘆黃耆麥冬去心各一錢五分桔梗一錢竹葉六分炙草七分加浮小麥一錢煎清骨散寒治骨蒸癆熱此症亦有暫服石膏方寸匕以熱退即止者秦艽青蒿知母川地骨胡連鱉甲童便炙各一錢炙草五分銀柴胡一錢五分五味子湯補治腎水枯涸口燥舌乾黃耆一錢五分黨參去蘆一錢北味五分麥冬去心六分炙草三分水煎日夜服數劑聖愈湯補治一切失血或血虛煩渴燥熱睡臥不寧等症熟地四錢川芎一錢黨參去蘆飯蒸黃耆各二錢白芍酒炒歸身各一錢五分六味地黃湯補治腎精不足虛火上炎熟地四錢淮山二錢萸肉茯苓丹皮各一錢五分澤瀉鹽水炒一錢水煎加肉桂三分制附片七分治命門火衰不能生土以致脾胃虛寒少思飲食獨參湯補治元氣虛而不支大汗大下之後及吐血血崩產後血暈諸症高麗參去蘆飯蒸米拌炒一兩五錢水煎當歸補血湯補治血虛身熱黃耆炙七錢當歸一錢五分水煎服此方再加當歸一錢五分治曾經失血發熱面赤大渴六君子湯補治脾胃虛弱痞滿痰多黨參去蘆米炒白朮飯蒸各二錢半夏制茯苓各一錢五分陳皮一錢炙草八分加生薑二片紅棗二枚煎如氣虛腫滿痰飲結聚脾胃不和者加砂仁五分藿香一錢五分歸脾湯補治思慮傷脾不能攝血或健忘怔忡黃耆炙黨參去蘆米拌炒白朮飯蒸各二錢遠志去心五分當歸棗仁即炒杵茯神各一錢五分木香七分龍眼淨肉六分炙草五分保元湯補微熱治氣血虛弱黨參去蘆米炒三錢黃耆炙二錢炙草一錢肉桂去皮另燉二分水煎耆附湯熱補治汗多而畏寒者製附子一錢黃耆炙四錢水煎獺肝散和治鬼疰傳屍癆瘵獺肝一隻陰乾研細末每日溫湯調服二錢日二次
