body:
  text: 婦科補遺帶病此症不外脾虛有濕但分寒熱治之無有不愈又云皆由中土虧損帶脈不能收引以致十二經之脈因而內陷宜用六君加泡薑以補脾甚則用補中益氣湯以提之或用牡蠣等丸以澀之不論用何方加鹽水炒杵故紙一錢甚驗加味異功散補治帶病因脾虛有濕黨參去蘆米炒一錢五分陳皮一錢扁豆炒杵一錢五分生薏米三錢白朮淨山藥炒各二錢澤瀉鹽水炒一錢白茯苓一錢五分炙草一錢如有熱加蓮子心五分黃柏一錢色白清冷腹痛多寒者加乾薑一錢或再加製附子一錢加味補中益氣湯補治帶病脾腎虧陷不能收攝者炙耆黨參去蘆米炒歸身白朮淨茯苓各一錢五分故紙鹽水炒陳皮各一錢升麻三分蜜炙柴胡五分生薑二片紅棗二枚炙草七分癥瘕結有定處者為症屬血行無定處者為瘕屬氣各有虛實或宜攻或宜補或宜攻補兼施要審而治之若任意攻下與不守禁忌縱嗜欲未有不喪厥身者血症列方五物煎補兼散血治瘀血作痛或成形不散在臍腹之下初見停蓄根盤未固者當歸三錢白芍酒炒二錢熟地三錢川芎一錢肉桂六分去皮另燉桃仁十粒去皮尖杵通瘀煎和行散治氣滯血積實痛拒按者歸尾二錢紅花新者炒黃山楂香附澤瀉鹽水炒烏藥各一錢五分青皮一錢木香七分水煎加酒一杯沖服寒滯加肉桂六分微熱加白芍一錢五分血瘀不行加桃仁七粒三稜散攻峻劑治積聚癥瘕堅滿不散者白朮淨炒三稜各六錢蓬朮當歸各一錢六分檳榔木香各一錢共為細末每服三錢沸湯調下加味四君湯補兼行治血症久而不散人已虛弱者宜兼用外治方善黨參去蘆米炒白朮淨炒川芎茯苓各一錢五分木香七分當歸二錢炙草六分加生薑二片煎或服歸脾湯重用木香或服逍遙散六君子湯加木香均當審而治之氣瘕列方木香調氣散和行氣治氣瘕大砂仁木香白蔻丁香白檀香藿香炙草等分研末每服二錢淡鹽湯調下五磨飲和行氣治同上黨參去蘆米炒烏藥檳榔正沉香木香等分研末每服二錢淡薑湯下香砂六君子湯補兼行治虛弱人氣瘕黨參去蘆米炒白朮淨炒半夏制茯苓各一錢五分砂仁炒杵五分木香六分陳皮炙草各一錢加生薑二片煎尉痞方治結有定處無論男女皆宜先將麥面和成條量痞大小圍住第一層用麝香二三分摻上第二層用真阿魏一二錢研細末摻第三層用朴硝一二兩鋪蓋其上以青布覆之備熱尉斗二隻於布上輪流尉之覺腹中氣行寬快即是痞消之兆麝香阿魏要真的假者不驗乳癰乳岩乳癰則因兒口氣所吹壅結脹痛肉色赤腫發熱煩渴憎寒頭痛治之亦易惟乳岩之症初起結小核於內肉色如常速宜服消散之藥若積久漸大內潰深洞最為難療服補方尚可以延歲月切忌開刀開刀則翻花必死用藥咬破者亦同乳癰列方栝蔞散和治吹乳腫痛栝蔞一個乳香制一錢五分酒煎服外用南星為末溫酒調塗更以手揉散之又方用萱草根擂酒服渣敷患處連翹金貝煎和治乳癰紅腫疼痛之甚熱毒有餘者白芷歸身乳香制沒藥制川貝杵各一錢水煎沖酒一二杯服又方生蒲公英搗爛沖酒服渣敷乳上略睡片時數次即愈如無生的用乾研末亦可乳岩列方加味陽和湯熱補治乳岩初起日久亦宜此乃陰症聖藥須間日服二陳湯熟地八錢肉桂去皮另燉六分泡薑五分真鹿膠炒珠三錢麻黃四分甘草炙一錢水煎服服後飲好酒一二杯謹戒房事服至病愈為止泡薑肉桂看症任加製附子亦宜加味逍遙散熱補治乳岩白朮淨二錢當歸三錢白芍酒炒香附杵柴胡各一錢五分泡薑茯苓各一錢炙草七分外科瘡瘍凡瘡紅者為癰白者為疽小者為癤癰是熱症宜清涼解毒疽是寒症乃氣血大虛與癰相反寒藥絲毫不得用即外敷亦不可宜服大補氣血之劑或加附子泡薑肉桂引用麻黃五分冬天有用至一錢者此味雖夏月亦必用使之寒毒有路而出疽者色白不甚腫其寒毒深故藥須熱補或用艾火灸之癰者色紅亮而腫其熱毒外見故藥當清涼然年老及虛弱人必服內托藥方穩紅瘡列方真人活命湯和治熱瘡初起功能消散潰後忌服當歸防風白芷銀花貝母杵花粉陳皮草節乳香制沒藥制山甲炙角刺各一錢水煎加酒一杯沖服神功托裡湯涼補治一切腫毒及發背乳癰或焮腫憎寒壯熱未成已成均效金銀花五錢生黃耆四錢當歸二錢甘草一錢水煎加酒一杯沖服白疽列方陽和湯熱補治一切色白平塌陰疽此為聖藥萬應萬靈從無一失熟地七錢肉桂去皮另燉七分泡薑五分真鹿膠炒珠三錢麻黃五分炙草一錢水煎服後飲好酒數杯謹戒房事服至病愈為止乾薑散熱治白疽初起甚效乾薑一兩炒黃研細末用醋調敷四圍留頭自愈又方無論虛實寒熱用遠志研末敷之並酒開服七分甚效若治乳癰更驗獨聖散和凡患瘡瘍皆由氣血凝滯須服香劑以香能行氣血也此方最宜香附六錢薑汁浸一宿焙乾研末每服一錢五分或二錢白湯下癰疽潰爛列方集香散和治癰疽潰爛須用此香味凡氣血得香則行得臭則逆又要用膏藥貼護使風不入則肌肉易生白芷藿香香茅香附防風各三錢木香甘草各一錢研細末先照方撿二劑煎濃湯洗之然後摻此散摻畢以敗毒膏藥貼之瓜皮散和治多年惡瘡冬瓜皮焙研末摻之又治傷損腰痛每服一錢溫酒調下指頭瘡方消毒散雄黃八錢蜈蚣二條共研末燒煙薰三兩次即愈或用豬膽汁調塗亦可腫毒列方鳳仙膏和治對口發背魚口便毒及瘰癧初起一切腫毒之症用之甚效鳳仙花即指甲花取連根葉一大把洗淨風乾搗取自然汁入銅鍋內不可加水將原汁熬稠敷患處一日一換凡諸毒初起雖大如碗敷二三次即消已破者禁用不得以鐵鍋熬水仙花根搗爛敷亦佳膿泡疥瘡方樟腦散治疥瘡有膿者百發百中靈驗無比樟腦八錢硫黃一錢五分川椒一錢炒枯礬一錢共研末真芝麻油調勻不可太稀攤在新粗夏布上包好線扎緊先將疥瘡針刺去膿隨以藥包炭火烘熱對患處按之日按數次俟其不能復起膿則可用藥包乘熱擦之矣如秋冬涼天四五日即結痂而愈布為膿漿糊實須換布另包治瘰癧列方夏枯草膏和治瘰癧無論已潰未潰或日久成漏亦效用夏枯草一把煎熬成膏每服半酒杯白湯開下並將此膏塗之瘰癧即消此草能生血乃治瘰癧之聖藥但虛弱人不可單服宜於補劑中加香附川貝各一錢五分遠志七分煎好開膏服之鯽魚散和治瘰癧用鯽魚一隻約重四五兩破開不見水去腸雜將肥皂核塞滿外以紙包再以泥包放爐火中煨成炭取出碗蓋存性研細末每服一錢白湯下服至一兩無有不愈殭蠶散溫治項下瘰癧白殭蠶炒一兩五錢研細末每服五分白湯下日三服十日愈白玉丹專治瘰癧破爛連及胸腋臭穢難聞雖數十年不愈藥到病除神效之極新出窯石灰一大塊放清水盤內化開次早取其面上者用真桐油調勻先煎花椒與蔥洗淨患處以藥敷之其效如神疔毒凡手指或各處有瘡初起即發癢身熱惡寒或麻木此乃極毒之疔瘡不速治必死去毒方急以針挑破擠去惡血候血盡口噙涼水吮之水溫再換吮至痛癢俱無即愈此法最善蔥蜜方治疔瘡惡腫針挑破用老蔥生蜜糖搗勻貼兩時久疔即出以醋洗之神效菊花酒微涼治疔瘡腫毒野菊花根一握搗汁一升沖酒一杯燉熱服即至垂死入口便活冬月掘地取用亦可並治一切惡毒搗爛酒煮服以渣敷之附癍疹葛根加牛子湯涼散治癍疹初起升麻一錢葛根二錢秦艽荊芥蘇葉白芷赤芍各一錢牛子一錢五分甘草一錢服此方後次服犀角地黃湯或服大青湯三黃解毒湯甚則服白虎湯犀角地黃湯寒治癍疹血熱妄行亦宜生地四錢白芍酒炒麥冬去心犀角尖先煎丹皮各一錢五分大青湯大寒治癍疹大毒生石膏知母元參青黛地骨皮生地木通各一錢甘草七分荊芥穗一錢竹葉十五片元參升麻湯涼治發癍咽痛元參三錢升麻甘草各一錢加犀角黃芩射干黨參治陽毒發癍頭頂皆痛狂躁罵詈咽腫吐血溫服取汗跌打損傷玉真散治破口傷無論傷口大小或潰爛進風口眼喎斜手足扯動用此散敷傷口另用三錢溫酒沖服白湯調服亦可效能起死回生惟已嘔吐則難治如膿多者以溫茶避風洗淨而敷無膿忌洗生南星薑汁炒羌活防風明天麻各二錢白附子四錢白芷二錢共研極細末收入窄口磁瓶內以蠟封密不可泄氣又方治破傷風亦名玉真散防風生南星薑汁炒等分研細末用以敷傷口並酒調服一錢此方雖打傷至死童便調灌二錢三服必活跌打青腫大黃生薑方治跌打青腫不破口者生大黃一兩用老生薑汁磨融敷之一日一換紫者轉黑黑即轉白甚覺效驗湯火傷宜服童便或用白沙糖二三兩滾水調服以免火毒攻心雖痛極亦要忍住若用冷水及井泥溝泥則熱氣內逼為害非輕大黃散治湯火傷生大黃七錢研極細末先以真桐油或真芝麻塗之塗後摻以食鹽少許再將藥末撒上立刻清涼止痛並無疤痕又方真芝麻油二斤生大黃半斤用銅鍋熬至藥色焦黑瓦罐連渣收存遇傷以鴨毛蘸油塗之極驗清涼膏治被湯火傷者無論新久均效新出窯石灰三四大塊用冷水一盤放石灰於內次日面上結一層如薄冰樣者取起以杯載之加真桐油調極濃厚敷之即愈面上所浮石灰並水取之方得滴桐油下調之自然濃厚矣外科補遺治痔瘡有血者用苦苣菜或生或干煎湯以熟爛為度連湯傾大木盤內以橫板一塊架上坐而薰之俟湯可下手即撩菜頻頻洗之湯冷方止日洗數次五六日見效又方取菊花葉搗爛敷之數次即愈治腦破骨折用蔥白和蜜搗勻厚敷立效凡一切湯火傷及跌打傷壓傷症重者恐其瘀血與火毒歸心須急飲童便半茶杯或小便亦可如嫌其穢則用滾水開白沙糖二三兩候溫飲之均不宜遲培補藥方凡人於病後或平日體質虛弱皆宜培補然培補之法須分陰陽陽虛者其人每多津液口不思水小便頻數或清長大便稀溏手足清冷喜飲熱湯陰虛者其人津液少每欲得水滋潤小便黃短大便乾結或有潮熱茲略選數方以便擇用如浸藥酒或錢換作兩分換作錢均要加蒸曬過五加皮一二兩培補藥方加味四君湯補治脾胃虛口淡不知味腳軟氣弱者黨參去蘆米炒二錢炙耆白朮白扁豆炒杵茯苓各一錢五分炙草一錢加生薑二片大棗二枚煎六君子湯補治脾胃虛弱不思飲食或嘔吐吞酸或咳嗽喘促等症黨參去蘆米炒二錢白朮淨炒茯苓半夏各一錢五分制陳皮炙草各一錢生薑二片大棗二枚如有虛火加泡薑一錢加藿香一錢五分砂仁八分名香砂六君湯治過服涼藥以致食少作嘔或中氣虛滯噁心脹滿等症補中益氣湯補治勞倦傷脾中氣不足清陽不升體倦食少寒熱瘧痢氣虛不能攝血並外感不解等症黨參去蘆米炒炙耆白朮各一錢五分淨炒當歸一錢升麻三分蜜炙陳皮五分柴胡五分炙草一錢加生薑二片大棗二枚煎如氣虛下陷而脫肛者亦宜截久瘧須加制首烏三錢或加烏梅二隻脾虛發腫皮不光亮手按成窟者用此方去升麻服之當歸滑腸便溏則勿用以下同歸脾湯補治思慮傷脾不能攝血致血妄行或健忘怔忡驚悸盜汗哮臥少食或大便不調心脾疼痛或因病用藥失宜克伐傷脾以致變症者此乃培補後天第一之方炙耆黨參去蘆米炒白朮淨炒棗仁即炒杵茯苓各一錢五分遠志去心五分當歸一錢龍眼淨肉六分木香五分炙草六分水煎凡痢疾既久宜用此方或補中益氣湯十全大補湯加烏梅二隻參苓白朮散補治脾胃虛弱飲食不進或嘔吐泄瀉大病後須調補者黨參去蘆米炒山藥炒蓮仁去心炒白扁豆去皮薑汁炒各一兩白朮米泔浸炒一兩五錢砂仁四錢薏米炒七錢白茯苓七錢炙草六錢共為細末每服二三錢米湯調下或加薑棗煎服六味地黃湯補治腎水虧損小便淋閉陰虛發熱自汗盜汗此實壯水制火之方火衰者勿服熟地四錢山藥二錢萸肉白茯苓澤瀉鹽水炒丹皮各一錢五分加肉桂四分北味五分治虛火上炎發熱作渴口舌生瘡或牙根潰爛咽喉疼痛寢汗憔悴等症左歸飲補治命門陰衰服此以壯腎水熟地四錢山藥炒枸杞各二錢萸肉茯苓各一錢五分炙草一錢如腎熱骨蒸多汗者加川地骨皮二錢五味子湯補治腎水枯涸口燥舌乾炙耆一錢五分黨參去蘆米炒二錢麥冬去心一錢五分北味七分炙草五分水煎日服三次四物湯補治一切血虛營弱者熟地當歸各三錢川芎一錢白芍酒炒二錢水煎加黨參二錢茯苓白朮各一錢五分炙草一錢名八珍湯加生薑二片大棗二枚煎治氣血兩虛聖愈湯補治血虛心煩睡臥不安五心煩熱黨參去蘆米炒川芎當歸白芍酒炒熟地炙耆各一錢一方無白芍有酒炒生地一錢八味地黃湯補大熱治命門火衰不能生土以致脾胃虛寒飲食少思大便不實下元冷憊臍腹疼痛等症熟地四錢山藥二錢炒澤瀉鹽水炒萸肉茯苓丹皮各一錢五分肉桂去皮另燉五分附子一錢制右歸飲補大熱治命門陽衰服此以益腎火熟地四錢山藥炒杜仲薑汁製枸杞各二錢萸肉附子各一錢制肉桂去皮另燉六分炙草一錢如嘔噦吞酸加炮薑一錢小腹多痛加吳萸六分帶濁不止加故紙一錢血少血滯腰膝軟痛加當歸二錢加減金匱腎氣丸補大熱治脾腎陽虛不能行水小便不利腰重腳腫或肚腹亦脹喘急痰盛已成膨症熟地二兩山藥炒萸肉牛膝鹽水炒澤瀉鹽水炒肉桂去淨皮丹皮車前各五錢附子二錢五分制茯苓一兩五錢煉蜜為丸如緑豆大每服三錢米飲下一方有五茄皮更效人參養營湯熱補治脾肺俱虛惡寒發熱肢體困倦食少作渴口乾心悸自汗等症白芍酒炒一錢五分炙耆黨參去蘆米炒當歸熟地白朮淨炒陳皮各一錢肉桂去皮另燉五分茯苓七分遠志去心五分北味七分炙草一錢加生薑二片大棗二枚煎理中湯熱補治胃寒黨參去蘆米炒白朮淨炒各二錢乾薑炒黃炙草各一錢加製附子一錢治臟寒將脫之症用以回陽十全大補湯溫補治氣血俱虛惡寒發熱自汗盜汗肢體困倦眩暈驚悸晡熱作渴遺精白濁大便溏泄等症黨參去蘆米炒白朮淨炒各一錢川芎七分茯苓一錢白芍酒炒一錢熟地二錢當歸一錢炙草七分炙耆一錢五分肉桂去皮另燉四分生薑二片大棗二枚仙傳斑龍丸溫補治諸虛百損壯精神養氣血老人及虛弱人服之最宜鹿角膠柏子仁鹿角霜菟絲餅熟地黃各二兩補骨脂鹽水炒白茯苓各一兩先將鹿膠溶化各藥研末入無灰酒糊丸如緑豆大每服二錢淡鹽湯或溫酒下五味異功散補治小兒虛弱飲食少進者黨參去蘆飯蒸四錢白朮飯蒸六錢茯苓四錢陳皮二錢炙草二錢共研極細末每用六七分或一錢或一錢零量兒大小米湯調下摻於粥內亦可間日一服此乃培補小兒平穩之方久久服之有益無損惟壯健者則不必服散要焙乾入窄口磁瓶內用蠟封固勿令泄氣
